version: "1.0.0"

stack: node-npm

commands:
  test: npm test
  test_unit: npm run test:unit
  lint: npm run lint
  format: npm run format
  validate: npm run validate

format:
  extensions:
    - ".ts"
  source_dirs:
    - "src"

staging:
  url: https://staging.my-node-app.example.com

tickets:
  prefix: my-node-app
  directory: .tickets

jira:
  project: MNA
