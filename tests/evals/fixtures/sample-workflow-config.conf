# sample-dso-config.conf — fixture for read-config.sh tests
#
# This file is used by test-read-config.sh to verify that read-config.sh
# can correctly parse all supported keys from a dso-config.conf.
#
# All command values are intentionally short/static so tests can assert
# exact string matches without worrying about real executables.

version=1.0.0
stack=python-poetry
commands.test=make test
commands.lint=make lint
commands.format=make format
commands.format_check=make format-check
commands.validate=make validate
commands.test_unit=make test-unit-only
commands.test_e2e=make test-e2e
commands.test_visual=make test-visual
