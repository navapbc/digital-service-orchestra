# sample-workflow-config.yaml — fixture for read-config.sh tests
#
# This file is used by test-read-config.sh to verify that read-config.sh
# can correctly parse all supported keys from a workflow-config.yaml.
#
# All command values are intentionally short/static so tests can assert
# exact string matches without worrying about real executables.

version: "1.0.0"

stack: python-poetry

commands:
  test: "make test"
  lint: "make lint"
  format: "make format"
  format_check: "make format-check"
  validate: "make validate"
  test_unit: "make test-unit-only"
  test_e2e: "make test-e2e"
  test_visual: "make test-visual"
