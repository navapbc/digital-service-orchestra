agent_type: "feature-dev:code-explorer"
model:
  default: "sonnet"
  complex: "sonnet"
base_priority: 2
category: null
read_only: true  # This agent has no write tools (Edit, Write, Bash)

keywords:
  strong:                # weight: 3 per match
    - investigate
    - trace
    - analyze
    - explore
    - understand
  moderate:              # weight: 2 per match
    - how does
    - map out
    - document flow
    - execution path
    - architecture
  weak:                  # weight: 1 per match
    - research
    - discover
    - inventory

negative:                # weight: -3 per match
  - implement
  - create
  - add endpoint
  - write tests

min_score: 3

# Domain-agnostic: reads anything during investigation.
file_patterns: []
