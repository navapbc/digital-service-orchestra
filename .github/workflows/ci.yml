# Digital Service Orchestra (DSO) — Continuous Integration
# Runs shellcheck, Python linting, and plugin tests.

name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'bugfix/**'
      - 'epic/**'
      - 'exp/**'
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast gates ──────────────────────────────────────────────

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Run actionlint
        run: actionlint -color

      - name: Job timing report
        if: always()
        run: echo "actionlint completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck --severity=warning plugins/dso/scripts/*.sh plugins/dso/hooks/*.sh plugins/dso/hooks/**/*.sh

      - name: Job timing report
        if: always()
        run: echo "shellcheck completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check plugins/dso/scripts/*.py tests/**/*.py

      - name: Ruff format check
        run: ruff format --check plugins/dso/scripts/*.py tests/**/*.py

      - name: Job timing report
        if: always()
        run: echo "lint-python completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ── Full test suite ─────────────────────────────────────────

  test-hooks:
    name: Hook Tests
    needs: [shellcheck, lint-python]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUITE_TEST_INDEX: ${{ github.workspace }}/.test-index
    steps:
      - uses: actions/checkout@v4

      - name: Run hook tests
        run: bash tests/hooks/run-hook-tests.sh

      - name: Job timing report
        if: always()
        run: echo "test-hooks completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  test-scripts:
    name: Script Tests
    needs: [shellcheck, lint-python]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUITE_TEST_INDEX: ${{ github.workspace }}/.test-index
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install ruff pyyaml jsonschema

      - name: Install hyperfine
        run: sudo apt-get update && sudo apt-get install -y hyperfine

      - name: Verify hyperfine installed
        run: hyperfine --version

      - name: Run script tests
        run: bash tests/scripts/run-script-tests.sh

      - name: Job timing report
        if: always()
        run: echo "test-scripts completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  validate-required-checks:
    name: Validate required-checks.txt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Validate check-context names
        run: bash plugins/dso/scripts/onboarding/validate-required-checks.sh

  # ── LLM code review ─────────────────────────────────────────

  llm-review:
    name: LLM Review
    needs: [test-hooks, test-scripts]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate required LLM review variables
        run: |
          missing=""
          [ -z "$DSO_LLM_LIGHT_MODEL" ]    && missing="$missing DSO_LLM_LIGHT_MODEL"
          [ -z "$DSO_LLM_STANDARD_MODEL" ] && missing="$missing DSO_LLM_STANDARD_MODEL"
          [ -z "$DSO_LLM_FRONTIER_MODEL" ] && missing="$missing DSO_LLM_FRONTIER_MODEL"
          [ -z "$DSO_LLM_TIER" ]            && missing="$missing DSO_LLM_TIER"
          if [ -n "$missing" ]; then
            echo "ERROR: Required GitHub Actions Variables not set:$missing" >&2
            echo "Configure them in Settings > Variables > Actions." >&2
            echo "Valid values for DSO_LLM_TIER: light, standard, frontier" >&2
            exit 1
          fi
        env:
          DSO_LLM_LIGHT_MODEL:    ${{ vars.DSO_LLM_LIGHT_MODEL }}
          DSO_LLM_STANDARD_MODEL: ${{ vars.DSO_LLM_STANDARD_MODEL }}
          DSO_LLM_FRONTIER_MODEL: ${{ vars.DSO_LLM_FRONTIER_MODEL }}
          DSO_LLM_TIER:           ${{ vars.DSO_LLM_TIER }}

      - name: Select model by tier
        run: |
          case "$DSO_LLM_TIER" in
            light)    echo "ANTHROPIC_MODEL=$DSO_LLM_LIGHT_MODEL"    >> "$GITHUB_ENV" ;;
            standard) echo "ANTHROPIC_MODEL=$DSO_LLM_STANDARD_MODEL" >> "$GITHUB_ENV" ;;
            frontier) echo "ANTHROPIC_MODEL=$DSO_LLM_FRONTIER_MODEL" >> "$GITHUB_ENV" ;;
            *)
              echo "ERROR: DSO_LLM_TIER='$DSO_LLM_TIER' is not a valid tier." >&2
              echo "Valid values: light, standard, frontier" >&2
              exit 1
              ;;
          esac
        env:
          DSO_LLM_TIER:           ${{ vars.DSO_LLM_TIER }}
          DSO_LLM_LIGHT_MODEL:    ${{ vars.DSO_LLM_LIGHT_MODEL }}
          DSO_LLM_STANDARD_MODEL: ${{ vars.DSO_LLM_STANDARD_MODEL }}
          DSO_LLM_FRONTIER_MODEL: ${{ vars.DSO_LLM_FRONTIER_MODEL }}

      - name: Run LLM code review
        uses: anthropics/claude-code-action@567fe954a4527e81f132d87d1bdbcc94f7737434 # pinned; verify at github.com/anthropics/claude-code-action/releases
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --model ${{ env.ANTHROPIC_MODEL }}
          use_commit_signing: false
          prompt: |
            Review this pull request for correctness, security issues, and design problems.

