# workflow-config.yaml — lockpick-workflow plugin configuration
#
# This file is optional. When present it is read by read-config.sh and used
# by all parameterizable skills (sprint, tdd-workflow, review-protocol, etc.).
#
# Schema reference: docs/workflow-config-schema.json
# Supported version: 1.0.0

# Required: config schema version (semver).
# Increment the minor version when new keys are added.
version: "1.0.0"

# Optional: explicitly declare the project stack.
# When omitted, detect-stack.sh auto-detects from marker files:
#   pyproject.toml   → python-poetry
#   package.json     → node-npm
#   Cargo.toml       → rust-cargo
#   go.mod           → golang
#   Makefile         → convention-based (fallback)
#
# Valid values: python-poetry | node-npm | rust-cargo | golang | convention-based
stack: python-poetry

format:
  # File extensions to process with the auto-format hook.
  # Defaults to ['.py'] when absent.
  # Used by: auto-format.sh (PostToolUse hook)
  extensions: ['.py']

  # Directories to restrict auto-format processing to.
  # Defaults to ['app/src', 'app/tests'] when absent.
  # Used by: auto-format.sh (PostToolUse hook)
  source_dirs: ['app/src', 'app/tests']

ci:
  # Display names of CI jobs used to calibrate adaptive polling in ci-status.sh --wait.
  # All values must match the `name:` field in your CI workflow file exactly.
  # All keys are optional — defaults are shown as the example values below.
  #
  # fast_gate_job: job checked first on any failure (early exit if it failed)
  # fast_fail_job: job whose timeout ends the fast-fail polling phase (30s interval)
  # test_ceil_job: job whose timeout ends the test polling phase (60s interval)
  fast_gate_job: "Fast Gate"
  fast_fail_job: "Fast Gate"
  test_ceil_job: "Unit Tests"

  # GitHub Actions workflow name to check for integration test status.
  # Used by validate-work and CI status checks to poll integration tests separately.
  # When absent, integration workflow status checks are skipped.
  # Type: string (must match the workflow `name:` field exactly)
  # integration_workflow: "Integration Tests"

commands:
  # Full test suite — runs unit + integration + any slow tests.
  # Used by: sprint (post-batch gate), tdd-workflow (green phase)
  test: "make test"

  # Linter — must exit 0 for clean code, non-zero for violations.
  # Used by: review-protocol (pre-commit gate), sprint (lint gate)
  lint: "make lint"

  # Auto-formatter — rewrites files in place.
  # Used by: commit workflow (PostToolUse hook on .py edits)
  format: "make format"

  # Formatting check — exits non-zero if any file needs reformatting.
  # Does NOT modify files. Preferred over `format` in CI.
  # Used by: sprint (format gate), validate command
  format_check: "make format-check"

  # Full validation gate — runs lint + format_check + full tests.
  # This is what /sprint calls before starting an epic.
  # Used by: sprint (--ci mode), validate.sh wrapper
  validate: "./lockpick-workflow/scripts/validate.sh --ci"

  # Unit tests only — fast feedback, no external services required.
  # Used by: tdd-workflow (TDD inner loop), review-protocol (pre-commit)
  test_unit: "make test-unit-only"

  # End-to-end tests — may require a running server or external services.
  # Run in CI; avoid locally unless debugging E2E failures.
  # Used by: sprint (CI gate), post-deploy smoke checks
  test_e2e: "make test-e2e"

  # Visual regression tests — PIL-based screenshot comparison.
  # Run after UI template or CSS changes.
  # Used by: sprint (UI change detection), commit workflow (UI gate)
  test_visual: "make test-visual"

  # Optional callback for project-specific environment checks.
  # When present, check-local-env.sh runs this command after generic checks.
  # When absent, project-specific checks are skipped with a warning.
  # Used by: check-local-env.sh (Project checks section)
  # env_check_app: "make env-check-app"

database:
  # Command to ensure the database is running (start + wait for ready).
  # Combines start and status check into one invocation.
  # Used by: agent-batch-lifecycle.sh preflight --start-db
  ensure_cmd: "make db-start && make db-status"

  # Command to check database status (exit 0 = running, non-zero = stopped).
  # Used by: agent-batch-lifecycle.sh pre-check --db, preflight
  status_cmd: "make db-status"

  # Command to resolve the database port for the current worktree.
  # Receives worktree name as $1 and port type as $2.
  # Used by: agent-batch-lifecycle.sh preflight (port conflict detection)
  port_cmd: "echo 5432"

  # Base database port number. Worktree-specific ports are derived by adding
  # an offset to this value. Defaults to 5432 when absent.
  # Type: integer
  base_port: 5432

infrastructure:
  # Docker container name prefix for worktree-specific containers.
  # Used by: agent-batch-lifecycle.sh cleanup-stale-containers
  container_prefix: "myapp-db-worktree-"

  # Docker Compose project name prefix for worktree-specific stacks.
  # The worktree directory name is appended (e.g., "myapp-db-worktree-XXXX").
  # Used by: agent-batch-lifecycle.sh cleanup-stale-containers
  compose_project: "myapp-db-"

  # Base application port number. Worktree-specific ports are derived by adding
  # an offset to this value. Defaults to 3000 when absent.
  # Type: integer
  app_base_port: 3000

  # Docker Compose files to shut down on session exit.
  # Will be used by: lockpick-workflow/scripts/claude-safe (post-exit Docker cleanup) once wiring is complete (see epic boak).
  # When absent or Docker not on PATH, cleanup step is skipped silently.
  # Type: list of strings
  # compose_files: ['docker-compose.yml', 'docker-compose.db.yml']

session:
  # Command to check session context window usage.
  # Exit 0 = usage IS high (>90%), non-zero = normal.
  # Used by: agent-batch-lifecycle.sh pre-check, context-check
  usage_check_cmd: "$HOME/.claude/check-session-usage.sh"

  # Prefix for /tmp artifact directories used by retro-gather.sh and session hooks.
  # Type: string
  # Default when absent: derived from basename of git repo root + '-test-artifacts'
  #   e.g. repo at /path/to/my-project → prefix is "my-project-test-artifacts"
  # Used by: retro-gather.sh (artifact directory resolution)
  # artifact_prefix: "myproject-test-artifacts"

jira:
  # Jira project key used by `tk sync` for bidirectional ticket synchronization.
  # Env var JIRA_PROJECT takes precedence (allows per-user overrides).
  # Required when using Jira integration.
  project: DTL

issue_tracker:
  # Command to search for existing tickets by substring.
  # Used by: commit-failure-tracker.sh (pre-commit warning hook)
  search_cmd: 'grep -rl'

  # Command to create a new tracking issue.
  # Used by: check-validation-failures.sh, commit-failure-tracker.sh
  create_cmd: 'tk create'

design:
  # Name and version of the design system used by the project.
  # Referenced by: design-onboarding (North Star generation), design-review (compliance checks)
  system_name: "USWDS 3.x"

  # Component library identifier for adapter selection and component lookup.
  # Used by: design-wireframe (adapter selection), design-review (component reuse checks)
  component_library: uswds

  # Template engine used for rendering UI components.
  # Used by: design-wireframe (adapter selection)
  template_engine: jinja2

  # Path to the project's North Star design document (relative to repo root).
  # Defaults to 'DESIGN_NOTES.md' when absent.
  # Used by: design-review (prerequisite check), design-onboarding (output target)
  design_notes_path: DESIGN_NOTES.md

merge:
  # Path to visual baseline snapshots directory (relative to repo root).
  # When absent, merge-to-main.sh skips the baseline intent check entirely.
  # Type: string (relative path)
  # Used by: merge-to-main.sh (baseline intent verification)
  visual_baseline_path: 'app/tests/e2e/snapshots/'

  # GitHub Actions workflow name for `gh workflow run` (must match the workflow
  # name field exactly). When absent, merge-to-main.sh skips the post-push CI
  # trigger recovery step.
  # Type: string
  # Used by: merge-to-main.sh (post-push CI trigger)
  ci_workflow_name: 'CI'

  # Regex pattern for filtering commits when composing the merge message
  # (passed to grep -vE). Commits matching this pattern are excluded from the
  # generated merge commit message.
  # Type: string (regex)
  # Default: '^chore: post-merge cleanup'
  # Used by: merge-to-main.sh (merge message composition)
  message_exclusion_pattern: '^chore: post-merge cleanup'

staging:
  # Base URL of the staging environment.
  # Used by validate-work and staging sub-agents for health checks and smoke tests.
  # url: "https://my-app-env-stage.us-east-2.elasticbeanstalk.com"

  # Path to a deploy-check script or prompt (relative to repo root).
  # File extension determines usage: .sh = shell script, .md = sub-agent prompt.
  # Shell script exit code contract:
  #   0 = healthy (deploy complete and serving traffic)
  #   1 = unhealthy (deploy failed or environment is down)
  #   2 = deploying (still in progress — staging sub-agent retries)
  # deploy_check: "scripts/check-staging-deploy.sh"

  # Path to a staging smoke/acceptance test script or prompt (relative to repo root).
  # File extension determines usage: .sh = shell script, .md = sub-agent prompt.
  # Shell script exit code: 0 = all tests passed, non-zero = one or more failed.
  # test: "scripts/smoke-test-staging.sh"

  # Comma-separated URL paths to health-check on the staging URL.
  # The orchestrator splits on commas at read time (scalar convention for read-config.sh).
  # Default: "/" when absent.
  # routes: "/,/upload,/history"

  # URL path for the primary health endpoint.
  # Default: "/health" when absent.
  # health_path: "/health"

worktree:
  # Command to run after creating a new worktree (relative to repo root).
  # Called by worktree-create.sh as a post-create hook.
  # When absent, worktree-create.sh skips the post-create phase.
  # Used by: worktree-create.sh (post-create phase)
  # post_create_cmd: './scripts/worktree-setup-env.sh'

  # Command to run before launching Claude Code (e.g., start background services).
  # Will be used by: lockpick-workflow/scripts/claude-safe (pre-launch phase) once wiring is complete (see epic boak).
  # When absent, claude-safe skips the service startup step.
  # service_start_cmd: 'make start'

persistence:
  # Source files whose changes require persistence test coverage.
  # Matched using literal string search (grep -F), not regex.
  # Each entry is a path substring; any changed file containing this substring
  # is considered a persistence-critical source file.
  # Used by: check-persistence-coverage.sh (source change detection)
  source_patterns:
    - 'src/core/data_store.py'
    - 'src/services/processor.py'
    - 'src/models/'
    - 'src/adapters/db/'

  # Test files that count as persistence coverage.
  # Matched using extended regex (grep -E), not literal strings.
  # Each entry is a regex pattern; any changed file matching the pattern
  # is considered a valid persistence test.
  # Used by: check-persistence-coverage.sh (coverage verification)
  test_patterns:
    - 'tests/integration/.*test_.*_db_roundtrip'
    - 'tests/integration/.*test_.*persistence'
    - 'tests/e2e/test_cross_worker_'
    - 'tests/e2e/test_post_pipeline_'

tickets:
  # Ticket ID prefix used when generating new ticket IDs.
  # When omitted, tk derives the prefix from the project directory name.
  # Used by: tk create (ID generation)
  prefix: my-project

  # Directory where ticket markdown files are stored (relative to repo root).
  # Defaults to '.tickets' when absent.
  # Used by: tk (all subcommands), ticket sync hooks
  directory: '.tickets'

  sync:
    # Jira project key for ticket sync (optional).
    # Only needed when using `tk sync` with Jira.
    # Used by: tk sync
    jira_project_key: MYPROJ

    # Enable bidirectional comment sync between local tickets and Jira.
    # Defaults to true when absent.
    # Used by: tk sync (comment sync phase)
    bidirectional_comments: true
