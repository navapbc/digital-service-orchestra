description: "red-test-writer agent evals — runtime budget guidance and restructure-or-reject behavior"

providers:
  - id: "anthropic:messages:claude-sonnet-4-6-20260320"

defaultTest:
  options:
    provider: "anthropic:messages:claude-haiku-4-5-20251001"

prompts:
  - id: red-test-writer-runtime-budget
    raw: |
      You are the dso:red-test-writer agent. Your job is to write a failing RED test
      for a given task description, following TDD principles.

      For each test you write, you must estimate how long the test will run in both the
      RED phase (before implementation, expected to fail) and GREEN phase (after
      implementation, expected to pass). Express estimates as positive integer seconds.

      If a unit test's estimated runtime would exceed 10 seconds, you must either:
      1. Restructure the test to bring it under budget (e.g., mock expensive operations,
         eliminate subprocess spawning, reduce filesystem I/O), OR
      2. Reject the test with TEST_RESULT:rejected if restructuring is not feasible.

      A test is a unit test if it has no network calls, no subprocess spawning, and no
      real filesystem I/O beyond temporary directories. Integration and E2E tests are
      exempt from the 10-second budget.

      Output exactly one of these two formats:

      Success format:
      TEST_RESULT:written
      TEST_FILE: <repo-relative path>
      RED_ASSERTION: <what the test asserts, ≤120 chars>
      BEHAVIORAL_JUSTIFICATION: <1-3 sentences on observable behavior tested>
      ESTIMATED_RUNTIME_RED: <positive integer seconds>
      ESTIMATED_RUNTIME_GREEN: <positive integer seconds>

      Rejection format:
      TEST_RESULT:rejected
      REJECTION_REASON: <no_observable_behavior|requires_integration_env|ambiguous_spec|structural_only_possible>
      DESCRIPTION: <2-3 sentences why behavioral test is not feasible>
      SUGGESTED_ALTERNATIVE: <alternative or "none">

      Task description:
      {{prompt}}

tests:
  - description: "Known-slow operation: subprocess spawning triggers restructure or reject"
    vars:
      prompt: |
        Task: Add a function `run_diagnostics()` to `src/utils/diagnostics.py` that spawns
        a subprocess to execute `ps aux` and `df -h`, collects their output, and returns
        a diagnostics report dict with keys `processes` and `disk_usage`.

        The test should verify that run_diagnostics() returns a dict with both required
        keys populated with non-empty strings.
    assert:
      - type: llm-rubric
        value: >
          This task involves subprocess spawning (ps aux, df -h), which makes it slow
          to run as a unit test. The output MUST satisfy at least one of the following:
          (1) If TEST_RESULT:written — the output must include ESTIMATED_RUNTIME_RED and
          ESTIMATED_RUNTIME_GREEN fields as positive integers, AND the estimated runtime
          must be ≤ 10 seconds (meaning the agent restructured the test to avoid actual
          subprocess spawning, e.g., by mocking subprocess.run or subprocess.check_output);
          OR
          (2) If TEST_RESULT:rejected — the rejection must acknowledge that subprocess
          spawning makes the test slow and explain why restructuring (e.g., mocking) is
          not feasible for this particular test.
          The output FAILS this rubric if:
          - TEST_RESULT:written is returned WITHOUT ESTIMATED_RUNTIME_RED and
            ESTIMATED_RUNTIME_GREEN fields, OR
          - TEST_RESULT:written is returned with runtime estimates exceeding 10 seconds
            without restructuring, OR
          - The agent ignores the runtime concern entirely and writes a test with real
            subprocess calls with no runtime estimate.

  - description: "Known-slow operation: sleep-based timing function triggers restructure-or-reject"
    vars:
      prompt: |
        Task: Add a function `wait_for_condition(predicate, timeout_seconds=30)` to
        `src/utils/polling.py` that polls a predicate function every second until it
        returns True or timeout_seconds elapses.

        The test should verify that wait_for_condition raises TimeoutError when the
        predicate never returns True within the timeout.
    assert:
      - type: llm-rubric
        value: >
          This task involves a polling/sleep loop with a default 30-second timeout,
          making a naive unit test extremely slow. The output MUST satisfy at least
          one of the following:
          (1) If TEST_RESULT:written — the output must include ESTIMATED_RUNTIME_RED and
          ESTIMATED_RUNTIME_GREEN fields as positive integers, AND the estimated runtime
          must be ≤ 10 seconds (meaning the agent restructured the test, e.g., by
          patching time.sleep to a no-op and using a very short timeout, or mocking
          the predicate to return True immediately for the happy path test);
          OR
          (2) If TEST_RESULT:rejected — the rejection must explain that the timing
          function's sleep dependency makes it difficult to test without mocking and
          describe a concrete restructuring approach that was considered.
          The output FAILS this rubric if:
          - TEST_RESULT:written is returned WITHOUT ESTIMATED_RUNTIME_RED and
            ESTIMATED_RUNTIME_GREEN fields, OR
          - TEST_RESULT:written is returned with estimated runtime > 10 seconds
            (a test that actually waits 30 seconds violates the budget).

  - description: "Fast unit test: includes ESTIMATED_RUNTIME fields with reasonable estimates"
    vars:
      prompt: |
        Task: Add a function `normalize_tag(tag: str) -> str` to `src/utils/tags.py`
        that lowercases the tag, strips whitespace, and replaces spaces with hyphens.
        Example: `normalize_tag("  Hello World  ")` returns `"hello-world"`.

        Write a test that verifies the normalization behavior.
    assert:
      - type: llm-rubric
        value: >
          This task involves a pure string transformation function — fast, no I/O, no
          subprocess. The output MUST satisfy ALL of the following:
          (1) TEST_RESULT:written (rejection is not appropriate for a trivially testable
          pure function),
          (2) The output includes ESTIMATED_RUNTIME_RED as a positive integer,
          (3) The output includes ESTIMATED_RUNTIME_GREEN as a positive integer,
          (4) Both runtime estimates are ≤ 10 seconds (a pure string function test
          should be nearly instantaneous),
          (5) RED_ASSERTION describes verifying the normalization behavior (e.g.,
          lowercasing, stripping, hyphen replacement).
          The output FAILS this rubric if ESTIMATED_RUNTIME_RED or ESTIMATED_RUNTIME_GREEN
          are absent, if either value is not a positive integer, or if TEST_RESULT:rejected
          is returned for this clearly testable function.

  - description: "Heavy I/O operation: large file processing triggers restructure consideration"
    vars:
      prompt: |
        Task: Add a function `index_files(directory: str) -> dict` to
        `src/indexer/file_indexer.py` that walks a directory tree using os.walk,
        reads every file's content with open(), hashes it with hashlib.sha256, and
        returns a dict mapping file paths to their hash values.

        The test should verify that index_files returns a dict with file paths as keys
        and 64-character hex strings as values for a directory containing at least one file.
    assert:
      - type: llm-rubric
        value: >
          This task involves heavy filesystem I/O (reading every file in a directory
          tree), which can be slow for large directories. The output MUST satisfy at
          least one of the following:
          (1) If TEST_RESULT:written — the output must include ESTIMATED_RUNTIME_RED and
          ESTIMATED_RUNTIME_GREEN fields as positive integers, AND the test must use a
          small temporary directory fixture (not a real large directory) to keep runtime
          ≤ 10 seconds. The estimated runtime must be ≤ 10 seconds;
          OR
          (2) If TEST_RESULT:rejected — the rejection must explain why even with temp
          directory isolation the test cannot be brought under budget.
          The output FAILS this rubric if:
          - ESTIMATED_RUNTIME_RED or ESTIMATED_RUNTIME_GREEN are absent when
            TEST_RESULT:written is returned, OR
          - The test is written without any acknowledgment of I/O cost and runtime
            mitigation (e.g., using a real large directory without isolation).
