description: "design-wireframe skill evals — complexity triage, lite/full track routing, and design output"

providers:
  - id: "anthropic:messages:claude-haiku-4-5-20251001"

defaultTest:
  options:
    provider: "anthropic:messages:claude-haiku-4-5-20251001"

prompts:
  - |
    You are the design-wireframe skill for a software development workflow tool.
    Your job is to create wireframe designs for ticket stories by triaging complexity
    and producing either a lightweight Design Brief (Lite track) or a full Design
    Manifest (Full track) depending on the story scope.

    Key behaviors:

    Complexity triage (Step 0):
    - Classify the story into Lite or Full track based on:
      Lite: modifies ≤2 existing components, introduces 0 new components, no new pages
            or routes, no complex state management
      Full: new page/route, new component needed, 3+ components modified, complex state,
            major layout change
    - If ambiguous, default to Lite
    - If --full flag is present in arguments, skip triage and go directly to Full track
    - Announce classification: "Classified as [Lite/Full] — [one-line reason]"

    Lite track output (Design Brief):
    - Produces a single brief.md in designs/<uuid>/
    - Brief structure: Change Summary, Affected Components table, Visual Specification,
      Accessibility Notes, States
    - Links brief to story via ticket comment
    - Self-review: covers all acceptance criteria, component paths accurate,
      design token names valid, accessibility impact correct

    Full track output (Design Manifest):
    - Full pipeline: Phase 1 (story & context loading) through Phase 6
    - Produces JSON spatial layout tree, SVG wireframe, design token overlay, manifest
    - Dispatches multiple reviewer sub-agents (accessibility, design-systems, frontend,
      product)
    - Checks for resume point (designs/**/progress.json) before starting

    Figma collaboration mode (when design.figma_collaboration=true):
    - Check design.figma_collaboration config at startup (via read-config.sh)
    - All design artifacts are stored in designs/<uuid>/ directory (e.g. designs/<uuid>/wireframe.svg)
    - When enabled, augment wireframe.svg in designs/<uuid>/ with Figma import requirements:
      * Semantic <g id="..."> group names matching spatial-layout.json component IDs
        (no auto-generated names like "Group 1" or "Layer 2")
      * Inline styles only (style="fill: #...; ...") — no <style> blocks, no CSS classes,
        no external stylesheets; Figma requires inline styles for SVG import
      * Valid SVG 1.1: xmlns="http://www.w3.org/2000/svg" + version="1.1" (not SVG 2.0)
      * Element IDs on all interactive/labeled elements matching spatial-layout.json IDs
    - After manifest assembly, perform Figma finalization (these steps are mandatory):
      * Add *.png to designs/<uuid>/.gitignore
      * Source figma-tags.conf constants; tag story ticket with design:awaiting_import
      * Post a ticket comment with Figma import instructions
    - When design.figma_collaboration is absent, empty, or not "true", skip all Figma logic

    Core design principles:
    - Accessibility-first: WCAG 2.1 AA minimum
    - Component reuse over new components
    - Progressive disclosure
    - Proportional effort: match rigor to scope

    The user says:
    {{prompt}}

tests:
  - description: "Lite track: copy/text change classified as Lite and produces Design Brief"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are processing story STORY-1042: "Update the empty state message on the
        dashboard from 'No data available' to 'No reports yet. Create your first report
        to get started.' Acceptance criteria: the new message appears when the dashboard
        has zero reports."
        Triage this story and explain what track you select and why. Then describe
        the output artifact you will produce.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Classifies the story as Lite track (not Full)
          2. States a one-line reason consistent with Lite criteria (text/copy change,
             modifies existing component, no new page/route/component)
          3. Announces classification with format "Classified as Lite — <reason>"
          4. Describes producing a Design Brief (brief.md), NOT a full Design Manifest
          5. Does NOT route to the Full track pipeline (no mention of Phase 1-6 manifest,
             SVG wireframe, or reviewer committee dispatch)

  - description: "Full track: new page with form classified as Full and routes to manifest pipeline"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are processing story STORY-2077: "Add a new Settings page where users can
        update their notification preferences. The page should include a form with
        email toggle, push notification toggle, and frequency dropdown. Acceptance
        criteria: new /settings/notifications route exists, all form fields save
        on submit."
        Triage this story and explain what track you select and why. Then describe
        what artifacts you will produce.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Classifies the story as Full track (not Lite)
          2. States a reason referencing at least one Full criterion (new page/route,
             new component, complex state, or major layout change)
          3. Announces classification with format "Classified as Full — <reason>"
          4. Describes producing a full Design Manifest or multi-artifact output
             (not just a brief.md)
          5. Does NOT route to the Lite track (no mention of brief.md as the sole artifact)

  - description: "Force Full: --full flag bypasses triage and goes directly to Full track"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are invoked with arguments "STORY-1042 --full". Story STORY-1042 is a
        simple text change (Lite by default criteria). However the --full flag is
        present in the invocation. Explain how you handle the --full flag and what
        track you use.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Recognizes the --full flag in the arguments
          2. Skips complexity triage — does NOT classify the story as Lite
          3. Goes directly to the Full track pipeline regardless of story simplicity
          4. Strips --full from the story ID before using it (uses STORY-1042 not
             "STORY-1042 --full" as the identifier)
          5. Does NOT produce a Lite brief.md as the output artifact

  - description: "Ambiguous story defaults to Lite track"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are processing story STORY-3301: "Improve the layout of the user card
        component to better highlight the user's role badge." The story is ambiguous —
        it modifies one existing component but might require a layout change.
        Explain how you classify this story when the complexity is unclear.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Acknowledges the ambiguity in the story classification
          2. Defaults to Lite track due to the ambiguity (does NOT choose Full
             when classification is unclear)
          3. Mentions that the user or reviewer can escalate to Full if more detail
             is needed (references --full flag or escalation path)
          4. Does NOT require additional information before making a classification
             decision — defaults to Lite rather than blocking

  - description: "Accessibility-first: design brief includes accessibility notes for color/visibility changes"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are producing a Lite Design Brief for story STORY-4412: "Change the
        error message text color from red (#FF0000) to a darker red (#C0392B) for
        better visibility." Describe what the Accessibility Notes section of the
        brief must include.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Includes or describes including an Accessibility Notes section in the brief
          2. Mentions WCAG color contrast requirements (WCAG 2.1 AA or specific contrast ratio)
          3. Notes that both the old (#FF0000) and new (#C0392B) colors should be
             evaluated for contrast against the background
          4. Does NOT write "No accessibility impact" for a color change — color changes
             always require contrast assessment
          5. References checking contrast for the affected element (error message text)

  - description: "Component reuse: design prefers existing components over new ones"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are designing for story STORY-5501: "Add a confirmation dialog before
        users delete their account." The project already has a Modal component and
        a ConfirmationDialog component in the component library.
        Describe your approach for this design task.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Prioritizes using the existing ConfirmationDialog or Modal component
             rather than proposing a new custom component
          2. Does NOT propose creating a new component when an existing one is available
          3. Mentions checking the existing component library or UI Discovery Cache
             for relevant components
          4. Frames reuse as the default approach (new components only when existing
             ones cannot support the required UX)

  - description: "Figma collaboration: design.figma_collaboration=true produces Figma-optimized SVG output and tags story"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are processing story STORY-7701: "Add a new dashboard widget that displays
        active user count with a sparkline chart." This story has Figma collaboration
        enabled (design.figma_collaboration=true in the project config). The project
        has a spatial layout file at designs/STORY-7701/spatial-layout.json with IDs
        "widget-container", "count-label", and "sparkline-chart".
        Describe how you handle the Figma collaboration mode: what SVG requirements
        do you apply, how you name the SVG groups, what SVG version you target, what
        inline style requirements exist, and how you tag the story after producing
        the design artifacts.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Recognizes that design.figma_collaboration=true is enabled and enters
             Figma collaboration mode
          2. References producing SVG output with Figma-optimized requirements,
             including semantic <g> element names that match the IDs from
             spatial-layout.json (e.g., widget-container, count-label, sparkline-chart)
          3. Specifies targeting SVG 1.1 (not SVG 2.0 or unspecified) for Figma
             import compatibility
          4. Mentions using inline styles on SVG elements (not external CSS or
             CSS classes) as required for Figma import
          5. Creates or references the designs/{uuid}/ directory for output artifacts
          6. Tags or describes tagging the story ticket with design:awaiting_import
             after producing the design artifacts

  - description: "Figma opt-out: design.figma_collaboration absent produces no Figma artifacts"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are processing story STORY-8801: "Add a new dashboard widget that displays
        active user count with a sparkline chart." The project config does NOT have
        design.figma_collaboration set (the flag is absent). Describe what design
        artifacts you produce and whether you apply any Figma-specific steps.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Does NOT apply Figma collaboration mode — the design.figma_collaboration
             flag is absent, so all Figma logic must be skipped entirely
          2. Does NOT mention adding *.png to a .gitignore file
          3. Does NOT tag or describe tagging the story with design:awaiting_import
          4. Does NOT describe adding Figma import instructions as a ticket comment
          5. Does NOT mention SVG requirements specific to Figma import (e.g. inline
             styles only, semantic <g> group IDs matching spatial-layout.json,
             SVG 1.1 targeting for Figma compatibility)
          6. Produces standard design output (Design Brief for Lite track or Design
             Manifest for Full track) without any Figma-specific augmentation

  - description: "Lite self-review: brief covers all acceptance criteria before finalizing"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You have just written a Design Brief for story STORY-6102. The story has
        three acceptance criteria:
        (1) The button text changes to "Save Changes",
        (2) The button is disabled while the form has unsaved changes,
        (3) A success toast appears after saving.
        Your brief only covers criteria (1) and (3). Describe what you do in
        the Lite self-review step.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Identifies that the brief does NOT cover all acceptance criteria
             (criterion 2 — disabled state — is missing)
          2. Describes fixing the brief to add the missing criterion before finalizing
          3. Does NOT finalize or link the brief to the story while a criterion is uncovered
          4. Mentions that the self-review checks that all acceptance criteria are covered
