description: "sprint skill evals — multi-agent epic orchestration"

providers:
  - id: "anthropic:messages:claude-haiku-4-5-20251001"

defaultTest:
  options:
    provider: "anthropic:messages:claude-haiku-4-5-20251001"

prompts:
  - |
    You are the sprint orchestrator skill for a software development workflow tool.
    Your job is to execute epics end-to-end by decomposing them into batches,
    dispatching sub-agents, and managing the lifecycle of tasks from open to closed.

    Key behaviors:
    - Preplanning gate: detect whether stories need decomposition before execution
    - Batch management: group ready tasks into parallel batches (max 5)
    - Sub-agent dispatch: each task runs as an independent sub-agent
    - Completion verification: dispatch dso:completion-verifier before closing stories
    - Gap classification: when validation fails, classify gaps as intent_gap or implementation_gap
    - Signal routing: handle STATUS:complete, STATUS:blocked, REPLAN_ESCALATE from sub-skills

    Signal format contracts:
    - Gap classification output: GAP_CLASSIFICATION: <intent_gap|implementation_gap> ROUTING: <brainstorm|implementation-plan> EXPLANATION: <reason>
    - intent_gap: the SC contradicts the system's documented intent (requires user confirmation + brainstorm)
    - implementation_gap: the intent is clear but implementation is incomplete (autonomous remediation via implementation-plan)
    - Confidence signal: 2+ UNCERTAIN signals per story triggers re-planning via implementation-plan
    - Non-interactive mode: when user is absent, defer blocking actions as INTERACTIVITY_DEFERRED: <gate_name> ticket comments
    - Replan trigger notation: REPLAN_TRIGGER: <failure|validation|review> records why re-planning was triggered
    - Drift detection: at sprint entry, compare task file impact against recent git history; flag stale tasks for re-planning
    - Story validation failure (all tasks closed but done definition fails): create TDD remediation tasks (RED test first, then fix) via implementation-plan
    - Out-of-scope review findings: route accepted findings to implementation-plan between batches (not mid-batch)
    - REPLAN_ESCALATE from implementation-plan: present to user with options (a) route to brainstorm, (b) proceed, (c) abort. Check cycle cap (replan_cycle_count vs max_replan_cycles)
    - Worktree isolation dispatch: before Phase 4 sub-agent launch, read worktree.isolation_enabled config. When true: add isolation:"worktree" to each Agent/Task dispatch call. When false, empty, or absent: omit the isolation parameter entirely — use standard dispatch with no isolation block.
    - Per-worktree serial review (Phase 5): when worktree.isolation_enabled=true and sub-agents returned with isolation:worktree, process each worktree serially using per-worktree-review-commit.md (review → commit → merge for each worktree before moving to the next). Batch review (Step 7) and batch commit (Step 10) apply only in shared-directory mode (isolation_enabled=false). In worktree isolation mode, git log on the session branch shows one commit per worktree; merge-to-main.sh runs once at session end (Phase 8), not per worktree.

    The user says:
    {{prompt}}

tests:
  - description: "Gap classification: detects intent_gap when SC contradicts closed architectural decision"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        Sprint Phase 7 receives a failing SC: 'Users can authenticate via Google OAuth'.
        The completion-verifier explains: 'No OAuth implementation found — code search shows
        OAuth was explicitly removed in closed ticket arch-decision-0042 due to compliance
        requirement LR-2025-004 (no third-party identity providers).'
        Ask the orchestrator to classify this gap.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Output contains GAP_CLASSIFICATION: intent_gap
          2. Output contains ROUTING: brainstorm
          3. Output indicates user confirmation is required before invoking brainstorm
          4. Does NOT contain ROUTING: implementation-plan

  - description: "Gap classification: detects implementation_gap when SC has partial implementation"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        Sprint Phase 7 receives a failing SC: 'Export button downloads data as CSV'.
        The completion-verifier explains: 'The /api/export endpoint exists and returns 200,
        but the CSV format handler (csv_formatter.py) is missing — endpoint returns JSON
        instead of CSV.'
        Ask the orchestrator to classify this gap.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Output contains GAP_CLASSIFICATION: implementation_gap
          2. Output contains ROUTING: implementation-plan
          3. Does NOT require user confirmation for this classification
          4. Does NOT contain ROUTING: brainstorm

  - description: "Drift detection: orchestrator checks file impact drift at sprint entry"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are about to begin sprint execution on epic auth-4f2a, which has 3 open tasks.
        Task task-001 lists file impact: ['src/auth/login.py', 'tests/unit/test_login.py'].
        Since task-001 was created, 4 external commits have modified src/auth/login.py
        and added a new dependency src/auth/oauth_provider.py that task-001 does not
        reference. The task was created 6 days ago.
        How should the orchestrator handle this situation at sprint entry?
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Mentions drift detection, file impact drift, or stale file impact as a concern
          2. Indicates the orchestrator should compare or re-check the task's file impact list against recent git history or current codebase state
          3. Suggests re-invoking implementation-plan, refreshing file impact, or flagging the task for re-planning before execution
          4. Does NOT proceed directly to executing the task without acknowledging the drift

  - description: "Confidence signal: double UNCERTAIN routes task to implementation-plan"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the sprint orchestrator in Phase 5 post-batch processing.
        Story story-auth-42 has two tasks: task-a1 and task-a2, both under the same story.
        In the previous batch, task-a1 returned: STATUS:pass, UNCERTAIN:The token refresh
        logic passes unit tests but I could not exercise the full OAuth callback path.
        In this batch, task-a2 returned: STATUS:pass, UNCERTAIN:The session invalidation
        path is partially tested — happy path only, edge cases with concurrent sessions
        were not covered.
        Both tasks are under story story-auth-42. The UNCERTAIN count for story story-auth-42
        is now 2 (one from each task, tracked per story not per task ID).
        What action should the orchestrator take now?
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Routes to implementation-plan for re-planning (mentions implementation-plan, re-planning, or additional tasks)
          2. Acknowledges the 2 UNCERTAIN signals per story (story-auth-42) as the trigger
          3. Does NOT silently close or commit the tasks without surfacing the uncertainty
          4. Does NOT require a third UNCERTAIN signal before escalating — threshold is 2

  - description: "Story validation failure: all tasks closed but validation fails triggers remediation via TDD"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the sprint orchestrator in Phase 6 (story closure).
        Story story-payments-17 has 3 tasks: task-p1, task-p2, task-p3 — all are closed.
        You dispatch dso:completion-verifier for story-payments-17.
        The verifier returns: RESULT:FAIL — done definition 'Payment flow completes without
        error for all supported card types' is not satisfied. The Stripe test suite for
        AMEX card type fails with a 422 validation error in checkout_service.py line 88.
        All tasks were previously marked closed.
        What action should the orchestrator take?
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Invokes or mentions invoking implementation-plan to create remediation tasks for the failing done definition
          2. Follows TDD flow — mentions creating a RED test task (failing test) before an implementation fix task
          3. Records or mentions REPLAN_TRIGGER: validation (or equivalent notation indicating validation triggered re-planning)
          4. Does NOT close the story or mark it complete while the done definition is failing
          5. Does NOT silently skip or ignore the completion-verifier FAIL result

  - description: "Out-of-scope review feedback: accepted findings for files outside task scope route to implementation-plan between batches"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the sprint orchestrator in Phase 5 post-batch processing.
        The current batch contained task-auth-01, whose file impact list is:
        ['src/auth/login.py', 'tests/unit/test_login.py'].
        After the batch completed, /dso:review ran on task-auth-01's changes and returned
        a finding: SEVERITY: important — The token expiry logic in src/auth/session.py
        does not invalidate sessions on password change. This file is not in task-auth-01's
        file impact list (src/auth/session.py was not in scope for this task).
        The orchestrator has evaluated the finding and accepted it (decided not to defend).
        The current batch is now fully complete.
        What should the orchestrator do next?
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          The output must satisfy ALL of the following:
          1. Creates a new task or routes to implementation-plan to address the out-of-scope file (src/auth/session.py)
          2. Acknowledges this happens between batches (the current batch is complete)
          3. Does NOT silently discard or ignore the accepted out-of-scope finding
          4. Does NOT modify task-auth-01's scope — creates a separate new task instead

  - description: "Non-interactive mode: brainstorm escalation deferred via INTERACTIVITY_DEFERRED"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the sprint orchestrator running in non-interactive mode (no user present).
        Sprint is executing epic auth-9f1a. Implementation-plan was invoked for story
        story-auth-07 and returned: REPLAN_ESCALATE: brainstorm EXPLANATION: The session
        expiry requirements conflict with the existing stateless JWT architecture — the
        story intent needs brainstorm-level re-examination before tasks can be drafted.
        The replan_cycle_count is 1 and max_replan_cycles is 2.
        Because this is a non-interactive session, you cannot block for user confirmation.
        What should the orchestrator do?
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Records INTERACTIVITY_DEFERRED: brainstorm on the epic ticket (mentions ticket comment or INTERACTIVITY_DEFERRED signal)
          2. Does NOT invoke /dso:brainstorm or ask the user for input — brainstorm escalation is deferred, not executed
          3. Does NOT write REPLAN_RESOLVED (no resolved signal is emitted because brainstorm was not completed)
          4. Indicates the story remains blocked pending a follow-up interactive session
          5. Mentions the REPLAN_ESCALATE signal or the brainstorm escalation requirement as the reason for deferral

  - description: "Out-of-scope review REPLAN_ESCALATE: implementation-plan cannot satisfy out-of-scope story triggers cascade with cycle cap"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the sprint orchestrator in Step 13a (out-of-scope review routing).
        After the current batch, sprint-review-scope-check.sh found 1 out-of-scope
        finding for story story-session-05 (file: src/auth/session.py).
        You invoked /dso:implementation-plan on story-session-05.
        Implementation-plan returned: REPLAN_ESCALATE: brainstorm EXPLANATION: The session
        invalidation requirement conflicts with the existing token refresh architecture.
        The current replan_cycle_count is 1 and max_replan_cycles is 2.
        What should the orchestrator do?
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Presents the REPLAN_ESCALATE signal to the user (does NOT autonomously invoke brainstorm)
          2. Checks or mentions the cascade cycle cap (replan_cycle_count vs max_replan_cycles)
          3. Offers the user options including route to brainstorm, proceed as-is, or abort
          4. Records or mentions REPLAN_TRIGGER: review before presenting to user
          5. Does NOT silently discard the REPLAN_ESCALATE signal or proceed without user input

  - description: "Worktree isolation dispatch: when worktree.isolation_enabled=true, Phase 4 sub-agents are dispatched with isolation:worktree"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the sprint orchestrator entering Phase 4 (sub-agent dispatch) for epic
        payments-epic-7a2b. The dso-config.conf contains worktree.isolation_enabled=true.
        You have 3 ready tasks: task-pay-01, task-pay-02, task-pay-03 — all grouped into
        a single batch of 3 parallel sub-agents.
        Describe how you dispatch each sub-agent, including what isolation parameters or
        context you pass to each Agent tool call. Show the dispatch configuration you would
        use for each sub-agent in this batch.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Includes isolation:worktree (or equivalent worktree isolation parameter) in the
             Agent dispatch configuration for the sub-agents
          2. Indicates each sub-agent runs in an isolated worktree environment (not a shared
             directory) — may use phrasing like "isolation: worktree", "worktree isolation",
             "isolated worktree context", or equivalent
          3. Mentions that worktree.isolation_enabled=true is the trigger for this dispatch mode
          4. Dispatches all 3 tasks as parallel sub-agents (batch of 3)
          5. Does NOT use shared-directory or non-isolated dispatch mode when isolation is enabled

  - description: "Phase 5 per-worktree serial review: when worktree isolation is enabled, each worktree is reviewed and committed separately before the next worktree starts"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the sprint orchestrator in Phase 5 post-batch processing.
        worktree.isolation_enabled=true is set in dso-config.conf.
        The batch contained 3 tasks dispatched to isolated worktrees:
        task-pay-01 (worktree: wt-pay-01), task-pay-02 (worktree: wt-pay-02),
        task-pay-03 (worktree: wt-pay-03). All 3 sub-agents returned STATUS:pass.
        You need to run review and commit for these worktrees in Phase 5 Steps 7 and 10.
        Does your sprint SKILL.md instruct you to run review and commit on a
        per-worktree basis (serially, one worktree at a time) using the
        per-worktree-review-commit.md workflow? Cite the specific step or section
        in your sprint instructions that establishes this per-worktree serial
        review-then-commit behavior when worktree isolation is enabled.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Cites or references a specific step, section, or document name from
             sprint SKILL.md instructions that establishes per-worktree serial
             review-and-commit behavior (e.g., "per-worktree-review-commit.md",
             "Phase 5 Step X", or equivalent sprint-specific instruction)
          2. Confirms that sprint SKILL.md explicitly instructs per-worktree serial
             processing (review → commit for one worktree before moving to the next)
             rather than batch-level review of all worktrees together
          3. Does NOT say the sprint instructions are silent or missing on this topic
          4. Does NOT rely on general reasoning or inference — must cite sprint
             SKILL.md or per-worktree-review-commit.md as the source of this rule

  - description: "Design filter: stories tagged design:awaiting_import are excluded from dispatch and surfaced in Awaiting designer input section"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the sprint orchestrator beginning Phase 2 (Task Analysis) for epic
        checkout-epic-3b9c. The epic has 4 stories:
        - story-checkout-01: "As a user, I can complete checkout" (tags: [])
        - story-checkout-02: "As a user, I can review my cart" (tags: [design:awaiting_import])
        - story-checkout-03: "As a user, I can apply promo codes" (tags: [design:awaiting_import])
        - story-checkout-04: "As a user, I can save payment methods" (tags: [])
        The dso-config.conf contains design.figma_staleness_days=7.
        Story-checkout-02 and story-checkout-03 are tagged design:awaiting_import,
        meaning their Figma designs have not yet been imported or finalized.
        How should the sprint orchestrator handle these stories during Phase 2 task
        analysis and Phase 4 sub-agent dispatch? What does the status section look like?
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Excludes story-checkout-02 and story-checkout-03 from implementation-plan dispatch (does NOT invoke implementation-plan for design:awaiting_import stories)
          2. Excludes story-checkout-02 and story-checkout-03 from task execution dispatch in Phase 4 (does NOT dispatch sub-agents for those stories)
          3. Surfaces story-checkout-02 and story-checkout-03 in an "Awaiting designer input" section or status area (uses that phrase or equivalent)
          4. References the staleness warning using design.figma_staleness_days or mentions the 7-day staleness threshold
          5. Continues to process story-checkout-01 and story-checkout-04 normally (does NOT block the entire epic)

  - description: "Design context dispatch: when a story has design:approved, Phase 4 sub-agent dispatch includes manifest path, revision image path, sonnet minimum, and precedence rules"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the sprint orchestrator entering Phase 4 (sub-agent dispatch) for epic
        checkout-epic-8f3d. Story story-checkout-11 is tagged design:approved and has the
        following design artifacts:
          - manifest path: .claude/designs/checkout/manifest.json
          - revision image path: .claude/designs/checkout/revision-3.png
        You have one ready task under story-checkout-11: task-checkout-11a.
        Describe exactly what context you pass to the sub-agent dispatched for task-checkout-11a,
        including: (1) which design files are included, (2) the minimum model tier required,
        (3) how manifest vs. image precedence is communicated, and (4) how contradictions
        between manifest behavior and the revision image should be flagged.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Includes the manifest path (.claude/designs/checkout/manifest.json or equivalent
             manifest path) in the sub-agent dispatch context
          2. Includes the revision image path (.claude/designs/checkout/revision-3.png or
             equivalent revision image path) in the sub-agent dispatch context
          3. Specifies a minimum model tier of sonnet (or higher) to support multimodal image
             processing — haiku-only dispatch is NOT acceptable when a revision image is present
          4. Communicates a precedence rule: manifest defines behavior (source of truth for
             logic/behavior) and revision image defines visual appearance
          5. Instructs the sub-agent to flag contradictions between the manifest and the revision
             image using [NEEDS_REVIEW] or equivalent contradiction-flagging notation

  - description: "Worktree isolation dispatch (negative): when worktree.isolation_enabled=false, sprint uses shared-directory fallback — NOT isolation:worktree"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the sprint orchestrator entering Phase 4 (sub-agent dispatch) for epic
        payments-epic-7a2b. The dso-config.conf contains worktree.isolation_enabled=false.
        You have 3 ready tasks: task-pay-01, task-pay-02, task-pay-03 — all grouped into
        a single batch of 3 parallel sub-agents.
        Describe how you dispatch each sub-agent, including what isolation parameters or
        context you pass to each Agent tool call. Show the dispatch configuration you would
        use for each sub-agent in this batch.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Does NOT include isolation:worktree or worktree isolation parameters in the
             sub-agent dispatch — worktree isolation must NOT be used when disabled
          2. Uses shared-directory mode, standard dispatch, or no isolation parameter (the
             fallback behavior when worktree.isolation_enabled=false)
          3. Indicates that isolation_enabled=false (or absent) means sub-agents share the
             working directory, NOT isolated worktrees
          4. Dispatches all 3 tasks as parallel sub-agents (batch of 3)
          5. Does NOT apply worktree isolation parameters when the config disables isolation

  - description: "testing_mode=GREEN: sprint skips RED test dispatch and validates existing tests pass"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the sprint orchestrator in Phase 4 (sub-agent dispatch).
        You are about to dispatch task-refactor-auth-03. The task output from implementation-plan
        includes: testing_mode=GREEN. The task description says: 'Refactor auth token validation
        into a shared helper — existing unit tests in tests/unit/test_auth.py already cover this
        behavior.'
        The standard sprint flow dispatches dso:red-test-writer before implementation for each
        task. Given that testing_mode=GREEN is set on this task, what should the sprint
        orchestrator do regarding the RED test dispatch step (dso:red-test-writer)?
        Explain how testing_mode=GREEN changes the task execution flow.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Skips the RED test dispatch step — does NOT invoke or mention dispatching
             dso:red-test-writer for this task when testing_mode=GREEN
          2. Explicitly acknowledges that testing_mode=GREEN is the reason for skipping
             RED test creation (references the testing_mode field value)
          3. Indicates the orchestrator proceeds directly to implementation (or proceeds
             without a new failing test) since existing tests already cover the behavior
          4. Mentions validating that existing tests pass after implementation (green
             validation, running existing tests, or equivalent)
          5. Does NOT treat testing_mode=GREEN as equivalent to testing_mode=RED or ignore
             the testing_mode field

  - description: "testing_mode=UPDATE: sprint routes to modify-existing-test behavior instead of RED test creation"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the sprint orchestrator in Phase 4 (sub-agent dispatch).
        You are about to dispatch task-api-change-07. The task output from implementation-plan
        includes: testing_mode=UPDATE. The task description says: 'Update the /api/checkout
        endpoint to return itemized tax breakdown — existing tests in tests/unit/test_checkout.py
        assert the old response shape and must be updated to match the new schema.'
        The standard sprint flow dispatches dso:red-test-writer (to write a new failing test)
        before implementation. Given that testing_mode=UPDATE is set on this task, explain
        how the orchestrator should change the test-handling step. What happens to the existing
        tests? Should dso:red-test-writer be dispatched?
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Does NOT dispatch dso:red-test-writer as the test step — UPDATE mode routes to
             modifying existing tests, not writing a new failing test from scratch
          2. Explicitly references testing_mode=UPDATE as the routing signal that changes
             the test-handling behavior
          3. Indicates that existing tests should be updated or modified to reflect the new
             behavior (mentions updating, modifying, or adjusting existing tests)
          4. Does NOT conflate UPDATE mode with RED mode (must NOT describe writing a brand
             new failing test as the primary test step for this task)
          5. Describes a flow where the existing tests are changed before or alongside
             implementation to reflect the new expected behavior

  - description: "testing_mode absent: sprint defaults to RED behavior for backward compatibility"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the sprint orchestrator in Phase 4 (sub-agent dispatch).
        You are about to dispatch task-legacy-05. The task output from implementation-plan
        does NOT include a testing_mode field. The task was created before the testing_mode
        feature was introduced. The task description says: 'Add email validation to the
        user registration form.'
        Given that testing_mode is absent from this task, what test-writing behavior should
        the sprint orchestrator apply? Should dso:red-test-writer be dispatched? Explain
        how the orchestrator handles backward compatibility for tasks that predate the
        testing_mode field.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Dispatches or mentions dispatching dso:red-test-writer (RED test writing) as
             the default behavior when testing_mode is absent
          2. Explicitly states or implies backward compatibility — tasks without testing_mode
             default to RED behavior (the existing behavior before this feature was introduced)
          3. Does NOT skip RED test creation or treat the absent field as equivalent to
             testing_mode=GREEN or testing_mode=UPDATE
          4. Indicates that the missing testing_mode field is handled gracefully (no error,
             no crash — defaults to current RED flow)
          5. Does NOT require testing_mode to be present for the orchestrator to function
             correctly — absence is a valid state that maps to RED

  # REVIEW-DEFENSE: MAX_AGENTS eval tests below are TDD RED state — they must fail against current SKILL.md (which only handles MAX_AGENTS: 1|5). Implementation tasks will add unlimited/0 handling and make them pass (GREEN).
  - description: "MAX_AGENTS unlimited: sprint dispatches all ready tasks in a single batch with no cap"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the sprint orchestrator entering Phase 3 (batch formation).
        The agent-batch-lifecycle.sh pre-check returned: MAX_AGENTS: unlimited
        You have 12 ready tasks for epic payments-epic-3c4d.
        How many sub-agents do you dispatch in this batch? Do you split into
        multiple batches of 5? Cite the specific sprint SKILL.md instruction
        that governs the MAX_AGENTS: unlimited case.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Dispatches all 12 ready tasks in a single batch — does NOT cap at 5
          2. Explicitly references MAX_AGENTS: unlimited as the signal that removes
             the batch size cap
          3. Cites a specific sprint SKILL.md instruction, step, or section that
             documents the unlimited dispatch behavior
          4. Does NOT split into batches of 5 or reference a "max 5" batch size limit
             when MAX_AGENTS is unlimited
          5. Does NOT say the sprint instructions are silent on the unlimited case

  - description: "MAX_AGENTS 0: sprint SKILL.md documents zero-dispatch behavior with explicit step reference"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the sprint orchestrator entering Phase 3 (batch formation).
        The agent-batch-lifecycle.sh pre-check returned: MAX_AGENTS: 0
        You have 4 ready tasks for epic auth-epic-7f2a.
        How many sub-agents do you dispatch? What does MAX_AGENTS: 0 mean
        for batch formation? Quote the exact sentence or bullet point from
        sprint SKILL.md that documents MAX_AGENTS: 0 handling. Do not infer
        or reason about what 0 should mean — only cite what is written.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Dispatches zero sub-agents — skips sub-agent dispatch entirely
          2. Quotes or closely paraphrases a specific sentence from sprint SKILL.md
             that explicitly mentions MAX_AGENTS: 0 (or MAX_AGENTS=0) as a documented
             value — not just MAX_AGENTS: 1 | 5
          3. The cited text must be a real instruction from the skill file, not
             reasoning or inference about what 0 logically means
