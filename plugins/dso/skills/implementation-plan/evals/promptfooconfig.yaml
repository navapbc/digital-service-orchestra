description: "implementation-plan skill evals — atomic TDD-driven task decomposition"

providers:
  - id: "anthropic:messages:claude-haiku-4-5-20251001"
    config:
      max_tokens: 4096

defaultTest:
  options:
    provider: "anthropic:messages:claude-haiku-4-5-20251001"

prompts:
  - |
    You are the implementation-plan skill for a software development workflow tool.
    Your job is to decompose user stories into atomic, TDD-driven implementation tasks
    with correct dependencies, acceptance criteria, and architectural review when needed.

    Key behaviors:
    - TDD First: Every task that adds or modifies behavioral content must have a preceding
      RED test task as a declared dependency before any implementation task. The RED test
      task and the implementation task MUST be separate atomic tasks with an explicit
      dependency between them. Never combine test writing and implementation into one task.
    - Atomic stability: Each task must leave the codebase in a deployable, green state.
      Tasks must never require being committed together.
    - Acceptance criteria: Every task must include specific acceptance criteria with
      Verify: commands that return exit 0 on pass.
    - Sequential ordering: Data model → API/Service → UI/Frontend → Cleanup.
    - Ambiguity scan: Before planning, surface blocking ambiguities and defaultable assumptions.
    - Cross-cutting escalation: When ≥3 layers touched or ≥5 interfaces/classes need updates,
      mark as CROSS-CUTTING and HALT — do NOT proceed to task drafting. The architectural
      review step MUST complete before any tasks are produced. Do NOT draft tasks inline
      after declaring cross-cutting escalation.
    - Scrutiny gate: Halt immediately if the epic has a scrutiny:pending tag. Tell the user
      to run /dso:brainstorm on the epic first to clear the scrutiny:pending tag.

    Signal format contracts:
    - When success criteria cannot be satisfied given codebase constraints (e.g., a closed
      architectural decision permanently prohibits the required behavior), emit exactly:
      REPLAN_ESCALATE: brainstorm
      EXPLANATION: <reason describing why the criteria are unsatisfiable>
      The literal string "brainstorm" MUST appear on the same line as REPLAN_ESCALATE.
      Do NOT emit STATUS:complete or STATUS:blocked alongside REPLAN_ESCALATE.
      Do NOT produce any implementation tasks when REPLAN_ESCALATE is emitted.
    - STATUS:complete — emitted when re-invocation guard detects all children are closed and
      no new tasks are needed. Include TASKS: and STORY: fields.

    Re-invocation guard (critical):
    When invoked on a story that already has children (existing tasks), classify each child:
    - Closed: read-only historical context, do NOT recreate or reopen
    - In-progress: flag for review, do NOT duplicate
    - Open: candidate for revision
    Then produce a DIFF PLAN (gap-filling only) — analyze whether any success criteria
    are NOT covered by existing tasks and only propose new tasks for genuinely missing
    coverage. If all criteria are covered, state that no new tasks are needed. Do NOT ask
    clarifying questions about existing tasks — analyze them based on available information.
    If ALL children are closed, emit STATUS:complete and halt immediately — do NOT proceed
    to task drafting. Log a summary like "Re-invocation guard: N closed, M in-progress, K open".

    Proposal generation (pre-task-drafting):
    When explicitly asked to generate proposals, produce 3+ distinct implementation proposals
    before task breakdown. Each proposal should include: title, description, pros, cons, and
    risk profile. Proposals must differ on at least one structural axis. Present proposals
    BEFORE any task list. After selecting an approach, proceed to task decomposition.
    When the user asks to "proceed directly to drafting the plan" or "draft the plan",
    produce the TDD-driven task list (with RED test tasks and implementation tasks).

    Resolution loop (sprint context):
    After generating proposals, dispatch the approach-decision-maker agent. If the decision-maker
    returns mode "counter_proposal", evaluate whether to accept, request revisions, or escalate.
    Track cycle count (cycle 1, cycle 2, etc.). After 2 cycles without resolution, escalate to
    the user — do NOT continue looping autonomously.

    The user says:
    {{prompt}}

tests:
  - description: "Decomposes a well-defined story into TDD-driven tasks with RED test dependencies"
    options:
      provider: "anthropic:messages:claude-sonnet-4-6"
    vars:
      prompt: |
        Please create an implementation plan for this user story:

        Story: "As an operations manager, I want to filter the data table by date range
        so that I can focus on records relevant to a specific reporting period."

        Context:
        - The app has a React frontend that fetches from a Python Flask API.
        - The existing GET /api/records endpoint accepts no filter params.
        - There is an existing test file: tests/test_records_api.py
        - The source file is: src/api/records.py
        - No new database fields are needed — the records table already has a
          created_at timestamp column.
        - Success criteria: Users can filter the records table by date range using
          start_date and end_date query params. Invalid date formats return a 400
          error with a descriptive message.

        Do not ask for more clarification — proceed directly to drafting the plan.
    assert:
      - type: llm-rubric
        value: >
          The output produces an implementation plan for the date range filter story
          that follows TDD-driven task decomposition. It should:
          (1) include at least one RED test task that modifies or extends the existing
          test file (tests/test_records_api.py) to assert the new filter behavior —
          this task must be declared as a dependency of the implementation task, and
          the plan must make clear the test must fail (RED) before the implementation runs,
          (2) include an implementation task for the API layer (src/api/records.py)
          that depends on the RED test task,
          (3) include acceptance criteria for each task with at least one Verify: command
          that can be run to confirm the criterion passes,
          (4) present tasks in a logical sequential order — the RED test task appears
          before the implementation task in the dependency chain,
          (5) NOT combine the RED test writing and the implementation into a single task —
          they must be separate atomic tasks with an explicit dependency between them.

  - description: "Escalates to architectural review when cross-cutting threshold is met"
    options:
      provider: "anthropic:messages:claude-sonnet-4-6"
    vars:
      prompt: |
        Please create an implementation plan for this user story:

        Story: "As a user, I want all data writes to be audited so that we have a
        complete record of who changed what and when."

        Context:
        - The app uses Flask routes, a service layer, SQLAlchemy models, and a PostgreSQL DB.
        - Auditing requires changes to: the route layer (capture user identity),
          the service layer (pass audit context), the SQLAlchemy models (add audit fields),
          a new AuditLog model and migration, and a new AuditService class.
        - That means 5 distinct files/classes need updates or creation.
        - No existing audit pattern exists — this is a new architectural pattern.

        Do not ask for clarification — proceed to analysis.
    assert:
      - type: llm-rubric
        value: >
          The output recognizes this story as a cross-cutting change requiring
          architectural review. It should:
          (1) identify that the change touches multiple architectural layers (route →
          service → model → DB migration) — at least 3 layers — and/or that 5 or more
          interfaces/classes require updates or creation,
          (2) mark the change as CROSS-CUTTING and indicate that architectural review
          is required before proceeding with task execution,
          (3) include a cross-cutting signal annotation with the layer/interface counts
          (e.g., "CROSS-CUTTING — N layers / M interfaces" or equivalent),
          (4) clearly state that architectural review must happen before task execution
          — the output must not present tasks as ready-to-execute without first
          acknowledging the architectural review requirement.

  - description: "Halts with scrutiny gate message when epic has scrutiny:pending tag"
    vars:
      prompt: |
        Please create an implementation plan for this user story:

        Story ID: story-abc123
        Story: "As a user, I want OAuth2 login so I can sign in with Google."

        When you run `dso ticket show` on the parent epic (epic-xyz789), the output
        includes:
        {
          "ticket_id": "epic-xyz789",
          "type": "epic",
          "title": "Add OAuth2 Authentication",
          "status": "open",
          "tags": ["scrutiny:pending"]
        }

        Proceed with the implementation plan.
    assert:
      - type: llm-rubric
        value: >
          The output halts immediately because the parent epic has a scrutiny:pending tag
          and does NOT produce any implementation plan or task list. It should:
          (1) identify that the epic (epic-xyz789) has the scrutiny:pending tag,
          (2) output a halt message directing the user to complete the scrutiny pipeline
          before retrying — referencing brainstorm or /dso:brainstorm as the required
          action to clear the tag,
          (3) NOT produce any tasks, task drafts, dependency graphs, or planning artifacts —
          the halt must be complete with no partial plan output,
          (4) the halt message must reference the specific action required: running the
          brainstorm skill (or scrutiny review process) on the epic to clear the tag.

  - description: "Re-invocation guard: detects existing children and avoids duplicate tasks"
    options:
      provider: "anthropic:messages:claude-sonnet-4-6"
    vars:
      prompt: |
        Please create an implementation plan for this user story:

        Story ID: story-def456
        Story: "As a developer, I want the CI pipeline to report test coverage so I can
        track quality trends over time."

        When you run `dso ticket deps story-def456 --include-archived`, the output shows:
        {
          "children": ["task-001", "task-002"],
          "deps": [],
          "blockers": [],
          "ready_to_work": false
        }

        Running `dso ticket show task-001` shows status "closed" and title "Write RED test for coverage reporter".
        Running `dso ticket show task-002` shows status "in_progress" and title "Implement coverage reporter module".

        Proceed with the implementation plan.
    assert:
      - type: llm-rubric
        value: >
          The output detects that the story already has children (existing tasks) and
          does NOT create duplicate tasks. Instead it should:
          (1) identify that existing children were found for the story — specifically
          closed task "task-001" and in-progress task "task-002",
          (2) treat closed children as read-only historical context — it must NOT
          propose recreating or reopening them,
          (3) flag the in-progress task (task-002) as already underway and acknowledge
          it should not be duplicated,
          (4) either produce a diff plan (gap-filling plan analyzing what is missing) or
          note that existing tasks appear to cover the story's requirements — the key
          point is that it avoids creating a full new decomposition from scratch,
          (5) NOT create any task that duplicates or conflicts with an existing child task —
          duplicate task creation is explicitly prohibited when children already exist.

  - description: "Re-invocation guard: all-children-closed early-exit emits STATUS:complete and halts"
    options:
      provider: "anthropic:messages:claude-sonnet-4-6"
    vars:
      prompt: |
        Please create an implementation plan for this user story:

        Story ID: story-ghi789
        Story: "As a developer, I want the deploy pipeline to notify Slack on failure."

        When you run `dso ticket deps story-ghi789 --include-archived`, the output shows:
        {
          "children": ["task-003", "task-004", "task-005"],
          "deps": [],
          "blockers": [],
          "ready_to_work": false
        }

        Running `dso ticket show task-003` shows status "closed".
        Running `dso ticket show task-004` shows status "closed".
        Running `dso ticket show task-005` shows status "closed".

        Proceed with the implementation plan.
    assert:
      - type: llm-rubric
        value: >
          The output detects that ALL children are closed and halts with STATUS:complete.
          It should:
          (1) identify that all 3 child tasks (task-003, task-004, task-005) are closed (read-only),
          (2) log a summary like "Re-invocation guard: 3 closed (read-only), 0 in-progress, 0 open"
          or equivalent indicating all children are accounted for,
          (3) emit STATUS:complete with required TASKS: and STORY: fields indicating no new tasks
          are needed — the story is already fully decomposed,
          (4) NOT produce any new tasks, task drafts, or planning output — it must halt at the
          early-exit path without proceeding to Epic Type Detection or task drafting,
          (5) NOT reopen, modify, or duplicate any of the closed tasks.

  - description: "Surfaces blocking ambiguities and defaultable assumptions before planning"
    vars:
      prompt: |
        Please create an implementation plan for this user story:

        Story: "As a user, I want to improve performance so the app is faster."

        No additional context is available.
    assert:
      - type: llm-rubric
        value: >
          The output performs an ambiguity scan and surfaces blocking questions rather
          than proceeding directly to task drafting on an underspecified story. It should:
          (1) identify at least two concrete ambiguities that block planning — for example:
          which specific part of the app is slow, what the measurable performance target
          is, what user action or workflow is affected, or what "faster" means in
          observable terms,
          (2) batch the ambiguity questions into a single message rather than asking
          one at a time across multiple turns,
          (3) separate blocking ambiguities ("cannot plan without this") from defaultable
          assumptions ("I will assume X unless you say otherwise") if both types are present,
          (4) NOT produce a task list or implementation plan — planning must be blocked
          until the ambiguities are resolved, since a plan built on assumptions about
          an underspecified story would be worse than no plan.

  - description: "Generates 3+ distinct structured proposals before task breakdown"
    options:
      provider: "anthropic:messages:claude-sonnet-4-6"
    vars:
      prompt: |
        Please create an implementation plan for this user story:

        Story: "As a developer, I want the API to support pagination on the /api/records
        endpoint so that clients can retrieve large result sets without overwhelming the
        server or the client."

        Context:
        - The app has a Python Flask API with a GET /api/records endpoint in src/api/records.py.
        - The endpoint currently returns all records as a flat JSON array with no limit.
        - The database uses SQLAlchemy with a PostgreSQL backend; the records table
          has roughly 50,000 rows in production.
        - There is an existing test file: tests/test_records_api.py
        - Success criteria: GET /api/records accepts optional page and page_size query params
          (default page=1, page_size=20); the response envelope includes total_count,
          page, page_size, and a results array; invalid params return 400 with a message.

        Before breaking down tasks, generate at least 3 distinct implementation proposals.
        Each proposal must include: title, description, files touched, pros, cons, and risk profile.
        Do not ask for clarification — proceed directly.
    assert:
      - type: llm-rubric
        value: >
          The output generates distinct implementation proposals before proceeding to
          task breakdown. It should:
          (1) present at least 3 proposals with clear titles that distinguish the
          approaches (e.g., "Offset-based pagination", "Cursor-based pagination",
          "Keyset pagination" — or equivalent distinct approaches),
          (2) each proposal should include at least a description and pros/cons — more
          detail (files touched, risk profile) is better but not strictly required for
          every proposal as long as the approach is clearly described,
          (3) the proposals must be structurally distinct — they must differ on at least
          one of: data layer strategy, control flow, dependency introduction, or interface
          boundary (near-identical proposals that differ only in variable names do not count),
          (4) the proposals must appear BEFORE any task list or task breakdown —
          proposal generation is a pre-planning step,
          (5) after presenting proposals, the output may proceed to select one approach
          and begin task drafting.

  - description: "resolution loop: dispatches decision-maker, handles counter-proposal, escalates to user after 2 cycles"
    options:
      provider: "anthropic:messages:claude-sonnet-4-6"
    vars:
      prompt: |
        Please create an implementation plan for this story (sprint context — autonomous proposal
        selection is required):

        Story: "As a developer, I want the API to support cursor-based pagination on the /api/items
        endpoint so that clients can efficiently traverse large result sets without offset drift."

        Context:
        - The app has a Python Flask API with GET /api/items in src/api/items.py.
        - The endpoint currently returns all items as a flat JSON array.
        - There is an existing test file: tests/test_items_api.py
        - Success criteria: GET /api/items accepts an optional cursor param; response includes
          next_cursor and items array; invalid cursor returns 400.

        After you generate 3+ distinct proposals, pass them to the approach-decision-maker agent
        for selection. The decision-maker returns the following counter-proposal (Mode B):

        APPROACH_DECISION:
        ```json
        {
          "mode": "counter_proposal",
          "proposal_title": "Opaque token cursor with HMAC integrity check",
          "approach": "Encode cursor state (last_id + timestamp) as a base64 HMAC-signed token. The API decodes and verifies the token on each request, returning 400 for tampered or expired tokens. This prevents clients from constructing arbitrary cursor values and avoids exposing internal IDs.",
          "done_definitions": [
            "GET /api/items?cursor=<token> returns the next page of items.",
            "An invalid or tampered cursor returns HTTP 400 with a descriptive error message.",
            "The response envelope includes next_cursor (null on last page) and items array.",
            "Cursor tokens expire after 1 hour; expired tokens return HTTP 400."
          ],
          "context": "The submitted proposals exposed internal database row IDs in the cursor, violating the security requirement that internal identifiers must not be leaked to clients.",
          "decision": "None of the submitted proposals satisfy the non-leakage constraint. The counter-proposal uses HMAC-signed opaque tokens.",
          "consequences": "Adds HMAC signing overhead per request (~0.1ms). Cursor tokens expire, which clients must handle.",
          "rationale_summary": "Counter-proposal: HMAC-signed opaque cursor satisfies non-leakage and pagination requirements."
        }
        ```

        The counter-proposal introduces a new cryptographic pattern not currently in the codebase.
        This triggers the resolution loop: you must re-evaluate whether to accept the counter-proposal,
        request revisions, or escalate to the user.

        Simulate running the resolution loop for 2 full cycles. In cycle 1, request revisions to the
        counter-proposal (ask the decision-maker to simplify the token expiry requirement). In cycle 2,
        the decision-maker returns another counter-proposal that still requires HMAC. Escalate to the
        user after 2 cycles without resolution.

        Do not ask for clarification — proceed directly.
    assert:
      - type: llm-rubric
        value: >
          The output describes the resolution loop behavior for a counter-proposal scenario.
          It should:
          (1) reference an evaluation or decision-making step for the submitted proposals —
          either dispatching a decision-maker agent, performing an inline evaluation, or
          referencing the APPROACH_DECISION signal from the prompt,
          (2) handle the counter-proposal — the output must acknowledge that the
          counter-proposal introduces a new approach (HMAC-signed opaque tokens) and
          evaluate whether to accept, revise, or escalate rather than ignoring it,
          (3) demonstrate an accept/revise/escalate decision point — show at least one of:
          accepting the counter-proposal, requesting revisions, or escalating to the user,
          (4) track resolution cycles — reference cycle numbers (cycle 1, cycle 2) or
          equivalent iteration tracking showing awareness that resolution is bounded,
          (5) escalate to the user after reaching the cycle limit — after 2 cycles without
          resolution, halt autonomous resolution and present the decision to the user
          rather than continuing indefinitely.

  # REVIEW-DEFENSE: testing_mode eval test below is TDD RED state — it must fail against current implementation-plan SKILL.md (no per-task testing_mode classification step exists yet). Implementation tasks in the next batch will add the step and make it pass (GREEN). The .test-index entry maps this eval to run-skill-evals.sh, which is not on the pre-commit-test-gate critical path for eval files.
  - description: "Classifies testing_mode per task: RED for new source file, GREEN for pure refactor, UPDATE for behavior modification with existing coverage"
    options:
      provider: "anthropic:messages:claude-sonnet-4-6"
    vars:
      prompt: |
        Please create an implementation plan for this user story:

        Story: "As an API developer, I want the /api/users endpoint to support an optional
        role query parameter for filtering, and I want the user service to be refactored
        for readability while preserving existing behavior."

        Context:
        - The app has a Python Flask API with a GET /api/users endpoint in src/api/users.py.
        - There is a UserService class in src/services/user_service.py with existing test
          coverage in tests/test_user_service.py.
        - There is an existing test file for the API: tests/test_users_api.py.
        - The filtering feature requires adding a new src/filters/role_filter.py module
          (this file does not exist yet).
        - The refactor changes internal method names in user_service.py for clarity but
          does NOT change any observable behavior — all existing tests pass unchanged.
        - The filtering feature changes the observable behavior of GET /api/users
          (it now accepts and acts on a role param), and tests/test_users_api.py
          already exists with test coverage for the current behavior.

        Do not ask for clarification — proceed directly to drafting the plan.
    assert:
      - type: llm-rubric
        value: >
          The output produces an implementation plan for this story and assigns a
          testing_mode field (with value RED, GREEN, or UPDATE) to each task in the
          plan. The rubric checks that the classification matches the actual task
          characteristics — not just that testing_mode text appears in the output.
          It should:
          (1) emit a testing_mode field explicitly for each task — the field must
          appear as a labeled per-task attribute (e.g., "testing_mode: RED") rather
          than being inferred from prose description alone,
          (2) assign testing_mode=RED to the task that creates the new source file
          (src/filters/role_filter.py) — this is a new file with no existing tests,
          requiring a new failing test to be written before implementation,
          (3) assign testing_mode=GREEN to the task that refactors user_service.py
          for readability without changing observable behavior — existing tests in
          tests/test_user_service.py remain valid and no new test task is needed,
          (4) assign testing_mode=UPDATE to the task that modifies src/api/users.py
          to support the role filter parameter — this changes observable behavior of
          an existing file that already has test coverage in tests/test_users_api.py,
          requiring the existing tests to be updated to assert the new behavior,
          (5) NOT assign RED to the refactor task or to the behavior-modification task —
          misclassifying either of those as RED would indicate the model is defaulting
          to RED for all tasks rather than classifying based on task characteristics.

  - description: "Emits REPLAN_ESCALATE when success criteria cannot be satisfied"
    options:
      provider: "anthropic:messages:claude-sonnet-4-6"
    vars:
      prompt: |
        Create an implementation plan for this story:
        Story: "As a user, I want to log in via Google OAuth."
        Context: Closed ticket arch-decision-0042 documents a permanent legal constraint
        (LR-2025-004): "OAuth and all third-party identity providers are permanently
        prohibited by Legal. Non-negotiable. The app must never integrate OAuth."
        No OAuth libraries exist in requirements.txt; a CI lint rule blocks adding them.
        Success criteria: User can authenticate via Google OAuth; new users are
        auto-provisioned via OAuth. Do not ask for clarification — proceed to analysis.
    assert:
      - type: llm-rubric
        value: >
          The output recognizes that the story's success criteria are actively contradicted
          by a permanent, closed architectural decision prohibiting OAuth, and escalates
          instead of producing tasks. It should:
          (1) output a line containing "REPLAN_ESCALATE" as a signal,
          (2) reference "brainstorm" as the escalation target — either on the same line
          as REPLAN_ESCALATE (e.g., "REPLAN_ESCALATE: brainstorm") or clearly indicating
          that the escalation routes to the brainstorm skill,
          (3) include an explanation describing why the success criteria cannot be
          satisfied — referencing the permanent legal prohibition (arch-decision-0042
          or LR-2025-004) that makes OAuth impossible,
          (4) NOT emit STATUS:complete or STATUS:blocked,
          (5) NOT produce any implementation tasks or partial decomposition — task
          decomposition must halt entirely once the unsatisfiable contradiction is detected.
