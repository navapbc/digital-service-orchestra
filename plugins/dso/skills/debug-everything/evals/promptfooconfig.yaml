description: "debug-everything skill evals — full project health restoration orchestration"

providers:
  - id: "anthropic:messages:claude-haiku-4-5-20251001"

defaultTest:
  options:
    provider: "anthropic:messages:claude-haiku-4-5-20251001"

prompts:
  - |
    You are the debug-everything orchestrator skill for a software development workflow tool.
    Your job is to diagnose and fix all outstanding bugs (validation failures AND open ticket bugs),
    test failures, lint errors, and infrastructure issues using orchestrated sub-agents with TDD discipline.

    Key behaviors:
    - Bug-Fix Mode: when open bug tickets exist, skip diagnostics and apply fix-bug directly to each ticket
    - Diagnostic Mode: when no open bugs exist, run Phase 1 diagnostic scan, Phase 2 triage, then fix in tier order
    - Non-interactive mode: defer user-blocking gates as INTERACTIVITY_DEFERRED ticket comments
    - Worktree isolation: when worktree.isolation_enabled=true, dispatch sub-agents with isolation:worktree
    - Session lock: acquire lock before starting; release in Phase 9
    - TDD enforcement: behavioral bugs get a failing test BEFORE the fix

    MAX_AGENTS protocol (from agent-batch-lifecycle.sh pre-check, governs batch sizing dynamically):
    - MAX_AGENTS: unlimited — dispatch ALL candidates in a single batch with no artificial ceiling. Do NOT split into sub-batches or cap at any fixed number.
    - MAX_AGENTS: N (a positive integer, e.g., 1, 3, 5) — cap each batch at N sub-agents. Split into sequential batches of at most N if candidates exceed N.
    - MAX_AGENTS: 0 — skip sub-agent dispatch entirely. Do NOT launch any Task calls. Write a ticket comment on the epic noting dispatch was skipped due to resource constraints. Proceed to Phase 9 (graceful shutdown).
    Batch size is determined dynamically by MAX_AGENTS — it is NOT hardcoded to 5 or any fixed number.

    Worktree dispatch protocol (from plugins/dso/skills/shared/prompts/worktree-dispatch.md):
    - Read worktree.isolation_enabled config before first sub-agent dispatch
    - When enabled (true): add isolation: "worktree" to Agent/Task dispatch parameters
    - When disabled (false/empty/absent): skip isolation parameter — shared-directory fallback
    - Apply consistently — do not mix isolated and non-isolated dispatches in the same session

    The user says:
    {{prompt}}

tests:
  - description: "Worktree isolation enabled: dispatches sub-agents with isolation:worktree"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are about to begin a debug-everything session in a worktree.
        Before dispatching any sub-agents, you read the config:
        worktree.isolation_enabled = true
        You now need to dispatch a diagnostic sub-agent to run validate.sh --ci.
        How should you configure the Agent/Task dispatch parameters?
        Show the dispatch configuration you would use.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. The dispatch configuration includes isolation: "worktree" (or isolation: worktree) as a parameter
          2. The response acknowledges the config value worktree.isolation_enabled=true as the reason for adding isolation
          3. Does NOT omit the isolation parameter or set it to a value other than "worktree"
          4. Does NOT skip reading the config before dispatching

  - description: "Worktree isolation disabled: dispatches sub-agents WITHOUT isolation parameter"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are about to begin a debug-everything session in a worktree.
        Before dispatching any sub-agents, you read the config:
        worktree.isolation_enabled = false
        You now need to dispatch a diagnostic sub-agent to run validate.sh --ci.
        How should you configure the Agent/Task dispatch parameters?
        Show the dispatch configuration you would use.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. The dispatch configuration does NOT include isolation: "worktree" or any isolation parameter
          2. The response acknowledges the config value worktree.isolation_enabled=false as the reason for omitting isolation
          3. Uses shared-directory fallback mode (no isolation key in dispatch)
          4. Does NOT add isolation: "worktree" when the config says false

  - description: "Bug-Fix Mode entry: open bug tickets skip diagnostic scan"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are starting a debug-everything session. You check for open bug tickets and find:
        OPEN_BUG_COUNT=3
        There are 3 open bug tickets: bug-a1 (auth token expiry), bug-a2 (CSV export format),
        bug-a3 (session invalidation on password change).
        What mode should you enter and what phases should you skip?
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Enters Bug-Fix Mode (mentions Bug-Fix Mode or equivalent)
          2. Skips the Phase 1 diagnostic scan (Steps 0.5, 1a, 1b, 1c, 2) and Phase 2 triage
          3. Applies fix-bug to each of the 3 open bug tickets
          4. Does NOT run the full diagnostic scan before addressing the open bugs

  - description: "Non-interactive mode: complex escalation deferred via INTERACTIVITY_DEFERRED"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the debug-everything orchestrator running in non-interactive mode (INTERACTIVE_SESSION=false).
        While fixing bug-session-03 (session invalidation), the fix-bug sub-agent returns:
        COMPLEX_ESCALATION: The session invalidation fix requires refactoring the token refresh
        architecture — this is beyond a single-file bug fix and needs architectural review.
        What should the orchestrator do?
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Records INTERACTIVITY_DEFERRED: complex_escalation on the ticket (mentions INTERACTIVITY_DEFERRED signal or ticket comment)
          2. Does NOT block for user input — continues to the next bug or phase
          3. Does NOT attempt to autonomously resolve the complex escalation
          4. Leaves the bug open pending a follow-up interactive session
          5. Includes enough context summary (ticket ID, error summary) in the deferral comment

  - description: "TDD enforcement: behavioral bug requires RED test before fix"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are debugging bug-auth-07: "Login fails with correct credentials when username
        contains uppercase letters." This is a behavioral bug in src/auth/login.py.
        The fix-bug sub-agent wants to immediately patch the case comparison in login.py.
        What must happen BEFORE the fix is applied?
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Requires a RED (failing) test to be written before the code fix is applied
          2. The failing test must confirm the bug reproduces (test fails before fix)
          3. Does NOT permit patching login.py before the RED test gate passes
          4. Mentions TDD, test-first, or RED test as the enforcement mechanism

  # MAX_AGENTS eval tests below verify the 3-tier MAX_AGENTS protocol (unlimited|N|0) is documented and handled correctly in SKILL.md.
  - description: "MAX_AGENTS unlimited: debug-everything dispatches all tier fixes in a single batch with no cap"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the debug-everything orchestrator in Phase 3 (fix dispatch).
        The agent-batch-lifecycle.sh pre-check returned: MAX_AGENTS: unlimited
        You have 8 independent fixes in Tier 1 (lint/format).
        How many sub-agents do you dispatch in this batch? Do you split into
        multiple batches of 5? Cite the specific debug-everything SKILL.md
        instruction that governs the MAX_AGENTS: unlimited case.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Dispatches all 8 fixes in a single batch — does NOT cap at 5
          2. Explicitly references MAX_AGENTS: unlimited as the signal that removes
             the batch size cap
          3. Cites a specific debug-everything SKILL.md instruction, step, or section
             that documents the unlimited dispatch behavior
          4. Does NOT split into batches of 5 or reference a "max 5" batch size limit
             when MAX_AGENTS is unlimited
          5. Does NOT say the skill instructions are silent on the unlimited case

  - description: "MAX_AGENTS 0: debug-everything SKILL.md documents zero-dispatch behavior with explicit instruction"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the debug-everything orchestrator in Phase 3 (fix dispatch).
        The agent-batch-lifecycle.sh pre-check returned: MAX_AGENTS: 0
        You have 5 fixes queued across Tier 1 and Tier 2.
        How many sub-agents do you dispatch? What does MAX_AGENTS: 0 mean
        for fix dispatch? Quote the exact sentence or bullet point from
        debug-everything SKILL.md that documents MAX_AGENTS: 0 handling.
        Do not infer or reason about what 0 should mean — only cite what is written.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Dispatches zero sub-agents — skips sub-agent dispatch entirely
          2. Describes MAX_AGENTS: 0 as a documented protocol value (not inferred)
             that means skip dispatch — not just MAX_AGENTS: 1 | 5
          3. The described behavior includes all three actions: (a) skip sub-agent
             dispatch entirely, (b) write a ticket comment noting dispatch was skipped
             due to resource constraints, and (c) proceed to Phase 9 graceful shutdown
          4. Does NOT say "based on the general principle" or "logically, 0 means" —
             treats MAX_AGENTS: 0 as an explicit protocol case

  - description: "Debug-everything batch formation does NOT hardcode batches of 5 when MAX_AGENTS varies"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the debug-everything orchestrator. Review your SKILL.md instructions
        regarding batch size limits for fix dispatch. Does the skill instruct you to
        always form "batches of 5" or limit to "5 sub-agents"? Or does it instruct
        you to use the MAX_AGENTS value dynamically (which can be 0, 1, 5, or
        unlimited)? Cite the exact batch sizing rule from debug-everything SKILL.md.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Confirms that batch size is determined dynamically by the MAX_AGENTS
             value — NOT hardcoded to 5
          2. Mentions that MAX_AGENTS can be 0 (skip dispatch), 1, 5, or unlimited
             (no cap) — at minimum mentions unlimited and 0 as valid values
          3. Does NOT describe the batch size rule as "always 5" or "max 5"
          4. Cites a specific debug-everything SKILL.md instruction that documents
             dynamic batch sizing based on the MAX_AGENTS signal
          5. Does NOT say the skill instructions only support MAX_AGENTS: 1 | 5
