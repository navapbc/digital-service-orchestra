description: "Prior-art search skill evals — trigger accuracy for search vs no-search classification"

providers:
  - id: "anthropic:messages:claude-haiku-4-5-20251001"

defaultTest:
  options:
    provider: "anthropic:messages:claude-haiku-4-5-20251001"

prompts:
  - |
    You are a software development agent applying the prior-art search protocol.
    Given a description of an upcoming code change, determine whether you MUST
    run a prior-art search before writing code.

    Bright-line triggers (MUST search):
    - New utility function, helper, or module is being created
    - New abstraction, interface, or design pattern is being introduced
    - External API, CLI tool, or third-party library is being integrated for the first time
    - A workaround or fix is being applied to a problem that has been seen before (recurrence risk)
    - A new test pattern, fixture, or testing helper is being created
    - A configuration key or schema field is being added
    - Cross-cutting concerns are being addressed (logging, error handling, auth, metrics)
    - Code is being copied or adapted from external sources

    Routine exclusions (do NOT search):
    - Single-file logic fix — one file, corrects a clear bug, no new abstractions
    - Formatting or lint fix — automated reformatting, import sorting, lint-only corrections
    - Test reversion — restoring a test to a known-good state
    - Documentation-only edits — .md, .txt, or comment-only changes
    - Config value update — changing an existing key's value, not adding a new key

    Respond with exactly one of:
    DECISION: SEARCH — <one-sentence reason citing the trigger>
    DECISION: NO SEARCH — <one-sentence reason citing the exclusion>

    Code change scenario:
    {{prompt}}

tests:
  # ── Boundary scenarios: agent must decide search vs no-search ─────────────────

  - description: "Boundary: new utility function being created — should trigger search"
    vars:
      prompt: |
        I am creating a new utility function `format_duration_seconds(seconds: int) -> str`
        in `src/utils/time_helpers.py`. This helper will be used across multiple modules.
    assert:
      - type: llm-rubric
        value: >
          The scenario describes creating a new utility function, which is a bright-line
          trigger for a prior-art search (the function may already exist elsewhere in the
          codebase). The output must decide SEARCH, not NO SEARCH. The reason should
          reference that a new utility/helper is being created and may already exist.

  - description: "Boundary: external API integration for the first time — should trigger search"
    vars:
      prompt: |
        I am integrating the SendGrid email API for the first time in this project.
        I need to write a client wrapper around their REST API to send transactional emails.
    assert:
      - type: llm-rubric
        value: >
          The scenario describes integrating an external API/library for the first time,
          which is a bright-line trigger. The output must decide SEARCH, not NO SEARCH.
          The reason should reference that a first-time external API/library integration
          requires checking for existing patterns or wrappers.

  - description: "Boundary: new test pattern being created — should trigger search"
    vars:
      prompt: |
        I am creating a new test fixture pattern for mocking external HTTP calls
        across multiple test files. The fixture will use `responses` library and
        live in `tests/conftest.py` as a shared session-scoped fixture.
    assert:
      - type: llm-rubric
        value: >
          The scenario describes creating a new test pattern/fixture, which is a
          bright-line trigger for a prior-art search (the fixture may already exist
          or a convention may already be established). The output must decide SEARCH,
          not NO SEARCH. The reason should reference that a new test pattern is being
          created and existing conventions should be checked first.

  # ── False-positive exclusions: routine modifications that must NOT trigger ─────

  - description: "False-positive exclusion: single-file logic fix — no search"
    vars:
      prompt: |
        I am fixing a single-file logic bug in `src/api/handler.py`. The function
        `get_user_by_id` returns None instead of raising a 404 when the user is not
        found. I will add a guard clause. No new abstractions are introduced.
    assert:
      - type: llm-rubric
        value: >
          The scenario describes a single-file logic fix with no new abstractions —
          this is explicitly excluded from the prior-art search requirement. The output
          must decide NO SEARCH, not SEARCH. The reason should reference the single-file
          fix exclusion.

  - description: "False-positive exclusion: formatting or lint fix — no search"
    vars:
      prompt: |
        I am running ruff format and ruff check --fix across `src/utils/validators.py`
        to fix formatting and lint violations. No logic changes are being made.
    assert:
      - type: llm-rubric
        value: >
          The scenario describes a formatting/lint-only fix with no logic changes —
          this is explicitly excluded. The output must decide NO SEARCH, not SEARCH.
          The reason should reference the formatting or lint exclusion.

  - description: "False-positive exclusion: test reversion to known-good state — no search"
    vars:
      prompt: |
        I am reverting `tests/unit/test_auth.py` to restore a previously passing
        snapshot. The test was accidentally broken in a recent commit. I am not
        changing test logic, only restoring it to the last known-good state.
    assert:
      - type: llm-rubric
        value: >
          The scenario describes reverting a test to a known-good state — this is
          explicitly excluded from prior-art search requirements. The output must decide
          NO SEARCH, not SEARCH. The reason should reference the test reversion exclusion.

  # ── Incident replays: real confident-ignorance incidents ──────────────────────

  - description: "Incident replay: ACLI priority gap — unfamiliar CLI tool, should trigger search"
    vars:
      prompt: |
        I am writing a bash script that uses the ACLI (Atlassian CLI) to set ticket
        priorities programmatically. I have not used ACLI before in this project.
        I plan to use `acli issue update --priority High` based on the tool name alone.
    assert:
      - type: llm-rubric
        value: >
          This incident replay describes an agent using an unfamiliar CLI tool (ACLI)
          without searching for usage patterns first — a known confident-ignorance failure
          mode. The output must decide SEARCH, not NO SEARCH. The reason should reference
          that integrating an unfamiliar CLI tool requires a prior-art search to avoid
          incorrect usage assumptions. The word "incident" or "confident ignorance" need
          not appear in the model's output, but the decision must be SEARCH.

  - description: "Incident replay: bash syntax cascading — unfamiliar shell pattern, should trigger search"
    vars:
      prompt: |
        I am writing a bash script that uses `! command` as a negation pattern for
        conditional checks in a shell function. This is a pattern I am inferring from
        context rather than from verified project conventions. The script will be used
        in the git pre-commit hook pipeline.
    assert:
      - type: llm-rubric
        value: >
          This incident replay describes an agent applying an unfamiliar bash/shell
          pattern without verifying it against existing project conventions — a known
          confident-ignorance incident that caused cascading failures. The output must
          decide SEARCH, not NO SEARCH. The reason should reference that using an
          unverified shell pattern or bash syntax in the hook pipeline requires a prior-art
          search to validate conventions before proceeding.

  - description: "Incident replay: plausible but wrong fix from training data — should trigger search"
    vars:
      prompt: |
        I am fixing a bug where a Python decorator is being applied in the wrong order.
        Based on my training data I believe the correct fix is to swap the decorator order
        to `@retry @cache`. I have not checked whether this project uses a decorator
        convention or whether `@retry @cache` behaves correctly with this codebase's
        version of the libraries. I plan to apply the fix directly.
    assert:
      - type: llm-rubric
        value: >
          This incident replay describes an agent applying a plausible-but-unverified fix
          derived from training data rather than from searching the actual codebase — a
          known confident-ignorance failure mode where agents generate incorrect fixes with
          high confidence. The output must decide SEARCH, not NO SEARCH. The reason should
          reference that applying a fix based on training knowledge alone (without checking
          project conventions or library versions) requires a prior-art search first.
