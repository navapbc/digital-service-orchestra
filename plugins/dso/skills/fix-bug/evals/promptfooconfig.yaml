description: "Fix-bug skill evals — trigger routing and bug classification"

providers:
  - id: "anthropic:messages:claude-haiku-4-5-20251001"

defaultTest:
  options:
    provider: "anthropic:messages:claude-haiku-4-5-20251001"

prompts:
  - |
    You are the fix-bug skill for a software development workflow tool.
    Your job is to classify bugs, route them through investigation, and fix them
    using TDD discipline.

    Key behaviors:

    Bug classification:
    1. Classify the error type as either "mechanical" or "behavioral".
       Mechanical errors: import errors, type annotation issues, lint violations, config syntax errors.
       Behavioral errors: everything else (test failures, runtime errors, logic bugs, race conditions, etc.).
    2. If behavioral, score the bug on three dimensions (severity 0-2, complexity 0-2, environment 0-2)
       plus bonus modifiers (cascading failure +2, prior fix attempts +2).
    3. Route to the correct investigation tier based on total score:
       - Score < 3: BASIC investigation
       - Score 3-5: INTERMEDIATE investigation
       - Score >= 6: ADVANCED investigation

    Output format for classification:
    CLASSIFICATION
    ==============
    Error type: mechanical | behavioral
    If mechanical: Fix path (import/type/lint/config)
    If behavioral:
      Severity: <score> — <rationale>
      Complexity: <score> — <rationale>
      Environment: <score> — <rationale>
      Bonus modifiers: <list or none>
      Total score: <N>
      Investigation tier: BASIC | INTERMEDIATE | ADVANCED

    Step 1.5 — Gate 1a (Intent Search):
    Before dispatching the investigation sub-agent, run an intent-search gate.
    - If the ticket has a CLI_user tag: SKIP intent-search entirely, set
      GATE_1A_RESULT="intent-aligned" directly, and add a ticket comment
      documenting the skip (e.g., "Gate 1a: skipped -- CLI_user tag present;
      intent-aligned assumed."). The CLI_user tag means the bug was filed by a
      human user whose intent alignment is already understood.
    - If the ticket does NOT have a CLI_user tag: dispatch dso:intent-search
      sub-agent with the ticket_id and configured intent_search_budget. Do NOT
      skip intent-search for untagged tickets.

    Step 2 / Step 6 — Worktree Isolation:
    Before dispatching any investigation sub-agent (Step 2) or fix implementation
    sub-agent (Step 6), read and apply plugins/dso/skills/shared/prompts/worktree-dispatch.md
    to determine whether to pass isolation: "worktree" in the Agent dispatch call.
    - Read the config key: worktree.isolation_enabled (via read-config.sh)
    - If worktree.isolation_enabled=true: add isolation: "worktree" to the Agent
      dispatch call and pass ORCHESTRATOR_ROOT=$(git rev-parse --show-toplevel)
      in the dispatch prompt so the sub-agent can verify its isolation.
    - If worktree.isolation_enabled=false, absent, or empty: omit the isolation
      parameter entirely (shared-directory fallback — pre-isolation default behavior).
    Note: isolation applies to IMPLEMENTATION sub-agents (Step 2 investigation,
    Step 6 fix dispatch) but NOT to diagnostic-only inline operations. Step 1
    intent-search and gate scripts run inline, not as isolated sub-agents.

    Step 4.75 — Testing Mode Classification:
    Before writing or modifying tests (Step 5), classify the fix into a testing mode.
    Examine the investigation root cause and approved fix description.

    Classification rules:
    - testing_mode=GREEN: existing tests remain valid after the fix (they pass before and
      after). Apply when existing_tests_pass_after_fix: true is present in the root cause
      report, or when the fix corrects internal implementation logic and no test changes
      are needed. DEFAULT for most bug fixes — most fixes correct logic without requiring
      new tests or test updates because existing tests already cover the behavior.
    - testing_mode=UPDATE: fix changes observable behavior AND existing tests cover the
      affected paths but assert old (buggy) behavior — the tests need updating.
      Indicated by: existing_test_file or existing_test_name provided but
      existing_tests_pass_after_fix is NOT true.
    - testing_mode=RED: fix introduces new observable behavior with NO existing coverage.
      Indicated by: existing_test_coverage: false and no existing_test_file/test_name.

    Emit the classification on its own line:
    testing_mode=<GREEN|UPDATE|RED>

    Step 5 branching based on testing_mode:
    - testing_mode=GREEN: Log "Testing mode: GREEN — existing tests validate fix correctness.
      Proceeding to implementation." Then skip RED test writing and proceed to implementation.
    - testing_mode=UPDATE: Identify existing tests that assert old behavior, update them to
      assert new expected behavior before implementing the fix (they should now fail = RED state).
    - testing_mode=RED: Dispatch dso:red-test-writer to write a new failing test before the fix.

    Step 7.5 — Anti-Pattern Scan:
    When creating bug tickets during the anti-pattern scan phase, these are
    autonomously discovered defects. The CLI command is:
    `.claude/scripts/dso ticket create bug "<title>" --parent=<EPIC_ID>`
    These tickets must NOT include --tags CLI_user because they are NOT
    user-requested bugs filed via the CLI. The --tags CLI_user flag is reserved
    exclusively for bugs that a human user explicitly asks to create during an
    interactive session.

    The user says:
    {{prompt}}

tests:
  - description: "Classifies test failure as behavioral and routes to correct investigation tier"
    vars:
      prompt: |
        Bug: Unit test test_user_login in tests/test_auth.py fails with AssertionError.

        Error output:
        FAILED tests/test_auth.py::test_user_login - AssertionError: assert 401 == 200

        Stack trace:
        tests/test_auth.py:45: in test_user_login
            assert response.status_code == 200
        src/auth/handler.py:78: in login
            token = generate_token(user)
        src/auth/tokens.py:23: in generate_token
            raise ValueError("Missing secret key")

        The test was passing until commit abc1234 which refactored the token module.
        This is a local dev failure, single file root cause, medium severity (login is broken).
    assert:
      - type: llm-rubric
        value: >
          The output correctly classifies this as a behavioral error (not mechanical),
          because it is a test failure caused by a logic/configuration issue — not a
          simple import, type annotation, lint, or config syntax error. The output
          should assign an investigation tier (BASIC or INTERMEDIATE) with a total
          score reflecting: moderate severity (login broken but not data loss),
          simple-to-moderate complexity (traceable stack trace, likely single root cause),
          and local environment (dev reproducible). The tier should NOT be ADVANCED.

  - description: "Classifies runtime error as behavioral and routes appropriately"
    vars:
      prompt: |
        Bug: Production 500 errors on /api/v2/reports endpoint.

        Error from logs:
        TypeError: cannot unpack non-sequence NoneType
          File "src/api/reports.py", line 112, in generate_report
            header, body = fetch_report_data(report_id)
          File "src/services/report_service.py", line 45, in fetch_report_data
            return db.query(Report).filter_by(id=report_id).first()

        The endpoint works for most report IDs but fails for reports created before
        the v2 migration. This was reported by users in production. Multiple services
        depend on this endpoint. No prior fix attempts.
    assert:
      - type: llm-rubric
        value: >
          The output correctly classifies this as a behavioral error (not mechanical).
          The output should assign a higher investigation tier (INTERMEDIATE or ADVANCED)
          reflecting: high severity (production 500 errors affecting users), moderate-to-high
          complexity (data-dependent bug involving migration history, affects multiple
          services), and production environment. The total score should be at least 3,
          routing to INTERMEDIATE or ADVANCED investigation — NOT BASIC.

  - description: "Classifies import error as mechanical and routes to mechanical fix path"
    vars:
      prompt: |
        Bug: ImportError when running tests.

        Error output:
        ImportError: cannot import name 'validate_schema' from 'src.utils.validators'
        (src/utils/validators.py)

        The function was renamed to 'validate_json_schema' in a recent refactor but
        one import statement in src/api/middleware.py was missed.
    assert:
      - type: llm-rubric
        value: >
          The output correctly classifies this as a mechanical error (specifically an
          import error), NOT a behavioral error. It should route to the mechanical fix
          path rather than scoring dimensions and assigning an investigation tier. The
          response should identify this as a straightforward import fix — update the
          import name from 'validate_schema' to 'validate_json_schema' in the
          consuming file.

  - description: "Trigger routing: fix-bug skill is selected for a bug report (skill-used assertion)"
    vars:
      prompt: |
        Bug: TypeError in production — NoneType has no attribute 'get'.
        File "src/api/handler.py", line 42
    assert:
      - type: llm-rubric
        value: >
          This prompt describes a bug report. The fix-bug skill should be the
          correct skill to handle this — not brainstorm, sprint, or implementation-plan.
          Verify the output produces a bug classification (mechanical or behavioral)
          and routes to an investigation path, confirming fix-bug was the right skill.

  - description: "Step 7.5 anti-pattern scan failure: bug ticket must NOT use --tags CLI_user"
    vars:
      prompt: |
        You are executing Step 7.5 (Anti-Pattern Scan). A batch of anti-pattern fix
        sub-agents has returned batch_status: FAILED for the following batch:

        Batch context:
        - pattern: Unguarded dict key access without .get() fallback
        - affected files: src/api/handler.py, src/utils/helpers.py
        - batch_status: FAILED
        - error: "Sub-agent timeout on src/utils/helpers.py"

        Step 7.5 instructions:
        "If a batch returns batch_status: FAILED or PARTIAL, record findings as a bug
        ticket (.claude/scripts/dso ticket create bug '<title>' --parent=<EPIC_ID>)
        and proceed to the next batch — do not block the entire scan on a single
        failing batch."

        These bug tickets are created autonomously by the fix-bug skill during the
        anti-pattern scan phase. They represent discovered defects, not bugs reported
        by the user via the CLI.

        Question: What is the exact CLI command you would run to create the bug ticket
        for this failed batch? Write out the full command. Should it include
        --tags CLI_user?
    assert:
      - type: llm-rubric
        value: >
          The output must NOT include '--tags CLI_user' in the bug ticket creation
          command. Bug tickets created during Step 7.5 anti-pattern scans are
          autonomously discovered defects — they are NOT user-requested bugs filed
          via the CLI, so '--tags CLI_user' is incorrect for them. The correct command
          should be '.claude/scripts/dso ticket create bug "<title>" --parent=<EPIC_ID>'
          without any --tags CLI_user flag. If the output includes '--tags CLI_user',
          the assertion FAILS.

  - description: "Step 1.5 Gate 1a: CLI_user-tagged ticket skips intent-search dispatch (positive path)"
    vars:
      prompt: |
        You are executing Step 1.5 (Gate 1a — Intent Search). Apply the Gate 1a
        logic to this bug ticket and describe: (1) whether intent-search is dispatched
        or skipped and why, (2) what GATE_1A_RESULT is set to, and (3) any ticket
        comment added to document the gate outcome.

        Bug ticket context:
        Bug ticket ID: BUG-4921
        Title: CLI output truncated when piping to less
        Tags: CLI_user
        Description: When running `dso ticket list | less`, output is truncated after
        the first screen. Users report this in the terminal only -- no API impact.
        Stack trace: N/A. Observed in dso CLI v2.3.1 on macOS.
    assert:
      - type: llm-rubric
        value: >
          The output should recognize that the ticket has the CLI_user tag. Because the
          CLI_user tag indicates the bug was filed by a CLI user whose intent alignment is
          already understood, Step 1.5 should skip dispatching the dso:intent-search sub-agent
          entirely. Instead, it should set GATE_1A_RESULT="intent-aligned" directly without
          calling dso:intent-search. Additionally, the output must describe adding a ticket
          comment documenting the skip, for example: "Gate 1a: skipped -- CLI_user tag
          present; intent-aligned assumed." The output must NOT describe dispatching
          dso:intent-search when the CLI_user tag is present. Any response that dispatches
          intent-search for a CLI_user-tagged ticket or that fails to mention adding a ticket
          comment about the skip fails this rubric.

  - description: "Step 1.5 Gate 1a: untagged ticket dispatches intent-search normally (negative path)"
    vars:
      prompt: |
        You are executing Step 1.5 (Gate 1a — Intent Search). Apply the Gate 1a
        logic to this bug ticket and describe: (1) whether intent-search is dispatched
        or skipped and why, (2) what GATE_1A_RESULT is set to, and (3) any ticket
        comment added to document the gate outcome.

        Bug ticket context:
        Bug ticket ID: BUG-5102
        Title: Report generation fails for large datasets
        Tags: (none)
        Description: When generating reports with more than 10,000 rows, the process
        times out after 30 seconds. Error: TimeoutError in src/reports/generator.py:87.
        This is a production issue affecting enterprise customers.
    assert:
      - type: llm-rubric
        value: >
          The output should recognize that the ticket has no CLI_user tag. Without the
          CLI_user tag, Step 1.5 should follow the normal path and dispatch the
          dso:intent-search sub-agent with ticket_id=BUG-5102 and the configured
          intent_search_budget. The output must NOT skip intent-search dispatch for this
          untagged ticket. Any response that skips intent-search for a ticket without
          the CLI_user tag fails this rubric.

  - description: "Worktree isolation enabled: sub-agent dispatch includes isolation:worktree"
    vars:
      prompt: |
        Bug ticket context:
        Bug ticket ID: BUG-7741
        Title: Dashboard crashes on load when user has no prior sessions
        Tags: (none)
        Description: Unhandled NullPointerException in src/dashboard/loader.py:34.
        Reproducible in staging. Medium severity.

        The project's dso-config.conf is:
        worktree.isolation_enabled=true

        You are at Step 3: dispatch the investigation sub-agent. List the exact
        parameters you include in the Agent dispatch call. Does your dispatch
        include an isolation parameter? If so, what is its value?
    assert:
      - type: llm-rubric
        value: >
          The fix-bug skill instructions must cause the agent to dispatch the
          investigation sub-agent with isolation set to "worktree" when
          worktree.isolation_enabled=true is present in the project config.
          The output PASSES if it mentions passing isolation: "worktree",
          isolation_mode: "worktree", or equivalent worktree isolation semantics
          as part of the sub-agent dispatch call.
          The output FAILS if the isolation parameter is absent or set to a non-worktree
          value (e.g., none, false, shared). This tests whether the fix-bug skill
          instructions document the worktree isolation dispatch behavior — which they
          currently do not.

  - description: "Worktree isolation disabled: sub-agent dispatch does NOT include isolation:worktree"
    vars:
      prompt: |
        Bug ticket context:
        Bug ticket ID: BUG-8812
        Title: Export CSV produces garbled output for Unicode filenames
        Tags: (none)
        Description: CSV export encodes filenames incorrectly when they contain
        non-ASCII characters. Reproducible locally. Low severity.

        The project's dso-config.conf is:
        worktree.isolation_enabled=false

        You are at Step 3: dispatch the investigation sub-agent. List the exact
        parameters you include in the Agent dispatch call. Does your dispatch
        include an isolation parameter? If so, what is its value?
    assert:
      - type: llm-rubric
        value: >
          The fix-bug skill instructions must cause the agent NOT to dispatch with
          isolation: "worktree" when worktree.isolation_enabled=false is set in the
          project config. The output PASSES if it omits the worktree isolation
          parameter entirely, or explicitly uses the shared-directory / non-isolated
          default (e.g., no isolation key, isolation: none, isolation: false).
          The output FAILS if it includes isolation: "worktree" or "worktree isolation"
          when the config explicitly disables worktree isolation. This tests whether
          the fix-bug skill instructions document the conditional worktree isolation
          behavior — which they currently do not.

  # REVIEW-DEFENSE: testing_mode eval tests below are TDD RED state — they must fail against current SKILL.md (no testing_mode classification step exists yet). Implementation tasks in the next batch will add the step and make them pass (GREEN). The .test-index entry maps these evals to run-skill-evals.sh, which is not on the pre-commit-test-gate critical path for eval files.
  - description: "testing_mode=GREEN: impl-only fix (no behavior change) emits testing_mode=GREEN signal"
    vars:
      prompt: |
        You are at Step 5 (RED Test) of the fix-bug workflow. The investigation
        sub-agent has returned the following root cause report:

        root_cause_report:
          bug_id: BUG-9901
          root_cause: "Off-by-one error in loop index in src/utils/paginator.py line 42.
            The loop iterates range(len(items)) but should iterate range(len(items) - 1)
            to avoid reading a stale final element."
          fix_description: "Change range(len(items)) to range(len(items) - 1) in
            paginator.py line 42."
          existing_tests_pass_after_fix: true

        Before proceeding, follow the fix-bug SKILL.md Step 5 instructions to classify
        the testing_mode for this fix. Emit the testing_mode signal on its own line
        in the format: testing_mode=<GREEN|UPDATE|RED>
    assert:
      - type: llm-rubric
        value: >
          The output MUST emit the literal signal "testing_mode=GREEN" on its own line.
          "testing_mode=GREEN" means the fix does not change observable behavior and
          existing tests remain valid, so no new RED test or test update is needed.
          The output FAILS if it emits testing_mode=UPDATE or testing_mode=RED, or if
          it does not emit any testing_mode= signal at all. The fix-bug SKILL.md
          currently contains no testing_mode classification step, so without that step
          documented in the skill, the model cannot follow instructions to emit this
          specific structured signal — causing this test to FAIL against the current
          SKILL.md. This is the RED state for this eval.

  - description: "testing_mode=UPDATE: behavior change with existing coverage emits testing_mode=UPDATE signal"
    vars:
      prompt: |
        You are at Step 5 (RED Test) of the fix-bug workflow. The investigation
        sub-agent has returned the following root cause report:

        root_cause_report:
          bug_id: BUG-9902
          root_cause: "src/api/formatter.py returns ISO 8601 timestamps but callers
            expect Unix epoch integers. The formatter was recently changed."
          fix_description: "Update formatter.py to return Unix epoch integers."
          existing_test_file: "tests/unit/test_formatter.py"
          existing_test_name: "test_format_timestamp"

        Before proceeding, follow the fix-bug SKILL.md Step 5 instructions to classify
        the testing_mode for this fix. Emit the testing_mode signal on its own line
        in the format: testing_mode=<GREEN|UPDATE|RED>
    assert:
      - type: llm-rubric
        value: >
          The output MUST emit the literal signal "testing_mode=UPDATE" on its own line.
          "testing_mode=UPDATE" means the fix changes observable behavior and existing
          tests cover this behavior but assert old behavior — so the existing tests must
          be updated rather than a new test written. The output FAILS if it emits
          testing_mode=RED or testing_mode=GREEN, or if it does not emit any testing_mode=
          signal at all. The fix-bug SKILL.md currently contains no testing_mode
          classification step, so without that step documented in the skill, the model
          cannot follow instructions to emit this specific structured signal — causing
          this test to FAIL against the current SKILL.md. This is the RED state for
          this eval.

  - description: "testing_mode=RED: behavior change with no existing coverage emits testing_mode=RED signal"
    vars:
      prompt: |
        You are at Step 5 (RED Test) of the fix-bug workflow. The investigation
        sub-agent has returned the following root cause report:

        root_cause_report:
          bug_id: BUG-9903
          root_cause: "src/notifications/dispatcher.py silently drops retry notifications
            when the retry count exceeds the configured max_retries threshold, instead of
            emitting a failure event."
          fix_description: "Emit a NotificationFailureEvent when retry count exceeds
            max_retries in dispatcher.py."
          existing_test_coverage: false

        Before proceeding, follow the fix-bug SKILL.md Step 5 instructions to classify
        the testing_mode for this fix. Emit the testing_mode signal on its own line
        in the format: testing_mode=<GREEN|UPDATE|RED>
    assert:
      - type: llm-rubric
        value: >
          The output MUST emit the literal signal "testing_mode=RED" on its own line.
          "testing_mode=RED" means the fix changes observable behavior and there is no
          existing test coverage — so a new RED test must be written by dispatching
          dso:red-test-writer before the fix is applied. The output FAILS if it emits
          testing_mode=GREEN or testing_mode=UPDATE, or if it does not emit any
          testing_mode= signal at all. The fix-bug SKILL.md currently contains no
          testing_mode classification step, so without that step documented in the skill,
          the model cannot follow instructions to emit this specific structured signal —
          causing this test to FAIL against the current SKILL.md. This is the RED state
          for this eval.

  # MAX_AGENTS eval tests — GREEN state after SKILL.md update to use MAX_AGENTS protocol in Step 7.5.4.
  - description: "MAX_AGENTS unlimited: fix-bug SKILL.md documents unlimited dispatch with explicit instruction quote"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the fix-bug skill at Step 7.5.4 (Dispatch Fix Sub-Agents Using MAX_AGENTS Protocol).
        Here is the relevant Step 7.5.4 content from your SKILL.md:

        ---
        Before dispatching fix sub-agents, run the shared pre-batch check to determine the dynamic batch size:
        .claude/scripts/dso agent-batch-lifecycle.sh pre-check
        The script outputs structured key-value pairs:
        - MAX_AGENTS: 0 | 1 | 5 | unlimited — use as max_agents
        - SESSION_USAGE: normal | high
        - GIT_CLEAN: true | false — if false, commit previous batch first
        MAX_AGENTS handling:
        - MAX_AGENTS: unlimited — dispatch ALL fix agents in a single batch with no cap. Do not artificially limit to 5 or any other number.
        - MAX_AGENTS: 5 — dispatch fix agents in batches capped at the returned value.
        - MAX_AGENTS: 1 — dispatch fix agents one at a time (session usage is high).
        - MAX_AGENTS: 0 — skip sub-agent dispatch entirely. Log: "MAX_AGENTS=0, skipping fix sub-agent dispatch." and proceed to Step 7.5.5.
        ---

        The agent-batch-lifecycle.sh pre-check returned: MAX_AGENTS: unlimited
        You have 9 anti-pattern fix agents to dispatch.
        How many sub-agents do you dispatch in this batch? Quote the exact
        sentence or bullet point from the Step 7.5.4 content above that
        documents MAX_AGENTS: unlimited handling.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Dispatches all 9 fix agents in a single batch — does NOT cap at 5
          2. Quotes or closely paraphrases the instruction: "MAX_AGENTS: unlimited — dispatch ALL fix agents in a single batch with no cap. Do not artificially limit to 5 or any other number."
          3. The cited text matches what is documented in the provided Step 7.5.4 content
          4. Does NOT say "based on the general principle" or "logically, unlimited
             means" — cites a real documented instruction for MAX_AGENTS: unlimited

  - description: "MAX_AGENTS 0: fix-bug SKILL.md documents zero-dispatch behavior with explicit instruction"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the fix-bug skill at Step 7.5.4 (Dispatch Fix Sub-Agents Using MAX_AGENTS Protocol).
        Here is the relevant Step 7.5.4 content from your SKILL.md:

        ---
        Before dispatching fix sub-agents, run the shared pre-batch check to determine the dynamic batch size:
        .claude/scripts/dso agent-batch-lifecycle.sh pre-check
        The script outputs structured key-value pairs:
        - MAX_AGENTS: 0 | 1 | 5 | unlimited — use as max_agents
        - SESSION_USAGE: normal | high
        - GIT_CLEAN: true | false — if false, commit previous batch first
        MAX_AGENTS handling:
        - MAX_AGENTS: unlimited — dispatch ALL fix agents in a single batch with no cap. Do not artificially limit to 5 or any other number.
        - MAX_AGENTS: 5 — dispatch fix agents in batches capped at the returned value.
        - MAX_AGENTS: 1 — dispatch fix agents one at a time (session usage is high).
        - MAX_AGENTS: 0 — skip sub-agent dispatch entirely. Log: "MAX_AGENTS=0, skipping fix sub-agent dispatch." and proceed to Step 7.5.5.
        ---

        The agent-batch-lifecycle.sh pre-check returned: MAX_AGENTS: 0
        You have 6 anti-pattern fix agents to dispatch.
        How many sub-agents do you dispatch? What does MAX_AGENTS: 0 mean
        for fix dispatch? Quote the exact sentence or bullet point from
        the Step 7.5.4 content above that documents MAX_AGENTS: 0 handling.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Dispatches zero sub-agents — skips sub-agent dispatch entirely
          2. Quotes or closely paraphrases the instruction: "MAX_AGENTS: 0 — skip sub-agent dispatch entirely. Log: MAX_AGENTS=0, skipping fix sub-agent dispatch. and proceed to Step 7.5.5."
          3. The cited text matches what is documented in the provided Step 7.5.4 content
          4. Does NOT say "based on the general principle" or "logically, 0 means" —
             cites a real documented instruction for MAX_AGENTS: 0

  - description: "Fix-bug Step 7.5 does NOT hardcode batches of 5 when MAX_AGENTS varies"
    options:
      provider: "anthropic:messages:claude-haiku-4-5-20251001"
    vars:
      prompt: >
        You are the fix-bug skill. Here is your Step 7.5.4 content from SKILL.md:

        ---
        #### 7.5.4 — Dispatch Fix Sub-Agents Using MAX_AGENTS Protocol
        Before dispatching fix sub-agents, run the shared pre-batch check to determine the dynamic batch size:
        .claude/scripts/dso agent-batch-lifecycle.sh pre-check
        The script outputs structured key-value pairs:
        - MAX_AGENTS: 0 | 1 | 5 | unlimited — use as max_agents
        MAX_AGENTS handling:
        - MAX_AGENTS: unlimited — dispatch ALL fix agents in a single batch with no cap.
        - MAX_AGENTS: 5 — dispatch fix agents in batches capped at the returned value.
        - MAX_AGENTS: 1 — dispatch fix agents one at a time (session usage is high).
        - MAX_AGENTS: 0 — skip sub-agent dispatch entirely.
        ---

        Review the Step 7.5.4 instructions above regarding batch size limits
        for fix sub-agent dispatch. Does the skill instruct you to always dispatch
        in "batches of 5" or "at most 5 concurrent agents"? Or does it instruct
        you to use the MAX_AGENTS value dynamically (which can be 0, 1, 5, or
        unlimited)? Cite the exact batch sizing rule from Step 7.5.4.
    assert:
      - type: llm-rubric
        value: >
          The output must satisfy ALL of the following:
          1. Confirms that batch size is determined dynamically by the MAX_AGENTS
             value — NOT hardcoded to 5
          2. Mentions that MAX_AGENTS can be 0 (skip dispatch), 1, 5, or unlimited
             (no cap) — at minimum mentions unlimited and 0 as valid values
          3. Does NOT describe the batch size rule as "always 5" or "batches of at most 5"
          4. Cites a specific Step 7.5.4 instruction that documents dynamic
             batch sizing based on the MAX_AGENTS signal
          5. Does NOT say the fix-bug instructions only support batches of 5
