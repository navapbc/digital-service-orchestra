description: "Brainstorm skill evals — intermediate-step verification for multi-step workflow"

providers:
  - id: "anthropic:messages:claude-haiku-4-5-20251001"
    config:
      max_tokens: 4096

defaultTest:
  options:
    provider: "anthropic:messages:claude-haiku-4-5-20251001"

prompts:
  - |
    You are the brainstorm skill for a software development workflow tool.
    Your job is to turn feature ideas into well-defined epic specifications
    through a structured multi-phase process.

    Non-epic ticket detection: When invoked with a ticket ID, first check the
    ticket type. If the ticket type is story, task, or bug (not epic), present
    two options before proceeding: (a) convert-to-epic — close the original
    ticket and run the full brainstorm flow, or (b) enrich-in-place — run a
    streamlined enrichment dialogue without converting the ticket type.

    Phase 1 (Socratic Dialogue): Ask clarifying questions one at a time to
    understand the problem, users, value, scope, constraints, and success
    criteria. Do NOT jump to solutions or propose approaches until you
    thoroughly understand the feature.

    Phase 2 (Approach + Spec): Once you have enough context, propose 2-3
    implementation approaches with trade-offs, then draft a structured epic
    spec with Context, Success Criteria, and Dependencies sections.

    Phase 3 (Ticket Integration): Create the epic ticket, run health validation,
    then write a brainstorm sentinel file to record completion. The sentinel
    file (e.g., brainstorm-sentinel or .brainstorm-complete) MUST be written
    after ticket creation and health validation pass but BEFORE invoking the
    next skill (preplanning or implementation-plan). The sentinel file must
    contain the epic ID and brainstorm session metadata so downstream processes
    can detect that brainstorm completed successfully. Writing the sentinel is
    a REQUIRED Phase 3 action, not optional.

    Rules:
    - Ask ONE question at a time during Phase 1 — exactly ONE question per
      response, never multiple questions in a single message
    - Prefer multiple-choice questions over open-ended ones
    - Apply YAGNI ruthlessly — do not include unnecessary scope
    - Success criteria must be observable outcomes, not implementation details
    - Always propose approaches BEFORE drafting the spec

    Convert-to-epic flow: When user selects option (a), acknowledge that the
    original ticket will be closed as superseded, then begin Phase 1 Socratic
    dialogue (ask ONE clarifying question at a time). Do NOT skip to Phase 2.
    The original ticket is closed/superseded only after the new epic is created.

    Enrich-in-place flow: When user selects option (b), run a streamlined
    enrichment dialogue — ask targeted clarifying questions to gather just
    enough context to produce structured updates (acceptance criteria, approach
    summary, affected components). Do NOT create a new epic, do NOT close the
    original ticket, do NOT enter the full multi-phase epic brainstorm flow.
    The result is a lightweight update to the existing ticket only — no
    Phase 2 approach proposals or full epic spec drafting.

    Understanding summary protocol: When the user provides mostly sufficient
    context and explicitly asks for a summary before proceeding, present a
    structured understanding summary in brief bullet form covering the problem,
    users, scope, and success criteria. Then ask the user to confirm the summary
    is correct BEFORE proceeding. Do NOT present gap questions in the same
    response — wait for confirmation first. Do NOT advance to Phase 2 until
    the summary is confirmed.

    Explicit Phase 2 request: When the user provides comprehensive context AND
    explicitly says to proceed to approaches/spec (e.g., "please propose
    approaches and draft the spec"), skip the understanding summary and go
    directly to Phase 2 — propose approaches with trade-offs, then draft the
    structured epic spec.

    The user says:
    {{prompt}}

tests:
  - description: "Enters Socratic dialogue phase for a vague feature idea"
    vars:
      prompt: |
        I want to add notifications to our app.
    assert:
      - type: llm-rubric
        value: >
          The output enters a Socratic dialogue phase rather than immediately
          proposing a solution or writing a spec. It should:
          (1) ask at least one clarifying question about the feature (e.g.,
          what kind of notifications, who receives them, what triggers them,
          or what problem notifications would solve),
          (2) focus on ONE topic per question — a single question with
          multiple-choice options (A, B, C, D) counts as one question and is
          acceptable, but asking multiple unrelated open-ended questions in
          the same message is not,
          (3) NOT propose implementation approaches or draft an epic spec yet —
          the skill should gather more context first before jumping to solutions.

  - description: "Produces structured epic spec for a well-defined feature"
    options:
      provider: "anthropic:messages:claude-sonnet-4-6-20260320"
    vars:
      prompt: |
        I need a CSV export feature. Here's what I know:
        - Problem: Our users currently have to manually copy data from the UI
          into spreadsheets for reporting. This takes hours each week.
        - Users: Operations managers who generate weekly reports.
        - Value: Saves 3+ hours per week per operations manager.
        - Scope: Export the main data table view as CSV. Not building Excel
          or PDF export. Not building scheduled/automated exports.
        - Constraints: Must work with our existing React frontend and Python
          API backend. No new dependencies preferred.
        - Success: Users can click an export button and download a CSV file
          containing the currently filtered/sorted data view.

        I have enough context — please propose approaches and draft the spec.
    assert:
      - type: llm-rubric
        value: >
          The output produces a structured epic specification because the user
          provided comprehensive context. It should:
          (1) propose 2-3 distinct implementation approaches with trade-offs
          (e.g., client-side vs server-side CSV generation),
          (2) include a recommended approach with rationale,
          (3) contain a structured epic spec with a Context section (narrative
          describing the problem and affected users), a Success Criteria section
          (3-6 specific, observable, pass/fail outcomes — NOT implementation
          details like "implement endpoint"), and a Dependencies section,
          (4) success criteria should describe user-observable outcomes (e.g.,
          "Users can download a CSV file" rather than "Add CSV endpoint to API").

  - description: "Presents convert-to-epic and enrich-in-place options for a non-epic ticket"
    vars:
      prompt: |
        I ran /dso:brainstorm on ticket DSO-123. The ticket show output is:
        {
          "ticket_id": "DSO-123",
          "ticket_type": "story",
          "title": "As a user, I want to export data to CSV",
          "status": "open",
          "description": "Users need a way to download their data."
        }
        What should I do next?
    assert:
      - type: llm-rubric
        value: >
          The output detects that the ticket type is a story (non-epic ticket)
          and presents exactly two options to the user rather than proceeding
          directly to Socratic dialogue or drafting a spec. It should:
          (1) identify that the ticket type is "story" (or task or bug), not
          "epic", and explicitly state this to the user,
          (2) present option (a) to convert the ticket to an epic — describing
          that the original ticket will be closed as superseded and a new epic
          will be created via the full brainstorm flow,
          (3) present option (b) to enrich in-place — describing that the skill
          will run a streamlined enrichment dialogue to flesh out the existing
          ticket without converting it to an epic,
          (4) NOT proceed immediately to Socratic dialogue questions, approach
          proposals, or spec drafting — it must wait for the user to choose
          between the two options.

  - description: "Runs full brainstorm flow and marks original ticket superseded when user selects convert-to-epic"
    options:
      provider: "anthropic:messages:claude-sonnet-4-6-20260320"
    vars:
      prompt: |
        I ran /dso:brainstorm on ticket DSO-456. The ticket show output is:
        {
          "ticket_id": "DSO-456",
          "ticket_type": "task",
          "title": "Add OAuth2 login support",
          "status": "open",
          "description": "We need OAuth2 so users can log in with Google or GitHub."
        }
        I want to choose option (a): convert to epic.
    assert:
      - type: llm-rubric
        value: >
          The user selected the convert-to-epic option for a non-epic ticket
          (task type). The output should proceed with the full brainstorm flow
          rather than enriching the existing ticket in place. It should:
          (1) acknowledge the convert-to-epic selection and state that the
          original ticket (DSO-456) will be closed as superseded once the new
          epic is created,
          (2) begin Phase 1 Socratic dialogue by asking at least one clarifying
          question about the OAuth2 login feature — one question at a time, NOT
          a list of questions — to gather context before proposing approaches
          (e.g., which providers to support, who the affected users are, what
          problem this solves, or what success looks like),
          (3) NOT enrich the existing task ticket in place — it must treat this
          as the start of a full epic brainstorm with Socratic dialogue leading
          to approaches and an epic spec,
          (4) use language indicating the original ticket will be closed or
          marked as superseded (e.g., "close DSO-456 as superseded", "original
          ticket will be superseded by the new epic").

  - description: "Presents understanding summary and gap questions for inferred content when context is mostly sufficient"
    options:
      provider: "anthropic:messages:claude-sonnet-4-6-20260320"
    vars:
      prompt: |
        I want to add a dark mode toggle to our web app. Here's what I know:
        - Problem: Users working late at night find the current light-only interface
          causes eye strain.
        - Users: Individual contributors who frequently use the app after hours.
        - Value: Reduces eye strain and improves the experience for evening users.
        - Scope: A theme toggle in the top nav bar that persists across sessions.
        - Constraints: We use a React frontend with CSS variables for theming.

        I think that's enough context — can you summarize what you understand
        before we move forward?
    assert:
      - type: llm-rubric
        value: >
          The user provided mostly sufficient context and explicitly asked for a
          summary before proceeding. The output should present a structured
          understanding summary. It should:
          (1) present a structured understanding summary in brief bullet form
          covering at least three of these areas: the problem (eye strain from
          light interface), the users (individual contributors working after hours),
          the scope (theme toggle in top nav bar with session persistence), and
          the success criteria or outcome (reduced eye strain / improved experience),
          (2) ask for user confirmation that the summary is correct before
          proceeding — e.g., "Does this capture it correctly?" or "Let me know
          if anything is missing",
          (3) NOT yet propose implementation approaches or draft an epic spec
          in this same response — the understanding summary step must complete
          and receive confirmation first before advancing to Phase 2,
          (4) NOT present the actual gap-closing questions in the same response
          as the understanding summary — it may mention that gap questions or
          Phase 2 will follow after confirmation, but must not present them yet.

  # REVIEW-DEFENSE: This eval is intentionally RED — it asserts sentinel write behavior
  # that will be added to SKILL.md by task e75e-1747 in a subsequent TDD batch.
  # The eval must fail now (no sentinel instruction in SKILL.md) and pass after implementation.
  - description: "Phase 3 completion: writes sentinel file after epic ticket is created"
    options:
      provider: "anthropic:messages:claude-sonnet-4-6-20260320"
    vars:
      prompt: |
        You are completing Phase 3 (Ticket Integration) of the brainstorm skill.
        The user has approved the epic spec for a new feature called "CSV Export".
        The epic ticket has been successfully created with ID DSO-999.
        All ticket health checks have passed.
        What is the very next action you take after ticket creation and health validation
        complete in Phase 3, specifically regarding sentinel or completion tracking files?
    assert:
      - type: llm-rubric
        value: >
          The output must indicate that a sentinel file is written upon Phase 3
          completion to record that the brainstorm workflow has finished. It should:
          (1) reference writing a sentinel file (e.g., a file named
          ".brainstorm-complete", "brainstorm.sentinel", or similar) to the
          filesystem as a Phase 3 completion signal,
          (2) indicate the sentinel file contains or records the epic ID (DSO-999)
          or brainstorm session metadata so downstream processes can detect
          completion,
          (3) NOT skip the sentinel write step or treat it as optional —
          the sentinel write must be described as a required Phase 3 action
          that occurs after ticket creation and health validation pass,
          (4) describe the sentinel write as occurring before invoking the next
          skill (preplanning or implementation-plan), not after.

  - description: "Runs streamlined dialogue and updates ticket in-place when user selects enrich-in-place"
    options:
      provider: "anthropic:messages:claude-sonnet-4-6-20260320"
    vars:
      prompt: |
        I ran /dso:brainstorm on ticket DSO-789. The ticket show output is:
        {
          "ticket_id": "DSO-789",
          "ticket_type": "task",
          "title": "Add rate limiting to the API",
          "status": "open",
          "description": "We need rate limiting so the API isn't abused."
        }
        I want to choose option (b): enrich in-place.
    assert:
      - type: llm-rubric
        value: >
          The user selected the enrich-in-place option for a non-epic ticket
          (task type). The output should run a streamlined enrichment dialogue
          rather than the full epic brainstorm flow. It should:
          (1) acknowledge the enrich-in-place selection and confirm that the
          existing ticket (DSO-789) will be updated with structured content
          rather than converted to a new epic,
          (2) run a streamlined dialogue — asking targeted clarifying questions
          to gather just enough context to enrich the ticket (e.g., what
          triggers rate limiting, what limits to set, what happens when limits
          are exceeded) — without entering the full multi-phase Socratic
          dialogue of the epic brainstorm flow,
          (3) produce or indicate it will produce structured ticket updates
          including at least two of: acceptance criteria (specific,
          observable pass/fail conditions), an approach summary (brief
          description of how to implement the change), or relevant file
          paths / components affected,
          (4) NOT close the original ticket, NOT create a new epic ticket,
          and NOT proceed through Phase 2 approach proposals and full epic
          spec drafting — the enrich-in-place path is a lightweight update
          to the existing ticket only.
