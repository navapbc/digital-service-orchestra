description: "tdd-workflow skill evals — RED-first TDD discipline and RED-GREEN-REFACTOR sequence"

providers:
  - id: "anthropic:messages:claude-haiku-4-5-20251001"

defaultTest:
  options:
    provider: "anthropic:messages:claude-haiku-4-5-20251001"

prompts:
  - |
    You are the tdd-workflow skill for a software development workflow tool.
    Your job is to guide developers through a strict Test-Driven Development
    cycle when fixing bugs: RED (write failing test) → GREEN (minimal fix) →
    REFACTOR (clean up) → VALIDATE (full suite).

    Key rules:
    - ALWAYS write a failing test BEFORE any fix code (RED-first discipline)
    - If a new test passes immediately without a fix, it does not capture the
      bug — the developer must rethink the assertion
    - GREEN phase: change ONLY what is necessary to make the test pass; no
      refactoring, no scope creep, no additional improvements
    - REFACTOR phase is optional and separate from GREEN
    - VALIDATE: run the full test suite (make format-check && make lint && make test)
      to confirm no regressions before committing

    The user says:
    {{prompt}}

tests:
  - description: "Enforces RED-first discipline: requires a failing test before any fix code"
    vars:
      prompt: |
        I have a bug where our `parse_date` function returns None for dates
        in ISO 8601 format like "2024-03-15T10:30:00Z". I want to fix it.
        Can you help me implement the fix?
    assert:
      - type: llm-rubric
        value: >
          The output enforces RED-first TDD discipline by requiring a failing
          test before any fix code is written. It should:
          (1) instruct the developer to write a failing test (RED phase) that
          reproduces the bug — e.g., a test that calls parse_date with an ISO
          8601 timestamp and asserts the expected parsed result — BEFORE
          implementing any fix,
          (2) explicitly state that the test must fail first with the current
          (buggy) code to confirm it captures the bug — if the test passes
          immediately, it does not capture the bug and the assertion must be
          revised,
          (3) NOT provide fix code, implementation changes, or GREEN-phase
          guidance before confirming the RED test is in place and failing,
          (4) follow or describe the RED → GREEN → REFACTOR → VALIDATE
          sequence, not skip straight to implementation.

  - description: "Guides minimal GREEN fix and catches scope creep"
    options:
      provider: "anthropic:messages:claude-sonnet-4-6-20260320"
    vars:
      prompt: |
        I followed TDD and wrote this failing test for the parse_date bug:

        ```python
        def test_parse_date_handles_iso8601_with_timezone():
            """Bug: parse_date returns None for ISO 8601 dates with timezone suffix"""
            result = parse_date("2024-03-15T10:30:00Z")
            assert result == datetime(2024, 3, 15, 10, 30, 0, tzinfo=timezone.utc)
        ```

        I ran it and it fails as expected (returns None). Now I also want to:
        1. Fix the ISO 8601 parsing
        2. Add support for dates without times (e.g., "2024-03-15")
        3. Add logging for invalid date formats
        4. Refactor the whole parse_date function while I'm in there

        Can you help me with the GREEN phase?
    assert:
      - type: llm-rubric
        value: >
          The output correctly enforces minimal-fix discipline for the GREEN
          phase and flags scope creep. It should:
          (1) confirm the developer has correctly completed RED phase — the
          failing test is present and confirms the bug,
          (2) instruct the developer to implement ONLY the minimal change
          needed to make the specific failing test pass — fixing ISO 8601
          parsing with a timezone suffix,
          (3) explicitly warn against or decline to help with items 2, 3,
          and 4 during the GREEN phase — adding date-without-time support,
          adding logging, and refactoring are scope creep that should be
          deferred to separate issues or a later REFACTOR step,
          (4) make clear that the REFACTOR step (if needed) comes after GREEN
          and that tests must still pass after any refactor,
          (5) instruct the developer to run the test suite after implementing
          the minimal fix to confirm GREEN (all tests pass).

  - description: "Rejects a test that passes immediately without a fix"
    vars:
      prompt: |
        I wrote this test for the parse_date bug:

        ```python
        def test_parse_date_is_callable():
            """Test that parse_date is callable"""
            assert callable(parse_date)
        ```

        I ran it and it passes right away. Great — I'm done with the RED
        phase, right? Now I can implement the fix?
    assert:
      - type: llm-rubric
        value: >
          The output identifies that the test passing immediately means it
          does not capture the bug, and blocks progression to the GREEN phase.
          It should:
          (1) explicitly state that a test that passes immediately with the
          current (buggy) code does NOT capture the bug — the RED phase
          requires the test to FAIL first,
          (2) explain that the test `test_parse_date_is_callable` only checks
          whether parse_date is callable (which it already is), not whether
          it correctly handles ISO 8601 dates — this assertion is wrong for
          capturing the bug,
          (3) instruct the developer to rethink the assertion — the test
          must call parse_date with the problematic input (an ISO 8601
          timestamp) and assert the expected correct output that the bug
          prevents,
          (4) NOT allow progression to the GREEN phase (fix implementation)
          until a properly failing RED test is in place.
