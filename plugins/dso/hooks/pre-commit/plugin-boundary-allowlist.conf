# plugin-boundary-allowlist.conf
# Positive-enumeration allowlist for files permitted inside plugins/dso/.
#
# How to add a new permitted path:
#   Add a glob pattern below to allow the path through the boundary check.
#   Patterns are matched against paths relative to plugins/dso/ (the plugin root).
#   Use explicit directory prefixes (e.g., docs/workflows/**) rather than bare
#   extension wildcards (e.g., *.md) to avoid unintended cross-directory matches,
#   since bash 'case' glob — * matches any character including '/'.
#
# Each non-blank, non-comment line is a glob pattern.
# The hook uses bash 'case' matching.

# Plugin metadata root file (exact name match)
.claude-plugin

# Plugin metadata subdirectory
.claude-plugin/**

# Known root-level documentation files
CHANGELOG.md
README.md
SECURITY.md
LICENSE
LICENSE.md

# Root-level config and tooling files
pyproject.toml
Makefile
.pre-commit-config.yaml

# Agent definitions
agents/**

# Slash commands
commands/**

# Plugin config
config/**

# Plugin-level documentation subdirectories
# NOTE: docs/designs/ is intentionally NOT listed here — design docs belong in
# the project-level docs/designs/ directory, not the plugin directory.
# To permit a new docs subdirectory, add an explicit entry like: docs/mysubdir/**
docs/workflows/**
docs/contracts/**
docs/adr/**
docs/decisions/**
docs/templates/**
docs/adapters/**

# Hook scripts and supporting files
hooks/**

# Plugin scripts (runners, adapters, agent profiles, etc.)
scripts/**

# Skills (each skill has its own subdirectory with SKILL.md and possibly docs/, prompts/ subdirs)
skills/**
