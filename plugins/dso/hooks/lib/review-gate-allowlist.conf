# review-gate-allowlist.conf
# Single source of truth for all non-reviewable file classification patterns.
# Consumed by skip-review-check.sh and compute-diff-hash.sh.
#
# Format: one glob pattern per non-empty, non-comment line.
# Lines starting with # are comments. Blank lines are ignored.
#
# NOTE: Visual baseline and unit snapshot paths are config-driven
# (merge.visual_baseline_path in dso-config.conf) and added
# dynamically at load time by the consumer scripts. They are NOT
# listed here because they vary per project.

# Ticket metadata — v3 event-sourced worktree (orphan branch)
.tickets-tracker/**

# NOTE: v2 hook passthroughs have been removed as part of story 4506-e5da
# GREEN cleanup (cascade-circuit-breaker.sh, review-stop-check.sh,
# title-length-validator.sh). Only .tickets-tracker/ is the v3 ticket store.

# Sync metadata
.sync-state.json

# Checkpoint sentinel (removed by record-review.sh after review passes)
.checkpoint-needs-review

# Test index metadata
.test-index

# Images
*.png
*.jpg
*.jpeg
*.gif
*.svg
*.ico
*.webp

# Binary documents
*.pdf
*.docx

# Non-agent documentation
docs/**

# Claude non-agent docs and session logs
.claude/docs/**
.claude/session-logs/**

# Claude brainstorm/research artifacts
.claude/artifacts/**
