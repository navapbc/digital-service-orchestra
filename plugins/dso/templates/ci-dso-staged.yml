# DSO Staged CI Workflow Template
# Copy to .github/workflows/ci.yml and configure GitHub Actions Variables:
#   DSO_LINT_CMD        — command to run linting (e.g., "make lint")
#   DSO_FORMAT_CHECK_CMD — command to check formatting (e.g., "make format-check")
#   DSO_TEST_CMD        — command to run tests (e.g., "make test")
#   DSO_VALIDATE_CMD    — command to run DSO validation (e.g., your project's validate.sh --ci invocation)
#   DSO_PLUGIN_PATH    — path to the DSO plugin root in your repo (set during onboarding)
#   ANTHROPIC_API_KEY  — (secret) Anthropic API key for LLM review runner
#
# REVIEW-DEFENSE: Structural tests for this template are in
# tests/scripts/test-ci-dso-staged-template.sh with a .test-index entry
# (added in the task that created the test file, ea9d-ed23, committed prior
# to this template being added).
#
# The 'resolve-dso-version' step in the validate-ci job uses the companion
# helper script ci-dso-fetch.sh (in the DSO plugin's scripts/ directory) to
# resolve the active DSO plugin version and populate a cached clone at
# CLONE_DIR. Tests for the fetch script are in tests/scripts/test-ci-dso-fetch.sh.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check required variables are configured
        run: |
          missing=""
          [ -z "$DSO_LINT_CMD" ] && missing="$missing DSO_LINT_CMD"
          [ -z "$DSO_FORMAT_CHECK_CMD" ] && missing="$missing DSO_FORMAT_CHECK_CMD"
          if [ -n "$missing" ]; then
            echo "ERROR: Required GitHub Actions Variables not set:$missing" >&2
            echo "Configure them in your repository or organization settings." >&2
            exit 1
          fi
        env:
          DSO_LINT_CMD: ${{ vars.DSO_LINT_CMD }}
          DSO_FORMAT_CHECK_CMD: ${{ vars.DSO_FORMAT_CHECK_CMD }}

      - name: Run lint
        run: ${{ vars.DSO_LINT_CMD }}

      - name: Run format check
        run: ${{ vars.DSO_FORMAT_CHECK_CMD }}

  tests:
    needs: [lint-format]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUITE_TEST_INDEX: ${{ github.workspace }}/.test-index
    steps:
      - uses: actions/checkout@v4

      - name: Check required variables are configured
        run: |
          if [ -z "$DSO_TEST_CMD" ]; then
            echo "ERROR: Required GitHub Actions Variable DSO_TEST_CMD is not set." >&2
            echo "Configure it in your repository or organization settings." >&2
            exit 1
          fi
        env:
          DSO_TEST_CMD: ${{ vars.DSO_TEST_CMD }}

      - name: Run tests
        run: ${{ vars.DSO_TEST_CMD }}

  tests-pipefail-strict:
    needs: [lint-format]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUITE_TEST_INDEX: ${{ github.workspace }}/.test-index
    steps:
      - uses: actions/checkout@v4

      - name: Check DSO_TEST_CMD is set
        run: |
          if [ -z "${{ vars.DSO_TEST_CMD }}" ]; then
            echo "Error: DSO_TEST_CMD is not set. Set it in GitHub Actions Variables." >&2
            exit 1
          fi

      - name: Run tests under strict pipefail
        # Use shell: to enforce strict mode at the runner level rather than
        # relying on a BASH_OPTS env var (GitHub Actions does not auto-apply env
        # vars as bash flags; the shell: key is the correct mechanism).
        shell: bash -eo pipefail {0}
        run: ${{ vars.DSO_TEST_CMD }}

  llm-review:
    needs: [tests]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Run LLM review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash -eo pipefail {0}
        run: |
          gh pr diff | bash "${{ vars.DSO_PLUGIN_PATH }}/scripts/ci-llm-review-runner.sh"

  validate-ci:
    needs: [tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check required variables are configured
        run: |
          if [ -z "$DSO_VALIDATE_CMD" ]; then
            echo "ERROR: Required GitHub Actions Variable DSO_VALIDATE_CMD is not set." >&2
            echo "Configure it in your repository or organization settings." >&2
            exit 1
          fi
        env:
          DSO_VALIDATE_CMD: ${{ vars.DSO_VALIDATE_CMD }}

      - name: Resolve DSO version and fetch plugin
        # Calls ci-dso-fetch.sh (DSO plugin scripts/) which:
        #   1. Resolves the active DSO version via resolve-dso-version.sh (3-tier chain).
        #   2. Derives CLONE_DIR=${RUNNER_TEMP}/dso/<version>/.
        #   3. Checks dso-sentinel.json for a valid cached clone (schema: version + commit_sha).
        #   4. Verifies the cached commit SHA against git ls-remote before reuse.
        #   5. On cache miss or SHA mismatch: clones atomically (tmpdir → rename).
        #   6. Writes dso-sentinel.json after a successful clone.
        #   7. Validates CLONE_DIR/<plugin-path>/marketplace.json exists.
        # CLONE_DIR is exported to subsequent steps via $GITHUB_ENV.
        run: |
          bash "${{ vars.DSO_PLUGIN_PATH }}/scripts/ci-dso-fetch.sh"
          echo "CLONE_DIR=$CLONE_DIR" >> "$GITHUB_ENV"
        env:
          DSO_REPO_URL: ${{ vars.DSO_REPO_URL }}

      - name: Run DSO validation
        run: ${{ vars.DSO_VALIDATE_CMD }}
