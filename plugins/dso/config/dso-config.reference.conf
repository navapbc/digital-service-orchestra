# dso-config.reference.conf — DSO plugin reference configuration
#
# This file defines the canonical set of DSO configuration keys with their
# default values. It is used by dso-setup.sh during install and update to
# merge new keys into the host project's .claude/dso-config.conf.
#
# Strategy: key-additive merge. Keys already present in the host config
# (active or commented out) are never overwritten. Only missing keys are appended.
#
# Format: KEY=VALUE (dot-notation for nesting)
#
version=1.1.0
# dso.plugin_root is always set by dso-setup.sh directly — listed here for reference only.
# dso.plugin_root=

# --- Model tier configuration ---
model.haiku=claude-haiku-4-5-20251001
model.sonnet=claude-sonnet-4-6
model.opus=claude-opus-4-6

# --- Worktree lifecycle ---
worktree.isolation_enabled=true

# --- Test gate configuration ---
test_quality.tool=bash-grep
test_quality.enabled=true
test_gate.centrality_threshold=999999

# --- Sprint configuration ---
brainstorm.enforce_entry_gate=true
sprint.max_replan_cycles=2
implementation_plan.approach_resolution=autonomous

# --- Review configuration ---
# review.max_resolution_attempts=5

# --- Scope drift reviewer ---
scope_drift.enabled=true

# --- Suggestion capture thresholds ---
suggestion.error_threshold=10
suggestion.timeout_threshold=3

# --- Debug configuration ---
debug.max_fix_validate_cycles=3
debug.intent_search_budget=20

# --- Ticket system ---
# tickets.prefix=myproject
# tickets.directory=.tickets-tracker

# --- Monitoring ---
monitoring.tool_errors=true

# --- Clarity check ---
clarity_check.pass_threshold=5
