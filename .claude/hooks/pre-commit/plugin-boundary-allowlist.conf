# plugin-boundary-allowlist.conf
# Positive-enumeration allowlist for plugins/dso/ directory.
#
# PURPOSE:
#   The check-plugin-boundary.sh pre-commit hook reads this file to determine
#   which file paths are permitted inside plugins/dso/. Any file staged under
#   plugins/dso/ that does NOT match a pattern here will be blocked.
#
# HOW TO ADD A NEW PERMITTED PATH:
#   1. Add a glob pattern (relative to repo root) on its own line.
#   2. Blank lines and lines starting with '#' are ignored.
#   3. Patterns support fnmatch-style globbing: use /** at the END of a pattern to match any path depth.
#   4. Keep patterns broad enough to cover future legitimate growth in that area.
#
# EXAMPLES:
#   plugins/dso/skills/**           -- all files under skills/ (current and future)
#   plugins/dso/scripts/*.sh        -- shell scripts at the top level of scripts/
#   plugins/dso/docs/contracts/*.md -- contract markdown files only

# ── Core plugin structure ────────────────────────────────────────────────────
plugins/dso/skills/**
plugins/dso/agents/**
plugins/dso/hooks/**
plugins/dso/scripts/**
plugins/dso/templates/**
plugins/dso/config/**
plugins/dso/docs/adapters/**
plugins/dso/docs/contracts/**
plugins/dso/docs/templates/**
plugins/dso/docs/workflows/**
plugins/dso/docs/prompts/**
plugins/dso/docs/examples/**
plugins/dso/docs/*.md
plugins/dso/docs/*.json
plugins/dso/docs/*.conf
plugins/dso/pyproject.toml
plugins/dso/Makefile
plugins/dso/poetry.lock
plugins/dso/README.md
plugins/dso/.gitignore
plugins/dso/marketplace.yaml
plugins/dso/.claude-plugin/plugin.json
plugins/dso/.dso-source-of-truth
