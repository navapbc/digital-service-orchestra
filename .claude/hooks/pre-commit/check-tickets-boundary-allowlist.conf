# check-tickets-boundary allowlist — files exempt from boundary enforcement
# Additional entries are added by individual story tasks.
# IMPORTANT: Do NOT put inline comments after path entries (# foo) — the reader
# does not strip trailing comments, and the full line becomes the glob pattern.

# Thin wrappers from epic e1b2-2653 SC1 refactors (these call the boundary, not bypass it)
plugins/dso/scripts/sprint-next-batch.sh
plugins/dso/scripts/sprint-list-epics.sh
plugins/dso/scripts/purge-non-project-tickets.sh

# Ticket CLI implementation scripts (these ARE the boundary)
plugins/dso/scripts/ticket-*.sh

# Pre-commit gate hook (enforces ticket existence via tracker)
plugins/dso/hooks/pre-commit-ticket-gate.sh

# Suggestions/review event accessors
plugins/dso/scripts/suggestion-record.sh
plugins/dso/scripts/retro-gather.sh
plugins/dso/scripts/compute-diff-hash.sh
plugins/dso/scripts/emit-review-event.sh
plugins/dso/scripts/capture-review-diff.sh

# Test fixtures (intentional violator patterns)
tests/hooks/test-check-tickets-boundary.sh

# The enforcement hook itself (contains pattern strings that would self-trigger)
plugins/dso/hooks/check-tickets-boundary.sh

# Hook configuration and meta-files that describe the boundary (not enforce/bypass it)
.pre-commit-config.yaml
.claude/hooks/pre-commit/check-tickets-boundary-allowlist.conf

# Test index (references test file names for absorbed scripts)
.test-index

# Gitignore: structural file paths
.gitignore
