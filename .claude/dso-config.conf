# workflow-config.conf — Digital Service Orchestra plugin configuration
#
# This file is optional. When present it is read by read-config.sh and used
# by all parameterizable skills (sprint, tdd-workflow, review-protocol, etc.).
#
# Format: KEY=VALUE (dot-notation for nesting, repeated keys for lists)
# Read by: read-config.sh via grep/cut (no Python required)
#
# Supported version: 1.0.0

# Required: config schema version (semver).
# Increment the minor version when new keys are added.
version=1.0.0

# Optional: explicitly declare the project stack.
# When omitted, detect-stack.sh auto-detects from marker files:
#   pyproject.toml   → python-poetry
#   package.json     → node-npm
#   Cargo.toml       → rust-cargo
#   go.mod           → golang
#   Makefile         → convention-based (fallback)
#
# Valid values: python-poetry | node-npm | rust-cargo | golang | convention-based
# stack=python-poetry

# Format — file extensions and source dirs for auto-format hook
# List values use repeated keys (one per line).
# Defaults to .py when absent.
format.extensions=.py
# Defaults to app/src, app/tests when absent.
format.source_dirs=plugins/dso/scripts
format.source_dirs=tests

# CI polling configuration for ci-status.sh --wait adaptive backoff.
# All values must match the `name:` field in your CI workflow file exactly.
# ci.fast_gate_job=Fast Gate
# ci.fast_fail_job=Fast Gate
# ci.test_ceil_job=Unit Tests

# GitHub Actions workflow name to check for integration test status.
# Used by validate-work and CI status checks to poll integration tests separately.
# When absent, integration workflow status checks are skipped.
# ci.integration_workflow=Integration Tests

# Commands — shell commands for each workflow step.
# All keys are optional; omitted keys fall back to stack defaults or skip with a warning.
commands.test=bash tests/run-all.sh
commands.lint=ruff check plugins/dso/scripts/*.py tests/**/*.py
commands.format=ruff format plugins/dso/scripts/*.py tests/**/*.py
commands.format_check=ruff format --check plugins/dso/scripts/*.py tests/**/*.py
commands.validate=./plugins/dso/scripts/validate.sh --ci
commands.test_unit=bash tests/run-all.sh
# DSO plugin repo has no separate syntax checker or mypy; use true (no-op) to skip.
commands.syntax_check=true
commands.lint_ruff=ruff check plugins/dso/scripts/*.py tests/**/*.py
commands.lint_mypy=true

# Optional callback for project-specific environment checks.
# When present, check-local-env.sh runs this command after generic checks.
# commands.env_check_app=make env-check-app

# Session management configuration.
session.usage_check_cmd=$HOME/.claude/check-session-usage.sh
# session.artifact_prefix=myproject-test-artifacts

# Jira integration.
jira.project=DIG

# Issue tracker CLI configuration.
issue_tracker.search_cmd=grep -rl

# Merge-to-main configuration.
# merge.visual_baseline_path=app/tests/e2e/snapshots/
# merge.ci_workflow_name=CI
# merge.message_exclusion_pattern=^chore: post-merge cleanup

# Staging environment configuration (all keys optional).
# staging.url=https://my-app-env-stage.us-east-2.elasticbeanstalk.com
# staging.deploy_check=scripts/check-staging-deploy.sh
# staging.test=scripts/smoke-test-staging.sh
# staging.routes=/,/upload,/history
# staging.health_path=/health

# Worktree lifecycle configuration.
# worktree.post_create_cmd=./scripts/worktree-setup-env.sh
# worktree.service_start_cmd=make start

# Persistence — source patterns (literal match via grep -F).
# persistence.source_patterns=src/core/data_store.py
# persistence.source_patterns=src/services/processor.py
# persistence.source_patterns=src/models/
# persistence.source_patterns=src/adapters/db/

# Persistence — test patterns (regex match via grep -E).
# persistence.test_patterns=tests/integration/.*test_.*_db_roundtrip
# persistence.test_patterns=tests/integration/.*test_.*persistence

# Tickets.
tickets.prefix=dso
tickets.directory=.tickets-tracker
# tickets.sync.jira_project_key=MYPROJ
# tickets.sync.bidirectional_comments=true
dso.plugin_root=/Users/joeoakhart/digital-service-orchestra/plugins/dso

# Checkpoint — pre-compaction auto-save configuration.
checkpoint.marker_file=.checkpoint-pending-rollback
# checkpoint.commit_label=checkpoint: my-project auto-save

# Monitoring — tool error tracking and auto-ticket creation.
# Set to true to enable automatic tool error counting and ticket creation.
# When absent or non-true, all tool error monitoring is disabled (safe-off default).
monitoring.tool_errors=true

# Test gate configuration.
# test_gate.test_dirs specifies where to search for associated test files.
# Default: tests/ (single directory)
# Multiple directories: separate with colon, e.g., tests/:integration_tests/
# test_gate.test_dirs=tests/

# Version file — path to the file that holds this project's semver string.
# When absent, scripts/bump-version.sh skips version bumping entirely.
# Supported formats:
#   .json             → reads/writes the "version" key
#   .toml             → reads/writes the "version" field
#   plaintext / no extension → single semver line (entire file content)
version.file_path=plugins/dso/.claude-plugin/plugin.json

# Review resolution — maximum autonomous fix/defend attempts before escalating to the user.
# Used by REVIEW-WORKFLOW.md Autonomous Resolution Loop, COMMIT-WORKFLOW.md, and
# TEST-FAILURE-DISPATCH.md. Escalation occurs when attempt > this value.
# review.max_resolution_attempts=5

# Review tier routing — behavioral file classification
# Semicolon-delimited glob list of file patterns to treat as behavioral (full scoring weight).
# Default value below covers all DSO plugin behavioral files.
review.behavioral_patterns=plugins/dso/skills/**;plugins/dso/hooks/**;plugins/dso/docs/workflows/**;plugins/dso/docs/prompts/**;plugins/dso/commands/**;plugins/dso/scripts/**;CLAUDE.md;.claude/**

# Debug — debug-everything validation loop settings
# Maximum number of fix→validate cycles before stopping.
# Default: 3
debug.max_fix_validate_cycles=3
# Maximum number of tool calls the intent search sub-agent (Gate 1a) may use
# when scanning for bug intent signals in open tickets and recent commit history.
# Default: 20
debug.intent_search_budget=20
