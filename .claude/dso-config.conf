# workflow-config.conf — Digital Service Orchestra plugin configuration
#
# This file is optional. When present it is read by read-config.sh and used
# by all parameterizable skills (sprint, review-protocol, etc.).
#
# Format: KEY=VALUE (dot-notation for nesting, repeated keys for lists)
# Read by: read-config.sh via grep/cut (no Python required)
#
# Supported version: 1.1.0

# Required: config schema version (semver).
# Increment the minor version when new keys are added.
version=1.1.0

# Optional: explicitly declare the project stack.
# When omitted, detect-stack.sh auto-detects from marker files:
#   pyproject.toml   → python-poetry
#   package.json     → node-npm
#   Cargo.toml       → rust-cargo
#   go.mod           → golang
#   Makefile         → convention-based (fallback)
#
# Valid values: python-poetry | node-npm | rust-cargo | golang | convention-based
# stack=python-poetry

# Format — file extensions and source dirs for auto-format hook
# List values use repeated keys (one per line).
# Defaults to .py when absent.
format.extensions=.py
# Defaults to app/src, app/tests when absent.
format.source_dirs=plugins/dso/scripts
format.source_dirs=tests

# CI polling configuration for ci-status.sh --wait adaptive backoff.
# All values must match the `name:` field in your CI workflow file exactly.
# ci.fast_gate_job=Fast Gate
# ci.fast_fail_job=Fast Gate
# ci.test_ceil_job=Unit Tests

# GitHub Actions workflow name to check for integration test status.
# Used by validate-work and CI status checks to poll integration tests separately.
# When absent, integration workflow status checks are skipped.
# ci.integration_workflow=Integration Tests

# Commands — shell commands for each workflow step.
# All keys are optional; omitted keys fall back to stack defaults or skip with a warning.
commands.test=bash tests/run-all.sh
commands.lint=ruff check plugins/dso/scripts/*.py tests/**/*.py
commands.format=ruff format plugins/dso/scripts/*.py tests/**/*.py
commands.format_check=ruff format --check plugins/dso/scripts/*.py tests/**/*.py
commands.validate=./plugins/dso/scripts/validate.sh --ci
commands.test_unit=bash tests/run-all.sh
# Colon-separated directories for per-file incremental test execution via bash runner.
# validate.sh uses --runner=bash --test-dir=$test_dirs so each test-*.sh file runs
# individually, enabling resume across 45s budget windows without an infinite PENDING loop.
commands.test_dirs=tests/hooks:tests/scripts:tests/skills:tests/integration
# DSO plugin repo has no separate syntax checker or mypy; use true (no-op) to skip.
commands.syntax_check=true
commands.lint_ruff=ruff check plugins/dso/scripts/*.py tests/**/*.py
commands.lint_mypy=true
# Optional: run a build/compile step after lint checks (e.g., npm run build, poetry build).
# When unset or absent, the build step is skipped entirely — zero impact on repos without one.
# commands.build=npm run build

# Optional callback for project-specific environment checks.
# When present, check-local-env.sh runs this command after generic checks.
# commands.env_check_app=make env-check-app

# Session management configuration.
session.usage_check_cmd=$HOME/.claude/check-session-usage.sh
# session.artifact_prefix=myproject-test-artifacts

# Jira integration.
jira.project=DIG

# Issue tracker CLI configuration.
issue_tracker.search_cmd=grep -rl

# Merge-to-main configuration.
# merge.visual_baseline_path=app/tests/e2e/snapshots/
# merge.ci_workflow_name=CI
# merge.message_exclusion_pattern=^chore: post-merge cleanup

# Staging environment configuration (all keys optional).
# staging.url=https://my-app-env-stage.us-east-2.elasticbeanstalk.com
# staging.deploy_check=scripts/check-staging-deploy.sh
# staging.test=scripts/smoke-test-staging.sh
# staging.routes=/,/upload,/history
# staging.health_path=/health

# Worktree lifecycle configuration.
# worktree.post_create_cmd=./scripts/worktree-setup-env.sh
# worktree.service_start_cmd=make start
# When true, Agent dispatches from orchestrators running in a worktree session
# pass isolation: "worktree" so sub-agents receive a sandboxed working directory
# instead of sharing the orchestrator's directory. Set to false to fall back to
# the shared-directory behaviour (pre-isolation default).
worktree.isolation_enabled=true

# Persistence — source patterns (literal match via grep -F).
# persistence.source_patterns=src/core/data_store.py
# persistence.source_patterns=src/services/processor.py
# persistence.source_patterns=src/models/
# persistence.source_patterns=src/adapters/db/

# Persistence — test patterns (regex match via grep -E).
# persistence.test_patterns=tests/integration/.*test_.*_db_roundtrip
# persistence.test_patterns=tests/integration/.*test_.*persistence

# Tickets.
tickets.directory=.tickets-tracker
# tickets.sync.jira_project_key=MYPROJ
# tickets.sync.bidirectional_comments=true
dso.plugin_root=plugins/dso

# Checkpoint — pre-compaction auto-save configuration.
checkpoint.marker_file=.checkpoint-pending-rollback
# checkpoint.commit_label=checkpoint: my-project auto-save

# Monitoring — tool error tracking and auto-ticket creation.
# Set to true to enable automatic tool error counting and ticket creation.
# When absent or non-true, all tool error monitoring is disabled (safe-off default).
monitoring.tool_errors=true

# Test gate configuration.
# test_gate.test_dirs specifies where to search for associated test files.
# Default: tests/ (single directory)
# Multiple directories: separate with colon, e.g., tests/:integration_tests/
# test_gate.test_dirs=tests/

# Test quality gate configuration.
# Tool used for test anti-pattern detection in the pre-commit test quality gate.
# Valid values: bash-grep | semgrep | disabled
# bash-grep: zero-dependency grep-based fallback (default)
# semgrep: uses semgrep with plugins/dso/hooks/semgrep-rules/test-anti-patterns.yaml
# disabled: skips all test quality checks
test_quality.tool=bash-grep

# Enable/disable the pre-commit test quality gate.
# When false, the hook exits 0 immediately (no checks run).
test_quality.enabled=true

# Centrality threshold for full-suite trigger.
# When a staged file's fan-in exceeds this threshold, the full test suite runs.
# The full-suite path does not tolerate RED-marked test failures (per-file path does).
# Disabled (set to 999999) to always use per-file path with RED tolerance.
test_gate.centrality_threshold=999999

# Advisory batch threshold for per-file associated-test runs.
# When the associated test count for a staged file exceeds this threshold, a NOTE
# is emitted advising that SIGURG interruption is possible (and resumable via --restart).
# Default: 20. Set to 100 to accommodate skill files like preplanning/SKILL.md that
# legitimately accumulate many tests (bug 1534-d9fb, 81ab-b207 — count grew from 25→87).
test_gate.batch_threshold=100

# File count threshold for centrality bypass.
# When the number of staged source files exceeds this threshold, per-file centrality
# computation is skipped and the full test suite runs directly.
# Default: 50. Set lower (e.g., 10) for repos where large commits are common.
# test_gate.file_count_threshold=50

# Per-language import patterns for centrality scoring.
# Each pattern may contain literal $MODULE which is replaced with the module name at runtime.
# When any of these keys are present (non-empty), they replace the hardcoded defaults.
# When all are absent or empty, the hardcoded defaults (Python import/from, bash source) are used.
# test_gate.import_pattern.python=import $MODULE|from $MODULE import
# test_gate.import_pattern.flask=from flask import|from $MODULE import
# test_gate.import_pattern.ruby=require '$MODULE'|require_relative '$MODULE'
# test_gate.import_pattern.typescript=import .* from '$MODULE'|require\('$MODULE'\)
# test_gate.import_pattern.java=import .*\.$MODULE
# test_gate.import_pattern.bash=source .*$MODULE|\. .*$MODULE

# Version file — path to the file that holds this project's semver string.
# When absent, scripts/bump-version.sh skips version bumping entirely.
# Supported formats:
#   .json             → reads/writes the "version" key
#   .toml             → reads/writes the "version" field
#   plaintext / no extension → single semver line (entire file content)
version.file_path=plugins/dso/.claude-plugin/plugin.json

# Review resolution — maximum autonomous fix/defend attempts before escalating to the user.
# Used by REVIEW-WORKFLOW.md Autonomous Resolution Loop, COMMIT-WORKFLOW.md, and
# TEST-FAILURE-DISPATCH.md. Escalation occurs when attempt > this value.
# review.max_resolution_attempts=5

# Review tier routing — behavioral file classification
# Semicolon-delimited glob list of file patterns to treat as behavioral (full scoring weight).
# Default value below covers all DSO plugin behavioral files.
review.behavioral_patterns=plugins/dso/skills/**;plugins/dso/hooks/**;plugins/dso/docs/workflows/**;plugins/dso/docs/prompts/**;plugins/dso/commands/**;plugins/dso/scripts/**;CLAUDE.md;.claude/**

# Sprint — planning cascade configuration
# Maximum number of brainstorm→preplanning→implementation-plan cascade iterations
# before presenting the last available plan to the user and stopping.
# Default: 2
brainstorm.enforce_entry_gate=true
sprint.max_replan_cycles=2

# Implementation plan — approach resolution mode.
# Controls how the approach-decision-maker resolves competing implementation proposals.
# Valid values: autonomous | interactive
#   autonomous:  the decision-maker agent selects the best proposal without user input (default)
#   interactive: presents proposals to the user and waits for explicit selection
implementation_plan.approach_resolution=autonomous

# Ticket clarity check pass threshold (SC2).
# Minimum score for a ticket to pass the heuristic clarity gate.
# Valid range: 1-∞ (minimum enforced by script: 1).
# Default: 5
clarity_check.pass_threshold=5

# Model tier configuration — canonical model IDs for each agent tier.
# Used by resolve-model-id.sh to look up the model ID for a given tier.
# Override these to pin to a specific model version or substitute a different model.
model.haiku=claude-haiku-4-5-20251001
model.sonnet=claude-sonnet-4-6
model.opus=claude-opus-4-6

# Design — Figma collaboration (opt-in per design).
# When true, design-wireframe generates Figma-optimized SVG and tags stories
# with design:awaiting_import for human designer review.
# Default: false (no Figma artifacts generated).
# design.figma_collaboration=false

# Design — Figma staleness warning threshold (days).
# Stories awaiting designer import older than this value trigger a staleness warning.
# Default: 7.
design.figma_staleness_days=7

# Debug — debug-everything validation loop settings
# Maximum number of fix→validate cycles before stopping.
# Default: 3
debug.max_fix_validate_cycles=3
# Maximum number of tool calls the intent search sub-agent (Gate 1a) may use
# when scanning for bug intent signals in open tickets and recent commit history.
# Default: 20
debug.intent_search_budget=20
# GHA workflow scanning (debug-everything Phase A)
# debug.gha_scan_enabled: Set to false to skip GHA scanning entirely (default: true).
#   When false, Step 0 is skipped with no sub-agent dispatch and no ticket operations.
# debug.gha_workflows: Comma-separated workflow file names to scan, e.g. ci.yml,deploy.yml
#   When absent or empty, Step 0 logs "GHA scan skipped: no workflows configured" and skips.
#   Known limitation: repository name is derived from git remote origin; may fail in fork setups.
# debug.gha_scan_enabled=true
# debug.gha_workflows=ci.yml,deploy.yml

# orchestration.max_agents — caps the upper bound on concurrent sub-agents.
# When unset and usage verdict is unlimited, MAX_AGENTS: unlimited is emitted.
# Valid values: positive integer (e.g., 3, 5, 10) or omit for no cap.
# orchestration.max_agents=5
brainstorm.max_feasibility_cycles=2

# Suggestion capture -- stop hook thresholds.
# suggestion.error_threshold: total error count (summed across all categories in
#   tool-error-counter.json) that triggers a mechanical-friction suggestion at session end.
#   Conservative default: 10 (typical healthy session sees 2-5 transient errors).
# suggestion.timeout_threshold: count of timeout-category errors alone that triggers
#   a suggestion. Timeouts are high-signal friction; default 3 matches ~2 retries.
# Both thresholds are checked independently -- either one can trigger a suggestion.
# Set to a high value (e.g. 9999) to effectively disable.
suggestion.error_threshold=10
suggestion.timeout_threshold=3

# scope-drift reviewer gate after Step 7 verify fix
scope_drift.enabled=true

# Preplanning — interactive mode flag.
# When false, preplanning runs non-interactively: skips AskUserQuestion at all checkpoints.
# CP1 (epic selection): exits with error if no epic-id argument provided.
# CP2 (escalation policy): defaults to "Escalate when blocked".
# CP3 (scope clarification): exits with INTERACTIVITY_DEFERRED if clarification is needed.
# CP4 (reconciliation approval): auto-applies reconciliation (skips in_progress story deletions).
# CP5 (story dashboard): suppresses dashboard presentation.
# CP6 (final approval): skips AskUserQuestion and proceeds automatically.
# Default: true (interactive) when key is absent.
preplanning.interactive=false

# planning.external_dependency_block_enabled=false

# Maximum number of changed files before routing to large-refactor review path (REVIEW-WORKFLOW-HUGE.md)
review.huge_diff_file_threshold=20
