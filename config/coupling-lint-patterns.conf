# coupling-lint-patterns.conf — Allowlist and pattern config for coupling-lint-guard.sh
#
# Purpose: Centralizes the patterns used by coupling-lint-guard.sh to detect
# host-project coupling regressions in the Digital Service Orchestra plugin. The guard
# script reads this file so patterns can be updated without touching the script.
#
# Format: flat KEY=VALUE (same format as workflow-config.conf)
#   - One key per line
#   - Lines starting with # are comments and are ignored
#   - No spaces around = delimiter
#   - Space-separated lists: use spaces between tokens (SCAN_PATTERNS, LOCKPICK_CLASS_NAMES)
#   - Colon-separated lists: use : between tokens (SCAN_DIRS, ALLOWED_FILES)
#
# Keys:
#   SCAN_PATTERNS        — space-separated high-level check categories the guard runs.
#                          Valid tokens: hardcoded_app_path lockpick_class_name bare_make_call
#   SCAN_DIRS            — colon-separated directories to scan (relative to repo root).
#                          The guard scans all shell/markdown/conf files under these dirs.
#   ALLOWED_COMMENTS     — 'true' to skip lines that are pure comments (start with #).
#                          Prevents false positives from commented-out references.
#   ALLOWED_FILES        — colon-separated list of files/dirs explicitly exempted.
#                          Files matching any entry are skipped by the guard.
#                          Entries may be file paths or directory prefixes.
#   HARDCODED_APP_PATTERN — grep-E regex for hardcoded app/ path references.
#                          Matches paths like /app/, ./app/, 'app/', `app/` that are
#                          coupled to the host project's directory layout.
#   LOCKPICK_CLASS_NAMES — space-separated list of lockpick-specific class names that
#                          should not appear in portable plugin code. These names are
#                          tightly coupled to the host project's domain model.
#   BARE_MAKE_PATTERN    — grep-E regex for make targets called directly (not via
#                          read-config). Bare make calls couple the plugin to the
#                          host project's Makefile target naming conventions.
#

# ── Scan scope ───────────────────────────────────────────────────────────────

# Which check categories to run. All three enabled by default.
SCAN_PATTERNS=hardcoded_app_path lockpick_class_name bare_make_call

# Directories to scan, colon-separated (relative to repo root).
SCAN_DIRS=.

# ── Comment handling ─────────────────────────────────────────────────────────

# Skip lines that are pure comments (lines where the first non-whitespace char is #).
# This avoids false positives from documentation comments that mention patterns.
ALLOWED_COMMENTS=true

# ── Allowlist ────────────────────────────────────────────────────────────────

# Files and directories explicitly exempted from coupling-lint checks.
# Use colon-separated paths (relative to repo root or as path prefixes).
#
# Entries:
#   config/coupling-lint-patterns.conf
#     — Self-referential: this file defines the patterns, so it legitimately
#       contains the strings that would otherwise trigger violations.
#   tests/
#     — Test fixtures and test scripts may reference project-specific patterns
#       for testing purposes (e.g., synthetic violation payloads in test_guard_detects_*).
#   CLAUDE.md
#     — The host project's CLAUDE.md has project-specific content by design;
#       it documents the host project's architecture and class names for agents.
ALLOWED_FILES=config/coupling-lint-patterns.conf:tests/:CLAUDE.md

# ── Hardcoded app path pattern ───────────────────────────────────────────────

# grep-E regex that matches hardcoded references to the host project's app/ directory.
# Matches patterns like: /app/src, ./app/, 'app/', `app/`, "app/src" — but not words
# like "application", "apps", or "app_config" (the negative lookbehind [^a-z] ensures
# the match is preceded by a quote, backtick, slash, or start-of-token context).
HARDCODED_APP_PATTERN=("|\x27|`|[^a-z])\.?/app/

# ── Lockpick-specific class names ────────────────────────────────────────────

# Space-separated list of class/service names tightly coupled to the host project.
# Presence of these names in portable plugin code indicates the plugin has assumed
# the host project's domain model rather than remaining stack-agnostic.
LOCKPICK_CLASS_NAMES=PipelineLLMClientFactory PostPipelineProcessor RegoGenerationAgent DocumentService PydanticBaseEnvConfig DocumentProcessorService DroolsGenerationAgent JsonRulesEngineGenerationAgent

# ── Bare make call pattern ────────────────────────────────────────────────────

# grep-E regex for make targets invoked directly without going through read-config.
# Bare make calls like `make format-check` or `make test-unit` couple the plugin
# to the host project's Makefile target names. The guard flags these so authors
# route make calls through workflow-config.conf keys instead.
BARE_MAKE_PATTERN=\bmake (format-check|lint-ruff|lint-mypy|test-unit|test-e2e|test-unit-only|format-fix-all)\b
