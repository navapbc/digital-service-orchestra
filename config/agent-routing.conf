# agent-routing.conf — Agent routing table for task category dispatch
#
# Interface Contract
# ==================
#
# Format:
#   <category>=<agent1>|<agent2>|...|general-purpose
#
#   Each line maps a task category to a preference chain of agents.
#   Key-value pairs use = as the delimiter. The value is a pipe-delimited
#   preference chain of agent identifiers.
#
# Category key naming convention:
#   - Lowercase letters and underscores only (e.g., test_fix_unit, test_fix_e_to_e)
#   - Must match ^[a-z_]+$
#
# Preference chain evaluation order:
#   - Left-to-right: the first available agent wins
#   - The dispatcher checks each agent in order; if installed and enabled,
#     it routes the task to that agent. If unavailable, it tries the next.
#
# Fallback sentinel:
#   - Every chain MUST end with `general-purpose` as the last entry
#   - `general-purpose` is a built-in fallback that requires no plugin;
#     it ensures every task category always has a valid dispatch target
#
# Agent identifier to plugin mapping:
#   Agent identifiers use the format <plugin-name>:<agent-name>.
#   The plugin-name maps to an enabledPlugins key in .claude/settings.json:
#
#   Agent Identifier                              | enabledPlugins key
#   ----------------------------------------------|-------------------------------------------
#   unit-testing:debugger                         | unit-testing@claude-code-workflows
#   unit-testing:test-automator                   | unit-testing@claude-code-workflows
#   debugging-toolkit:debugger                    | debugging-toolkit@claude-code-workflows
#   error-debugging:error-detective               | error-debugging@claude-code-workflows
#   code-simplifier:code-simplifier               | code-simplifier@claude-plugins-official
#   backend-api-security:backend-security-coder   | backend-api-security@claude-code-workflows
#   dso:bot-psychologist                          | (local plugin agent, resolved via plugins/dso/agents/)
#   general-purpose                               | (built-in, no plugin required)
#
# Note: dso: agents are local plugin agents resolved via plugins/dso/agents/<name>.md.
# They are resolved as always-available by discover-agents.sh without requiring an
# enabledPlugins entry (short-circuit path at agent resolution loop).
#

# ── Routing Table ────────────────────────────────────────────────────────────

test_fix_unit=unit-testing:debugger|general-purpose
test_fix_e_to_e=debugging-toolkit:debugger|general-purpose
test_write=unit-testing:test-automator|general-purpose
mechanical_fix=debugging-toolkit:debugger|code-simplifier:code-simplifier|general-purpose
complex_debug=error-debugging:error-detective|debugging-toolkit:debugger|general-purpose
code_simplify=code-simplifier:code-simplifier|general-purpose
security_audit=backend-api-security:backend-security-coder|general-purpose
llm_behavioral=dso:bot-psychologist|general-purpose
approach_evaluation=dso:approach-decision-maker|general-purpose
test_quality_review=dso:code-reviewer-test-quality|general-purpose
design_creation=dso:ui-designer|general-purpose
