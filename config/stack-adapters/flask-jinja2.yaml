# Flask/Jinja2 Stack Adapter
#
# Implements the component discovery interface defined in:
#   lockpick-workflow/docs/component-discovery-schema.json
#
# Selection: activated when workflow-config.yaml has:
#   stack: python-poetry
#   design:
#     template_engine: jinja2
#
# Reference JSON adapter: lockpick-workflow/docs/adapters/flask-jinja2.json

name: flask-jinja2

# Selection metadata — maps this adapter to workflow-config.yaml values.
# Skills resolve the adapter by matching stack + design.template_engine.
selector:
  stack: python-poetry
  template_engine: jinja2

route_patterns:
  decorator_patterns:
    - pattern: '@\w+\.(route|get|post|put|delete|patch)\s*\(\s*["'']([^"'']+)["'']'
      description: "Flask blueprint or app route decorator, including shorthand methods (@bp.get, @bp.post, etc.)."
      capture_groups:
        "1": "HTTP method or 'route'"
        "2": "URL path"
    - pattern: '@app\.route\s*\(\s*["'']([^"'']+)["'']'
      description: "Direct app.route decorator (routes registered on the Flask app object)."
      capture_groups:
        "1": "URL path"

  template_render_patterns:
    - pattern: 'render_template\s*\(\s*["'']([^"'']+)["'']'
      description: "Flask render_template() call mapping route to a Jinja2 template file."
      capture_groups:
        "1": "Template file path (relative to templates directory)"
    - pattern: 'render_template_string\s*\('
      description: "Flask render_template_string() for inline template rendering."

  registration_patterns:
    - pattern: 'app\.register_blueprint\s*\(\s*(\w+)'
      description: "Blueprint registration on the Flask app object."
      capture_groups:
        "1": "Blueprint variable name"
    - pattern: '(APIBlueprint|Blueprint)\s*\(\s*["''](\w+)["'']'
      description: "Blueprint or APIBlueprint instantiation (declares the blueprint name)."
      capture_groups:
        "1": "Blueprint class (Blueprint or APIBlueprint)"
        "2": "Blueprint name"
    - pattern: 'url_prefix\s*=\s*["'']([^"'']+)["'']'
      description: "URL prefix argument in blueprint registration."
      capture_groups:
        "1": "URL prefix path"

component_file_patterns:
  glob_patterns:
    - "**/templates/**/*.html"
    - "**/macros/**/*.html"
    - "**/components/**/*.html"

  definition_patterns:
    - pattern: '\{%[-\s]+macro\s+(\w+)\s*\(([^)]*)\)'
      description: "Jinja2 macro definition with name and parameter list."
      capture_groups:
        "1": "Macro name"
        "2": "Parameter list"

  import_patterns:
    - pattern: '\{%[-\s]+import\s+["'']([^"'']+)["'']\s+as\s+(\w+)'
      description: "Jinja2 import directive (import 'file' as alias)."
      capture_groups:
        "1": "Template file path"
        "2": "Import alias"
    - pattern: '\{%[-\s]+from\s+["'']([^"'']+)["'']\s+import\s+([\w,\s]+)'
      description: "Jinja2 from-import directive (from 'file' import macro1, macro2)."
      capture_groups:
        "1": "Template file path"
        "2": "Imported macro names (comma-separated)"
    - pattern: '\{%[-\s]+include\s+["'']([^"'']+)["'']'
      description: "Jinja2 include directive."
      capture_groups:
        "1": "Included template file path"

  exclude_patterns:
    - "**/node_modules/**"
    - "**/.venv/**"
    - "**/htmlcov/**"
    - "**/__pycache__/**"
    - "**/*.test.*"
    - "**/*.spec.*"
    - "**/__tests__/**"
    - "**/dist/**"
    - "**/build/**"

template_syntax:
  component_definition:
    pattern: '\{%[-\s]+macro\s+(\w+)\s*\('
    description: "Jinja2 macro definition — the primary component abstraction in Jinja2 templates."
    capture_groups:
      "1": "Macro/component name"

  inheritance_pattern:
    pattern: '\{%[-\s]+extends\s+["'']([^"'']+)["'']'
    description: "Jinja2 template inheritance ({% extends 'base.html' %})."
    capture_groups:
      "1": "Parent template path"

  include_patterns:
    - pattern: '\{%[-\s]+include\s+["'']([^"'']+)["'']'
      description: "Jinja2 include directive for template composition."
      capture_groups:
        "1": "Included template path"
    - pattern: '\{%[-\s]+import\s+["'']([^"'']+)["'']'
      description: "Jinja2 import directive for macro namespacing."
      capture_groups:
        "1": "Imported template path"
    - pattern: '\{%[-\s]+from\s+["'']([^"'']+)["'']\s+import'
      description: "Jinja2 from-import directive for selective macro import."
      capture_groups:
        "1": "Source template path"

  block_patterns:
    - pattern: '\{%[-\s]+block\s+(\w+)\s*[-]?%\}'
      description: "Jinja2 block definition — overridable content region in template inheritance."
      capture_groups:
        "1": "Block name"

framework_detection:
  marker_files:
    - pyproject.toml
    - requirements.txt

  marker_keys:
    - key: tool.poetry.dependencies.flask
      file: pyproject.toml
      description: "Flask in Poetry dependencies"
    - key: tool.poetry.dependencies.apiflask
      file: pyproject.toml
      description: "APIFlask (Flask-based) in Poetry dependencies"
    - key: project.dependencies
      file: pyproject.toml
      description: "Flask or APIFlask in PEP 621 project dependencies array"
