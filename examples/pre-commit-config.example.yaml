# EXAMPLE: Pre-commit hooks for a Python/Poetry project using the DSO plugin.
# Copy to your project root as .pre-commit-config.yaml and customize.
# See docs/PRE-COMMIT-TIMEOUT-WRAPPER.md for timeout wrapper details.
#
# Pre-commit hooks with explicit timeouts and hard kill enforcement
#
# DESIGN: Hooks use PY_RUN_APPROACH=local (no Docker) for fast execution.
# Each hook's entry command includes PY_RUN_APPROACH=local explicitly.
# The pre-commit-wrapper.sh script
# enforces a hard kill via `timeout`/`gtimeout` at each hook's timeout_secs limit,
# preventing slow hooks from eating into subsequent hooks' time budgets.
# Note: Unit tests run during the review/commit workflow, not as a pre-commit hook.
#
# TIMEOUTS:
#   Each hook has an explicit hard timeout. When exceeded, the hook is killed and
#   the event is logged to:  <artifacts_dir>/precommit-timeouts.log
#
#   Timeouts (in seconds):
#     isolation-check:      60s  (staged-only scan with file-type guards, ~10-15s)
#     poetry-lock-check:    10s
#     format-and-lint:      15s  (staged files only via ruff; ~3-5s)
#     security-scan:        15s
#     marker-check:          5s
#     visual-baselines:      5s
#     persistence-coverage:  5s
#     migration-heads:       5s
#     import-check:         10s
#     executable-guard:      5s
#     check-assertion-density: 15s
#     pre-commit-test-gate: 10s
#     pre-commit-test-quality-gate: 15s
#     pre-commit-review-gate: 10s
#     pre-commit-ticket-gate: 10s
#     portability-check:      5s
#     shim-refs-check:        5s
#     contract-schema-check:  5s
#     referential-integrity-check: 10s
#
#   Claude Code ceiling: ~73s per tool call. Pre-commit hooks check staged
#   files only for fast feedback (~30s total). Full-tree format/lint checks
#   run in the pre-push hook to catch anything missed before CI.
#
#   If a timeout occurs, run the commands directly to debug:
#     cd app && PY_RUN_APPROACH=local make format-check
#     cd app && PY_RUN_APPROACH=local make lint
#
# To run hooks manually: poetry run pre-commit run --all-files
# To view timeout history: cat /tmp/precommit-timeouts.log

fail_fast: true

repos:
  - repo: local
    hooks:
      # Test isolation check (timeout: 30s) — staged-only scan with file-type
      # guards (rules skip irrelevant file types, e.g., shell rules skip .py).
      # Debug command: STAGED_ONLY=true scripts/check-test-isolation.sh
      - id: isolation-check
        name: Test Isolation Check (60s timeout)
        entry: ./scripts/pre-commit-wrapper.sh isolation-check 60 "STAGED_ONLY=true scripts/check-test-isolation.sh"
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]

      # Poetry lock validation (timeout: 10s)
      # Debug command: cd app && poetry check --lock
      - id: poetry-lock-check
        name: Poetry Lock Check (10s timeout)
        entry: ./scripts/pre-commit-wrapper.sh poetry-lock-check 10 "cd app && PY_RUN_APPROACH=local make poetry-lock-check"
        language: system
        pass_filenames: false
        stages: [pre-commit]

      # Format check + lint: ruff on staged .py files only (timeout: 15s)
      # Checks only staged files for fast pre-commit feedback (~3-5s).
      # Full-tree format/lint runs in the pre-push hook (pre-push-lint).
      # Debug commands:
      #   cd app && PY_RUN_APPROACH=local make format-check   (full tree)
      #   cd app && poetry run ruff check <file>              (single file)
      - id: format-and-lint
        name: Format + Lint - Ruff (15s timeout)
        entry: ./scripts/pre-commit-wrapper.sh format-and-lint 15 "cd app && PY_RUN_APPROACH=local poetry run ruff check --select I src tests && poetry run ruff format --check src tests && poetry run ruff check src tests"
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]

      # Security scan: bandit (timeout: 15s)
      # Debug command: cd app && PY_RUN_APPROACH=local make lint-security
      - id: security-scan
        name: Security Scan - Bandit (15s timeout)
        entry: ./scripts/pre-commit-wrapper.sh security-scan 15 "cd app && PY_RUN_APPROACH=local make lint-security"
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]

      # Pytest marker validation (timeout: 5s)
      # Debug command: ./scripts/check-pytest-markers.sh
      - id: marker-check
        name: Pytest Marker Validation (5s timeout)
        entry: ./scripts/check-pytest-markers.sh
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]

      # Visual baseline existence check (timeout: 5s)
      # Fails if test_visual_regression.py references snapshots that don't have baseline PNGs.
      # Debug command: ./scripts/check-visual-baselines.sh
      - id: visual-baselines
        name: Visual Baseline Check (5s timeout)
        entry: ./scripts/check-visual-baselines.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: (app/tests/e2e/|app/src/templates/|app/src/static/)

      # Persistence coverage check (timeout: 5s)
      # Ensures DB write-through paths have round-trip integration tests.
      # Debug command: ./scripts/check-persistence-coverage.sh
      - id: persistence-coverage
        name: Persistence Coverage Check (5s timeout)
        entry: ./scripts/check-persistence-coverage.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: (job_store|document_processor|db/models|db/clients)

      # Migration heads check (timeout: 5s)
      # Detects multiple Alembic migration heads from parallel worktrees.
      # Debug command: ./scripts/check-migration-heads.sh
      - id: migration-heads
        name: Migration Heads Check (5s timeout)
        entry: ./scripts/check-migration-heads.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: app/src/db/migrations/

      # Circular import detection (timeout: 10s)
      # Debug command: cd app && poetry run python -c "import src.app; import src.extraction; import src.agents"
      - id: import-check
        name: Circular Import Check (10s timeout)
        entry: ./scripts/pre-commit-wrapper.sh import-check 10 "cd app && PY_RUN_APPROACH=local make import-check"
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]

      # Executable bit guard (timeout: 5s)
      # Prevents scripts from silently losing their executable permission.
      # Debug command: ./scripts/pre-commit-executable-guard.sh
      - id: executable-guard
        name: Executable Bit Guard (5s timeout)
        entry: ./scripts/pre-commit-executable-guard.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: \.sh$

      # Portability check (timeout: 5s)
      # Detects hardcoded home-directory paths that break portability across machines.
      # Debug command: DSO_ROOT=$(./scripts/resolve-dso-plugin.sh) && "$DSO_ROOT/scripts/check-portability.sh"
      - id: portability-check
        name: Portability Check (5s timeout)
        entry: ./scripts/pre-commit-wrapper.sh portability-check 5 "DSO_ROOT=$(./scripts/resolve-dso-plugin.sh) && \"$DSO_ROOT/scripts/check-portability.sh\""
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # Shim refs check (timeout: 5s)
      # Detects direct plugin path references in plugins/dso/ that should use
      # the .claude/scripts/dso shim instead.
      # Debug command: DSO_ROOT=$(./scripts/resolve-dso-plugin.sh) && "$DSO_ROOT/scripts/check-shim-refs.sh"
      - id: shim-refs-check
        name: Shim Refs Check (5s timeout)
        entry: ./scripts/pre-commit-wrapper.sh shim-refs-check 5 "DSO_ROOT=$(./scripts/resolve-dso-plugin.sh) && \"$DSO_ROOT/scripts/check-shim-refs.sh\""
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: ^plugins/dso/

      # Contract schema validation (timeout: 5s)
      # Validates that contract markdown files have required sections (Purpose, Schema, etc.)
      # Debug command: DSO_ROOT=$(./scripts/resolve-dso-plugin.sh) && "$DSO_ROOT/scripts/check-contract-schemas.sh"
      # REVIEW-DEFENSE: resolve-dso-plugin.sh is a consuming-project responsibility, not a DSO plugin artifact.
      # This is the established convention throughout this example file (see shim-refs-check, pre-commit-test-gate,
      # review-gate, and all other hooks above). Consuming projects implement resolve-dso-plugin.sh to locate their
      # DSO plugin installation; the DSO plugin intentionally does not ship this script. The comment above the entry
      # makes this clear. See also examples/README or INSTALL.md for the onboarding path.
      - id: contract-schema-check
        name: Contract Schema Check (5s timeout)
        entry: ./scripts/pre-commit-wrapper.sh contract-schema-check 5 "DSO_ROOT=$(./scripts/resolve-dso-plugin.sh) && \"$DSO_ROOT/scripts/check-contract-schemas.sh\""
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: ^plugins/dso/docs/contracts/

      # Referential integrity check (timeout: 10s)
      # Validates that skill/agent files reference existing scripts, agents, and contracts.
      # Debug command: DSO_ROOT=$(./scripts/resolve-dso-plugin.sh) && "$DSO_ROOT/scripts/check-referential-integrity.sh"
      - id: referential-integrity-check
        name: Referential Integrity Check (10s timeout)
        entry: ./scripts/pre-commit-wrapper.sh referential-integrity-check 10 "DSO_ROOT=$(./scripts/resolve-dso-plugin.sh) && \"$DSO_ROOT/scripts/check-referential-integrity.sh\""
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: ^plugins/dso/(skills|agents)/

      # Assertion density check
      # Debug command: python scripts/check_assertion_density.py app/tests/ --min-density 1.0
      - id: check-assertion-density
        name: Check assertion density (15s timeout)
        language: system
        entry: ./scripts/pre-commit-wrapper.sh check-assertion-density 15 "cd app && PY_RUN_APPROACH=local make check-assertion-density"
        pass_filenames: false
        stages: [pre-commit]
        types: [python]

      # Test gate (timeout: 10s)
      # Blocks commits when staged source files have associated tests that haven't passed.
      # Runs BEFORE the review gate so developers fix test failures first.
      # Debug command: DSO_ROOT=$(scripts/resolve-dso-plugin.sh) && "$DSO_ROOT/hooks/pre-commit-test-gate.sh"
      - id: pre-commit-test-gate
        name: Test Gate (10s timeout)
        entry: ./scripts/pre-commit-wrapper.sh pre-commit-test-gate 10 "DSO_ROOT=$(./scripts/resolve-dso-plugin.sh) && \"$DSO_ROOT/hooks/pre-commit-test-gate.sh\""
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # Review gate (timeout: 10s)
      # Blocks commits containing non-allowlisted files without a valid review-status.
      # This is a git-native complement to the PreToolUse review-gate.sh hook — it
      # operates on staged files directly (no command-string parsing) and uses the
      # same shared allowlist (review-gate-allowlist.conf) as compute-diff-hash.sh.
      # Debug command: DSO_ROOT=$(scripts/resolve-dso-plugin.sh) && "$DSO_ROOT/hooks/pre-commit-review-gate.sh"
      - id: pre-commit-review-gate
        name: Review Gate (10s timeout)
        entry: ./scripts/pre-commit-wrapper.sh pre-commit-review-gate 10 "DSO_ROOT=$(./scripts/resolve-dso-plugin.sh) && \"$DSO_ROOT/hooks/pre-commit-review-gate.sh\""
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # Test quality gate (timeout: 15s)
      # Detects test anti-patterns (source-file-grepping, tautological tests, change-detector
      # tests, implementation-coupled assertions, existence-only assertions) in staged test files.
      # Scoped to files matching ^tests/. Config: test_quality.enabled (default: true),
      # test_quality.tool (bash-grep | semgrep | disabled).
      # Debug command: DSO_ROOT=$(./scripts/resolve-dso-plugin.sh) && "$DSO_ROOT/hooks/pre-commit-test-quality-gate.sh"
      - id: pre-commit-test-quality-gate
        name: Test Quality Gate (15s timeout)
        entry: ./scripts/pre-commit-wrapper.sh pre-commit-test-quality-gate 15 "DSO_ROOT=$(./scripts/resolve-dso-plugin.sh) && \"$DSO_ROOT/hooks/pre-commit-test-quality-gate.sh\""
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: ^tests/

      # Ticket gate (commit-msg stage, timeout: 10s)
      # Blocks commits lacking a valid v3 ticket ID when non-allowlisted files are staged.
      # Runs at commit-msg stage so the hook receives the commit message file ($1) from git.
      # Debug command: DSO_ROOT=$(scripts/resolve-dso-plugin.sh) && "$DSO_ROOT/hooks/pre-commit-ticket-gate.sh" .git/COMMIT_EDITMSG
      - id: pre-commit-ticket-gate
        name: Ticket Gate (10s timeout)
        entry: ./scripts/pre-commit-wrapper.sh pre-commit-ticket-gate 10 "DSO_ROOT=$(./scripts/resolve-dso-plugin.sh) && \"$DSO_ROOT/hooks/pre-commit-ticket-gate.sh\" \"$(git rev-parse --git-dir)/COMMIT_EDITMSG\""
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit-msg]

      # Pre-push format and lint check (read-only)
      # Catches format/lint violations before they reach CI.
      # Does NOT modify files — only checks. Run `make format-fix-all` to fix.
      # Requires: pre-commit install --hook-type pre-push
      - id: pre-push-lint
        name: Pre-push format + lint check
        language: system
        entry: ./scripts/pre-commit-wrapper.sh pre-push-lint 60 "cd app && PY_RUN_APPROACH=local make format-check && PY_RUN_APPROACH=local make lint-ruff"
        pass_filenames: false
        always_run: true
        stages: [pre-push]

