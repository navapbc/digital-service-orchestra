# EXAMPLE: GitHub Actions CI workflow for a Python/Poetry project using the DSO plugin.
# Copy to your project's .github/workflows/ci.yml and customize.

name: CI

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC - full suite without testmon
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  push:
    branches:
      - main
      - 'feature-*'
      - 'feature/**'
      - 'bugfix-*'
      - 'bugfix/**'
      - 'epic-*'
      - 'epic/**'
      - 'exp-*'
      - 'exp/**'
    paths-ignore:
      - '**/*.md'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: ./app

env:
  PY_RUN_APPROACH: local
  CI: true

jobs:
  fast-gate:
    name: Fast Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Check for multiple Alembic heads
        working-directory: ./app
        run: |
          MIGRATION_DIR="src/db/migrations/versions"
          ALL_REVISIONS=$(grep -rh '^revision' "$MIGRATION_DIR"/*.py 2>/dev/null | sed 's/.*= *"\([^"]*\)".*/\1/' | sort -u)
          DOWN_REVISIONS=$(grep -rh '^down_revision' "$MIGRATION_DIR"/*.py 2>/dev/null | sed 's/.*= *"\([^"]*\)".*/\1/' | sort -u)

          HEAD_COUNT=0
          HEADS=""
          for rev in $ALL_REVISIONS; do
            if ! echo "$DOWN_REVISIONS" | grep -qx "$rev"; then
              HEAD_COUNT=$((HEAD_COUNT + 1))
              HEADS="$HEADS $rev"
            fi
          done

          if [ "$HEAD_COUNT" -le 1 ]; then
            echo "✓ Single migration head detected"
          else
            echo "✗ Multiple migration heads detected ($HEAD_COUNT):$HEADS"
            echo ""
            echo "This happens when parallel worktrees create migrations from the same base."
            echo "Fix: run 'make db-migrate-merge-heads' to create a merge migration."
            exit 1
          fi

      - name: Lint imports (ruff isort)
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.4.10"
          args: "check --config app/pyproject.toml --select I app/src app/tests scripts tests"

      - name: Format check (ruff)
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.4.10"
          args: "format --config app/pyproject.toml --check app/src app/tests scripts tests"

      - name: Lint (ruff)
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.4.10"
          args: "check --config app/pyproject.toml app/src app/tests scripts tests"

      - name: Check assertion density
        run: python scripts/check_assertion_density.py app/tests/ --min-density 1.0
        working-directory: .

      - name: Report job timing
        if: always()
        run: |
          echo "### Fast Gate: $(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> "$GITHUB_STEP_SUMMARY"
        working-directory: .

  mypy:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Set up Python & Poetry
        uses: ./.github/actions/setup-python-poetry

      - name: Cache mypy results
        uses: actions/cache@v4
        with:
          path: app/.mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('app/poetry.lock') }}-${{ hashFiles('app/src/**/*.py') }}
          restore-keys: |
            mypy-${{ runner.os }}-${{ hashFiles('app/poetry.lock') }}-
            mypy-${{ runner.os }}-

      - name: Run type check (mypy)
        run: make lint-mypy

      - name: Report job timing
        if: always()
        run: |
          echo "### Type Check (mypy): $(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> "$GITHUB_STEP_SUMMARY"
        working-directory: .

  persistence-check:
    name: Persistence Coverage Check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [fast-gate]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check persistence test coverage
        run: bash scripts/check-persistence-coverage.sh
        working-directory: .

  test-unit-agents:
    name: "Unit Tests: Agents"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [fast-gate]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: secret123
          POSTGRES_USER: app
          POSTGRES_DB: app
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: app
      DB_PASSWORD: secret123
      DB_NAME: app
      DB_SCHEMA: public
      DB_SSL_MODE: allow
      HYPOTHESIS_PROFILE: ci
    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Set up Python & Poetry
        uses: ./.github/actions/setup-python-poetry

      - name: Run database migrations
        run: make db-migrate

      - name: Cache testmon data
        if: github.event_name == 'pull_request'
        uses: actions/cache@v4
        with:
          path: app/.testmondata
          key: testmon-agents-${{ runner.os }}-${{ github.head_ref }}-${{ hashFiles('app/poetry.lock') }}

      - name: Run unit tests (agents)
        run: |
          handle_cancel() {
            printf "\n::error::Received cancellation signal (step cancelled or timed out)\n"
            printf "#### Process list\n\n\`\`\`\n%s\n\`\`\`\n" "$(ps -ef)" >> "$GITHUB_STEP_SUMMARY"
            kill -TERM "$CHILD_PID" 2>/dev/null || true
            wait "$CHILD_PID" 2>/dev/null
            exit 1
          }
          trap handle_cancel INT TERM HUP

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            make test-unit-agents args="-x --testmon --reruns 1 --reruns-delay 0 --junitxml=test-results-agents.xml" &
          else
            make test-unit-agents args="-x --reruns 1 --reruns-delay 0 --junitxml=test-results-agents.xml" &
          fi
          CHILD_PID=$!
          wait "$CHILD_PID"
          exit $?

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-agents
          path: app/test-results-agents.xml
          retention-days: 14
          if-no-files-found: ignore

      - name: Report flaky tests
        if: always()
        run: bash ../scripts/report-flaky-tests.sh test-results-agents.xml

      - name: Report job timing
        if: always()
        run: |
          echo "### Unit Tests (Agents): $(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> "$GITHUB_STEP_SUMMARY"
        working-directory: .

