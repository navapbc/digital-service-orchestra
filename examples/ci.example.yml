      DB_SCHEMA: public
      DB_SSL_MODE: allow
    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Set up Python & Poetry
        uses: ./.github/actions/setup-python-poetry

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/poetry.lock') }}

      - name: Cache apt packages
        uses: actions/cache@v4
        id: apt-cache
        with:
          path: /var/cache/apt/archives
          key: apt-e2e-${{ runner.os }}-noble

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: poetry run playwright install --with-deps chromium

      - name: Install Playwright system dependencies and PostgreSQL client
        run: |
          # Configure apt retries and timeouts to avoid Azure mirror stalls
          sudo tee /etc/apt/apt.conf.d/99-ci-reliability <<'APT_CONF'
          Acquire::Retries "3";
          Acquire::http::Timeout "30";
          Acquire::https::Timeout "30";
          APT_CONF
          sudo apt-get update
          # Install Playwright system deps (skipped if browsers were just installed with --with-deps)
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            poetry run playwright install-deps chromium
          fi
          # Install PostgreSQL client in same apt transaction (avoids redundant apt-get update)
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image with layer caching
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          target: dev
          load: true
          tags: app-lockpick-doc-to-logic:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RUN_UID=4000
            RUN_USER=app

      - name: Start application containers
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml down -v 2>/dev/null || true && SKIP_MIGRATIONS=true FLASK_NO_RELOAD=true docker compose -f docker-compose.yml -f docker-compose.e2e.yml up --detach --no-build

      - name: Validate container file ownership
        run: |
          # Get the app container name (use overlay files to match how containers were started)
          APP_CONTAINER=$(docker compose -f docker-compose.yml -f docker-compose.e2e.yml ps -q lockpick-doc-to-logic 2>/dev/null || echo "")
          if [ -z "$APP_CONTAINER" ]; then
            echo "WARNING: App container not found, skipping ownership check"
            exit 0
          fi

          # Check /app/storage ownership (must be writable by app user, UID 4000)
          STORAGE_OWNER_UID=$(docker exec "$APP_CONTAINER" stat -c '%u' /app/storage 2>/dev/null || echo "unknown")
          if [ "$STORAGE_OWNER_UID" = "unknown" ]; then
            echo "WARNING: Could not check /app/storage ownership (directory may not exist yet)"
          elif [ "$STORAGE_OWNER_UID" != "4000" ]; then
            echo "ERROR: /app/storage owned by UID $STORAGE_OWNER_UID, expected 4000 (app user)"
            echo "Non-root app user cannot write to this directory, causing silent storage failures"
            exit 1
          else
            echo "OK: /app/storage owned by UID 4000 (app user)"
          fi
        working-directory: ./app

      - name: Wait for database to be ready
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U app; then
              echo "Database is ready"
              break
            fi
            echo "Waiting for database... ($i/30)"
            sleep 1
          done

      - name: Run database migrations
        run: make db-migrate

      - name: Wait for app to be ready
        run: |
          # REVIEW-DEFENSE: Duplication (minor finding) — the wait block is intentionally
          # inlined in both jobs rather than extracted to a composite action or script.
          # test-e2e and test-e2e-multiworker each have different docker-compose setups
          # (plain vs -f docker-compose.e2e.yml overlay), so a shared script would need
          # parameterization for minimal gain. Inline is clearer for CI readers and
          # avoids introducing a composite action solely for one 8-line step.
          for i in {1..60}; do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "App is ready after $((i * 2))s"
              exit 0
            fi
            echo "Waiting for app... ($i/60)"
            sleep 2
          done
          echo "ERROR: App did not become ready within 120s" >&2
          docker compose logs lockpick-doc-to-logic 2>/dev/null | tail -50 || true
          exit 1

      - name: Run end-to-end tests
        run: |
          handle_cancel() {
            printf "\n::error::Received cancellation signal (step cancelled or timed out)\n"
            printf "#### Process list\n\n\`\`\`\n%s\n\`\`\`\n" "$(ps -ef)" >> "$GITHUB_STEP_SUMMARY"
            printf "#### App container logs (last 50 lines)\n\n\`\`\`\n%s\n\`\`\`\n" \
              "$(docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs lockpick-doc-to-logic 2>/dev/null | tail -50)" >> "$GITHUB_STEP_SUMMARY"
            kill -TERM "$CHILD_PID" 2>/dev/null || true
            wait "$CHILD_PID" 2>/dev/null
            exit 1
          }
          trap handle_cancel INT TERM HUP

          poetry run pytest -m "e2e" -n 2 -x --reruns 1 --reruns-delay 2 --junitxml=e2e-multiworker-results.xml &
          CHILD_PID=$!
          wait "$CHILD_PID"
          exit $?

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-multiworker-test-results
          path: app/e2e-multiworker-results.xml
          retention-days: 14
          if-no-files-found: ignore

      - name: Report flaky E2E tests
        if: always()
        run: bash ../scripts/report-flaky-tests.sh e2e-multiworker-results.xml

      - name: Report job timing
        if: always()
        run: |
          echo "### E2E Tests (Multi-Worker): $(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> "$GITHUB_STEP_SUMMARY"
        working-directory: .

  test-integration-hermetic:
    name: Integration Tests (Hermetic)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [fast-gate]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: secret123
          POSTGRES_USER: app
          POSTGRES_DB: app
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: app
      DB_PASSWORD: secret123
      DB_NAME: app
      DB_SCHEMA: public
      DB_SSL_MODE: allow
      USE_MOCK_LLM: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Set up Python & Poetry
        uses: ./.github/actions/setup-python-poetry

      - name: Run database migrations
        run: make db-migrate

      - name: Run hermetic integration tests
        run: |
          handle_cancel() {
            printf "\n::error::Received cancellation signal (step cancelled or timed out)\n"
            printf "#### Process list\n\n\`\`\`\n%s\n\`\`\`\n" "$(ps -ef)" >> "$GITHUB_STEP_SUMMARY"
            kill -TERM "$CHILD_PID" 2>/dev/null || true
            wait "$CHILD_PID" 2>/dev/null
            exit 1
          }
          trap handle_cancel INT TERM HUP

          poetry run pytest -m "integration" -x -v --timeout=120 --junitxml=integration-results.xml --reruns 1 --reruns-delay 0 &
          CHILD_PID=$!
          wait "$CHILD_PID"
          exit $?

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: app/integration-results.xml
          retention-days: 14
          if-no-files-found: ignore

      - name: Report flaky integration tests
        if: always()
        run: bash ../scripts/report-flaky-tests.sh integration-results.xml

      - name: Report job timing
        if: always()
        run: |
          echo "### Integration Tests (Hermetic): $(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> "$GITHUB_STEP_SUMMARY"
        working-directory: .

  test-integration-external:
    name: Integration Tests (External APIs)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [fast-gate]
    # Only run if ANTHROPIC_API_KEY secret is available
    if: ${{ vars.RUN_INTEGRATION_TESTS == 'true' || github.event_name == 'workflow_dispatch' }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: secret123
          POSTGRES_USER: app
          POSTGRES_DB: app
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: app
      DB_PASSWORD: secret123
      DB_NAME: app
      DB_SCHEMA: public
      DB_SSL_MODE: allow
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Set up Python & Poetry
        uses: ./.github/actions/setup-python-poetry

      - name: Run database migrations
        run: make db-migrate

      - name: Run external API integration tests
        run: poetry run pytest -m "external" -x -v --junitxml=external-results.xml --reruns 1 --reruns-delay 0

      - name: Upload external test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-test-results-ci
          path: app/external-results.xml
          retention-days: 14
          if-no-files-found: ignore

      - name: Report flaky external tests
        if: always()
        run: bash ../scripts/report-flaky-tests.sh external-results.xml

      - name: Report job timing
        if: always()
        run: |
          echo "### Integration Tests (External): $(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> "$GITHUB_STEP_SUMMARY"
        working-directory: .

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Install bandit
        working-directory: .
        run: pip install bandit

      - name: Run security scan (bandit)
        working-directory: ./app
        run: bandit -c pyproject.toml -r . --number 3 --skip B101 -ll -x ./.venv

      - name: Report job timing
        if: always()
        run: |
          echo "### Security Scan: $(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> "$GITHUB_STEP_SUMMARY"

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        id: start
        run: echo "time=$(date +%s)" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Install shellcheck
        run: sudo apt-get install -y --no-install-recommends shellcheck
        working-directory: .

      - name: Run shellcheck
        run: |
          shellcheck --severity=error \
            scripts/*.sh
        working-directory: .

      - name: Report job timing
        if: always()
        run: |
          echo "### ShellCheck: $(( $(date +%s) - ${{ steps.start.outputs.time }} ))s" >> "$GITHUB_STEP_SUMMARY"
        working-directory: .
